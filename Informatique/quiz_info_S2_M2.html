ions logicielles qui ne forment un ensemble unique", "correct": false}, {"id": "28_G", "text": "La gestion du syst\u00e8me est simplifi\u00e9e et optimis\u00e9e", "correct": false}, {"id": "28_H", "text": "Ils sont de deux types, I et II, avec diff\u00e9rents degr\u00e9s d\u2019optimisation / flexibilit\u00e9", "correct": false}, {"id": "28_I", "text": "La base de donn\u00e9es m\u00e9dicales de l\u2019h\u00f4pital est fragment\u00e9e et non homog\u00e8ne", "correct": false}, {"id": "28_J", "text": "Les applications sont personnalis\u00e9es pour l\u2019institution o\u00f9 elles ont \u00e9t\u00e9 d\u00e9velopp\u00e9es, \u00e9tant incompatibles avec celles d\u2019autres institutions similaires", "correct": false}]}, {"id": 29, "question": "Laquelle des propri\u00e9t\u00e9s suivantes caract\u00e9rise les syst\u00e8mes d\u2019information hospitaliers monolithiques ?", "options": [{"id": "29_A", "text": "Les applications sont personnalis\u00e9es pour l\u2019institution o\u00f9 elles ont \u00e9t\u00e9 d\u00e9velopp\u00e9es, \u00e9tant incompatibles avec celles d\u2019autres institutions similaires", "correct": true}, {"id": "29_B", "text": "La base de donn\u00e9es m\u00e9dicales de l\u2019h\u00f4pital contient des informations r\u00e9p\u00e9titives", "correct": true}, {"id": "29_C", "text": "Les applications qui les composent peuvent s\u2019ex\u00e9cuter sur des plates-formes distinctes, mais communiquer entre elles", "correct": false}, {"id": "29_D", "text": "La gestion du syst\u00e8me est simplifi\u00e9e et optimis\u00e9e", "correct": false}, {"id": "29_E", "text": "L\u2019h\u00f4pital est \u00e9quip\u00e9 d\u2019un logiciel qui ne compose pas un tout unitaire", "correct": false}, {"id": "29_F", "text": "Toutes les fonctions de l\u2019h\u00f4pital sont abord\u00e9es dans une perspective commune et holistique", "correct": true}, {"id": "29_G", "text": "Le syst\u00e8me informatique manque de flexibilit\u00e9", "correct": false}, {"id": "29_H", "text": "L\u2019int\u00e9gration d\u2019applications externes dans le syst\u00e8me d\u00e9j\u00e0 existant est tr\u00e8s difficile \u00e0 r\u00e9aliser", "correct": false}, {"id": "29_I", "text": "Ils sont de deux types, I et II, avec diff\u00e9rents degr\u00e9s d\u2019optimisation / flexibilit\u00e9", "correct": false}, {"id": "29_J", "text": "Le syst\u00e8me d\u2019information est constitu\u00e9 d\u2019une s\u00e9rie d\u2019applications distinctes qui communiquent entre elles par le biais de protocoles standard", "correct": false}]}, {"id": 30, "question": "Laquelle des propri\u00e9t\u00e9s suivantes caract\u00e9rise les syst\u00e8mes informatiques hospitaliers \u00e9volutifs ?", "options": [{"id": "30_A", "text": "De la base de donn\u00e9es centrale sont s\u00e9par\u00e9es les bases de donn\u00e9es locales, accessibles aux services d\u00e9di\u00e9s de l'h\u00f4pital", "correct": true}, {"id": "30_B", "text": "L\u2019int\u00e9gration d\u2019applications externes dans le syst\u00e8me d\u00e9j\u00e0 existant est tr\u00e8s difficile \u00e0 r\u00e9aliser", "correct": false}, {"id": "30_C", "text": "Toutes les fonctions de l\u2019h\u00f4pital sont abord\u00e9es dans une perspective commune et globale", "correct": false}, {"id": "30_D", "text": "Ils sont difficiles \u00e0 concevoir car le probl\u00e8me des protocoles de communication et de la compatibilit\u00e9 des donn\u00e9es est difficile \u00e0 r\u00e9soudre dans la pratique.", "correct": true}, {"id": "30_E", "text": "Les donn\u00e9es m\u00e9dicales de l\u2019h\u00f4pital sont incompatibles au niveau territorial ou national", "correct": true}, {"id": "30_F", "text": "Ils sont de deux types, I et II, avec diff\u00e9rents degr\u00e9s d\u2019optimisation / flexibilit\u00e9", "correct": false}, {"id": "30_G", "text": "Des modules s\u00e9par\u00e9s reli\u00e9s au noyau central effectuent un traitement local", "correct": false}, {"id": "30_H", "text": "Les applications sont personnalis\u00e9es pour l\u2019institution o\u00f9 elles ont \u00e9t\u00e9 s sont difficiles \u00e0 concevoir car le probl\u00e8me des protocoles de communication et de la compatibilit\u00e9 des donn\u00e9es est difficile \u00e0 r\u00e9soudre dans la pratique", "correct": false}, {"id": "31_J", "text": "Le syst\u00e8me informatique manque de flexibilit\u00e9", "correct": false}]}, {"id": 32, "question": "Parmi les outils suivants, lesquels sont des m\u00e9thodes de collecte de donn\u00e9es m\u00e9dicales ?", "options": [{"id": "32_A", "text": "Observations directes", "correct": true}, {"id": "32_B", "text": "Questionnaires \u00e0 questions ouvertes", "correct": false}, {"id": "32_C", "text": "Entretiens \u00e0 questions ouvertes", "correct": true}, {"id": "32_D", "text": "Questionnaires compos\u00e9s de questions \u00e0 choix multiples", "correct": true}, {"id": "32_E", "text": "Entretiens structur\u00e9es", "correct": false}, {"id": "32_F", "text": "Lecteurs de codes \u00e0 barres", "correct": false}, {"id": "32_G", "text": "Syst\u00e8mes de dict\u00e9e automatique", "correct": false}, {"id": "32_H", "text": "Syst\u00e8mes de reconnaissance vocale", "correct": false}, {"id": "32_I", "text": "Appareils de mesure automatiques", "correct": false}, {"id": "32_J", "text": "Syst\u00e8mes de reconnaissance optique de caract\u00e8res", "correct": false}]}, {"id": 33, "question": "Lesquels des d\u00e9clarations suivantes sont des principes pour r\u00e9duire le taux d\u2019erreur lors de la collecte de donn\u00e9es m\u00e9dicales ?", "options": [{"id": "33_A", "text": "Pr\u00e9paration des donn\u00e9es sur papier, \u00e0 saisir plus tard dans le syst\u00e8me", "correct": true}, {"id": "33_B", "text": "Mise en place de syst\u00e8mes d\u2019aide en ligne", "correct": false}, {"id": "33_C", "text": "La flexibilit\u00e9 du syst\u00e8me, qui permet la saisie de donn\u00e9es dans n\u2019importe quel format et structure choisis par les utilisateurs", "correct": true}, {"id": "33_D", "text": "Mise en \u0153uvre de fonctions de v\u00e9rification syntaxique ct": true}, {"id": "36_B", "text": "Ils ont besoin de m\u00e9canismes automatiques de sauvegarde des donn\u00e9es", "correct": false}, {"id": "36_C", "text": "Leur principale exigence concerne la vitesse de fonctionnement du syst\u00e8me", "correct": true}, {"id": "36_D", "text": "Ils sont int\u00e9ress\u00e9s \u00e0 mener \u00e0 bien leurs t\u00e2ches le plus rapidement possible", "correct": true}, {"id": "36_E", "text": "Ils ont besoin d\u2019un guide d\u2019aide bien document\u00e9, facilement accessible et \u00e9ventuellement sensible au contexte", "correct": false}, {"id": "36_F", "text": "Ils utilisent le syst\u00e8me p\u00e9riodiquement, pour r\u00e9soudre des t\u00e2ches particuli\u00e8res", "correct": false}, {"id": "36_G", "text": "Ils sont int\u00e9ress\u00e9s \u00e0 \u00e9largir les possibilit\u00e9s d\u2019exploitation du syst\u00e8me", "correct": false}, {"id": "36_H", "text": "Ils ont une connaissance d\u00e9taill\u00e9e de toutes les fonctions du syst\u00e8me", "correct": false}, {"id": "36_I", "text": "Ils sont pr\u00e9occup\u00e9s par la fonctionnalit\u00e9 du programme", "correct": false}, {"id": "36_J", "text": "Ils sont familiaris\u00e9s avec les fonctions du syst\u00e8me", "correct": false}]}, {"id": 37, "question": "Lesquels des d\u00e9clarations suivantes caract\u00e9risent le pro\ufb01l des utilisateurs r\u00e9guliers d\u2019un syst\u00e8me informatique :", "options": [{"id": "37_A", "text": "Ils utilisent le syst\u00e8me en permanence dans le cadre de leur travail de routine", "correct": true}, {"id": "37_B", "text": "Ils utilisent le syst\u00e8me p\u00e9riodiquement, pour r\u00e9soudre des t\u00e2ches particuli\u00e8res", "correct": false}, {"id": "37_C", "text": "Ils ont une connaissance d\u00e9taill\u00e9e de toutes les fonctions du syst\u00e8me", "correct": true}, {"id": "37_D", "text": "Ils sont pr\u00e9occup\u00e9s par la fonctionnalit\u00e9 du programme", "correct": true}, {"id": "37_E", "text": "Ils sont int\u00e9ress\u00e9s \u00e0 \u00e9largir les possibilit\u00e9s d\u2019exploitation du syst\u00e8me", "correct": false}, {"id": "37_F", "text": "Ils appr\u00e9cieront l\u2019interface conviviale du syst\u00e8me", "correct": false}, {"id": "37_G", "text": "Ils ont besoin de m\u00e9canismes automatiques de sauvegarde des donn\u00e9es", "correct": false}, {"id": "37_H", "text": "Ils ne sont pas int\u00e9ress\u00e9s par le guide d\u2019assistance du syst\u00e8me parce qu\u2019ils le connaissent", "correct": false}, {"id": "37_I", "text": "Ils s\u2019int\u00e9ressent aux interfaces bien con\u00e7ues qui simplifient la saisie et la consultation des donn\u00e9es", "correct": false}, {"id": "37_J", "text": "Leur principale exigence est la rapidit\u00e9 de fonctionnement du syst\u00e8me", "correct": false}]}, {"id": 38, "question": "Lesquels des d\u00e9clarations suivantes caract\u00e9risent le pro\ufb01l des utilisateurs experts d\u2019un syst\u00e8me d\u2019information :", "options": [{"id": "38_A", "text": "Ils sont pr\u00e9occup\u00e9s par la fonctionnalit\u00e9 du syst\u00e8me", "correct": true}, {"id": "38_B", "text": "Ils sont int\u00e9ress\u00e9s \u00e0 \u00e9tendre les possibilit\u00e9s d\u2019exploitation du syst\u00e8me", "correct": false}, {"id": "38_C", "text": "Ils sont des utilisateurs r\u00e9guliers du syst\u00e8me", "correct": true}, {"id": "38_D", "text": "Ils sont pr\u00e9occup\u00e9s par les possibilit\u00e9s du syst\u00e8me de traitement des donn\u00e9es", "correct": true}, {"id": "38_E", "text": "Leur principale exigence est la rapidit\u00e9 de fonctionnement du syst\u00e8me", "correct": false}, {"id": "38_F", "text": "Ils sont int\u00e9ress\u00e9s \u00e0 personnaliser le syst\u00e8me et \u00e0 l\u2019adapter \u00e0 leurs propres besoins", "correct": false}, {"id": "38_G", "text": "Ils appr\u00e9cieront l\u2019interface conviviale du syst\u00e8me", "correct": false}, {"id": "38_H", "text": "Ils utilisent le syst\u00e8me p\u00e9riodiquement, pour r\u00e9soudre des t\u00e2ches particuli\u00e8res", "correct": false}, {"id": "38_I", "text": "Ils ont besoin de m\u00e9canismes automatiques de sauvegarde des donn\u00e9es", "correct": false}, {"id": "38_J", "text": "Ils sont int\u00e9ress\u00e9s \u00e0 mener \u00e0 bien leurs t\u00e2ches le plus rapidement possible", "correct": false}]}, {"id": 39, "question": "La conception d\u2019une interface doit respecter les principes suivants :", "options": [{"id": "39_A", "text": "Transparence", "correct": true}, {"id": "39_B", "text": "Tol\u00e9rance", "correct": false}, {"id": "39_C", "text": "Consistance", "correct": true}, {"id": "39_D", "text": "Intransigeance", "correct": true}, {"id": "39_E", "text": "Interop\u00e9rabilit\u00e9", "correct": false}, {"id": "39_F", "text": "Usage unique", "correct": false}, {"id": "39_G", "text": "R\u00e9utilisation", "correct": false}, {"id": "39_H", "text": "Visibilit\u00e9", "correct": false}, {"id": "39_I", "text": "Structuration", "correct": false}, {"id": "39_J", "text": "Simplicit\u00e9", "correct": false}]}, {"id": 40, "question": "Quels sont les types d\u2019interface les plus couramment utilis\u00e9s :", "options": [{"id": "40_A", "text": "Interfaces en ligne de commande", "correct": true}, {"id": "40_B", "text": "Interfaces en mode texte", "correct": false}, {"id": "40_C", "text": "Interfaces statiques", "correct": true}, {"id": "40_D", "text": "Interfaces utilisateur tactiles", "correct": true}, {"id": "40_E", "text": "Interfaces vid\u00e9o", "correct": false}, {"id": "40_F", "text": "Interfaces audio", "correct": false}, {"id": "40_G", "text": "Interfaces bas\u00e9es sur le Web", "correct": false}, {"id": "40_H", "text": "Interfaces graphiques", "correct": false}, {"id": "40_I", "text": "Interfaces dynamiques", "correct": false}, {"id": "40_J", "text": "Interfaces HTML", "correct": false}]}];
        let allQuestions = [];
        let totalScore = 0, maxPossibleScore = 0;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function initQuiz() {
            allQuestions = JSON.parse(JSON.stringify(quizData));
            shuffleArray(allQuestions);
            allQuestions.forEach(q => shuffleArray(q.options));
            totalScore = 0; maxPossibleScore = 0;
            allQuestions.forEach(q => { q.options.forEach(o => { if (o.correct) maxPossibleScore++; }) });
            document.getElementById('btn-recommencer').style.display = 'none';
            document.getElementById('results').style.display = 'none';
            document.getElementById('nav-buttons').style.display = 'flex';
            renderPage();
        }

        function renderPage() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';
            
            allQuestions.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = 'q-' + q.id;
                
                const title = document.createElement('h3');
                title.className = 'question-title';
                title.textContent = `Q${q.id} - ${q.question}`;
                card.appendChild(title);
                
                const optionsGrid = document.createElement('div');
                optionsGrid.className = 'options-grid';
                
                q.options.forEach(opt => {
                    const label = document.createElement('label');
                    label.className = 'option-label';
                    label.id = 'label-' + opt.id;
                    
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.name = 'question-' + q.id;
                    checkbox.value = opt.id;
                    
                    const textNode = document.createTextNode(opt.text);
                    label.appendChild(checkbox);
                    label.appendChild(textNode);
                    
                    optionsGrid.appendChild(label);
                });
                card.appendChild(optionsGrid);
                container.appendChild(card);
            });

            document.getElementById('btn-valider').style.display = 'block';
            document.getElementById('results').style.display = 'none';
        }

        function validerReponses() {
            let pageScore = 0, pageMaxScore = 0;
            allQuestions.forEach(q => {
                q.options.forEach(opt => {
                    if (opt.correct) pageMaxScore++;
                    const checkbox = document.querySelector(`input[value="${opt.id}"]`);
                    const label = document.getElementById(`label-${opt.id}`);
                    
                    checkbox.disabled = true;
                    label.classList.add('disabled');
                    
                    if (checkbox.checked) {
                        if (opt.correct) { 
                            label.classList.add('is-correct'); 
                            pageScore++; 
                            totalScore++; 
                        } else { 
                            label.classList.add('is-incorrect'); 
                        }
                    } else {
                        if (opt.correct) { 
                            label.classList.add('missed-correct'); 
                        }
                    }
                });
            });
            
            const resultsDiv = document.getElementById('results');
            const scoreText = document.getElementById('score-text');
            const globalScoreText = document.getElementById('global-score-text');
            const percentage = pageMaxScore > 0 ? Math.round((pageScore / pageMaxScore) * 100) : 0;
            
            scoreText.textContent = `Score Total : ${pageScore} / ${pageMaxScore} (${percentage}%)`;
            globalScoreText.innerHTML = `Le bouton ci-dessous vous permet de mélanger les questions et de retenter votre chance !`;
            resultsDiv.style.display = 'block';
            document.getElementById('btn-valider').style.display = 'none';
            
            document.getElementById('nav-buttons').style.display = 'none';
            document.getElementById('btn-recommencer').style.display = 'block';
            resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        window.onload = initQuiz;
    </script>
