 l\u2019institution, si elles existent", "correct": false}]}, {"id": 17, "question": "Laquelle des activit\u00e9s suivantes repr\u00e9sente les grandes \u00e9tapes du cycle de vie d\u2019un syst\u00e8me d\u2019information dans le mod\u00e8le en cascade :", "options": [{"id": "17_A", "text": "Conception des composants mat\u00e9riels et logiciels du syst\u00e8me", "correct": true}, {"id": "17_B", "text": "Modification des biblioth\u00e8ques de fonctions n\u00e9cessaires \u00e0 la conception du syst\u00e8me", "correct": true}, {"id": "17_C", "text": "Mise en \u0153uvre et test du composant logiciel", "correct": false}, {"id": "17_D", "text": "Mise en \u00e9vidence des erreurs de programmation et des omissions", "correct": true}, {"id": "17_E", "text": "Traduction des fonctions du syst\u00e8me en programmes ex\u00e9cutables", "correct": false}, {"id": "17_F", "text": "Analyse et d\u00e9finition des besoins", "correct": false}, {"id": "17_G", "text": "Exploitation et maintenance du syst\u00e8me", "correct": false}, {"id": "17_H", "text": "Conception de l\u2019interface du syst\u00e8me avec les utilisateurs et des modules de communication \u00e0 distance", "correct": false}, {"id": "17_I", "text": "Compilation des proc\u00e9dures qui font partie du syst\u00e8me informatique", "correct": false}, {"id": "17_J", "text": "Int\u00e9gration et test du syst\u00e8mes", "correct": false}]}, {"id": 18, "question": "Lesquelles des d\u00e9clarations suivantes sont des caract\u00e9ristiques pour le d\u00e9veloppement \u00e9volutif des syst\u00e8mes d\u2019information :", "options": [{"id": "18_A", "text": "L\u2019\u00e9quipe de conception prend en compte, \u00e9tape par \u00e9tape, les questions relatives aux exigences du b\u00e9n\u00e9ficiaire", "correct": true}, {"id": "18_B", "text": "L\u2019allocation des ressources financi\u00e8res pour la mise en \u0153uvre du syst\u00e8me est enti\u00e8rement r\u00e9alis\u00e9e d\u00e8s le d\u00e9but, avec sa conception", "correct": false}, {"id": "18_C", "text": "Aucune am\u00e9lioration suppl\u00e9mentaire du syst\u00e8me par l\u2019ajout de nouvelles fonctionnalit\u00e9s n\u2019est envisag\u00e9e", "correct": true}, {"id": "18_D", "text": "Le d\u00e9veloppement du syst\u00e8me se fait progressivement, en corr\u00e9lation avec l\u2019\u00e9volution des besoins de l\u2019utilisateur et de l\u2019organisation", "correct": true}, {"id": "18_E", "text": "La transition vers une nouvelle version ne se fait que lorsque les int\u00e9r\u00eats communs de l\u2019utilisateur et du concepteur l\u2019exigent", "correct": true}, {"id": "18_F", "text": "Le syst\u00e8me d\u2019information est con\u00e7u compl\u00e8te, jusque dans les moindres d\u00e9tails d\u2019ex\u00e9cution", "correct": true}, {"id": "18_G", "text": "Les utilisateurs ont l\u2019obligation d\u2019apprendre rapidement \u00e0 fonctionner dans le syst\u00e8me informatique, jusque dans les moindres d\u00e9tails, afin de r\u00e9duire les risques d\u2019erreurs", "correct": false}, {"id": "18_H", "text": "L\u2019allocation des ressources humaines et financi\u00e8res pour la mise en \u0153uvre du syst\u00e8me se fait progressivement, au fur et \u00e0 mesure que les co\u00fbts des \u00e9tapes pr\u00e9c\u00e9dentes sont r\u00e9cup\u00e9r\u00e9s", "correct": false}, {"id": "18_I", "text": "L\u2019\u00e9quipe de conception \u00e9tablit d\u00e8s le d\u00e9but plusieurs r\u00e9unions avec le b\u00e9n\u00e9ficiaire, afin d\u2019identifier ses besoins", "correct": false}, {"id": "18_J", "text": "Le risque de concevoir un syst\u00e8me \u00e0 grande \u00e9chelle qui se r\u00e9v\u00e8le inop\u00e9rant lors de sa mise en service est r\u00e9duit", "correct": false}]}, {"id": 19, "question": "Lesquelles des d\u00e9clarations suivantes sont des conditions pour le passage d\u2019une \u00e9tape \u00e9volutive \u00e0 une autre dans le d\u00e9veloppement des syst\u00e8mes d\u2019information :", "options": [{"id": "19_A", "text": "Le b\u00e9n\u00e9ficiaire souhaite r\u00e9duire l\u2019\u00e9quipement mat\u00e9riel existant dans l\u2019\u00e9tablissement", "correct": true}, {"id": "19_B", "text": "Le concepteur du syst\u00e8me veut changer l\u2019environnement de d\u00e9veloppement dans lequel il a \u00e9t\u00e9 fabriqu\u00e9", "correct": false}, {"id": "19_C", "text": "Le concepteur du syst\u00e8me veut rendre le syst\u00e8me compatible avec d\u2019autres syst\u00e8mes d\u2019exploitation apparus sur le march\u00e9 informatique", "correct": true}, {"id": "19_D", "text": "Les utilisateurs demandent que l\u2019interface du syst\u00e8me soit modifi\u00e9e", "correct": false}, {"id": "19_E", "text": "Il est possible d\u2019augmenter la fiabilit\u00e9 du syst\u00e8me", "correct": true}, {"id": "19_F", "text": "Il est possible d\u2019augmenter les taux d\u2019utilisation de la capacit\u00e9 de calcul du syst\u00e8me", "correct": false}, {"id": "19_G", "text": "Il est \u00e9conomiquement justifi\u00e9 de d\u00e9velopper le syst\u00e8me conform\u00e9ment \u00e0 la l\u00e9gislation et \u00e0 la r\u00e9glementation en vigueur", "correct": false}, {"id": "19_H", "text": "Il est n\u00e9cessaire d\u2019\u00e9tendre la port\u00e9e du syst\u00e8me en int\u00e9grant de nouveaux domaines d\u2019application", "correct": false}, {"id": "19_I", "text": "Il est possible de r\u00e9duire les temps de r\u00e9ponse du syst\u00e8me", "correct": false}, {"id": "19_J", "text": "Le b\u00e9n\u00e9ficiaire dispose d\u2019un surplus de revenus qui doit \u00eatre investi efficacement", "correct": false}]}, {"id": 20, "question": "Lesquelles des activit\u00e9s g\u00e9n\u00e9rales suivantes sont g\u00e9r\u00e9es par le syst\u00e8me d\u2019information de l\u2019h\u00f4pital :", "options": [{"id": "20_A", "text": "Direction g\u00e9n\u00e9rale", "correct": true}, {"id": "20_B", "text": "Assurer les lignes de communication entre l\u2019h\u00f4pital et le Minist\u00e8re de la Sant\u00e9", "correct": true}, {"id": "20_C", "text": "Approvisionnement de l\u2019h\u00f4pital avec mat\u00e9riel biologique", "correct": true}, {"id": "20_D", "text": "Activit\u00e9s administratives", "correct": true}, {"id": "20_E", "text": "Activit\u00e9s de documentation et de formation", "correct": true}, {"id": "20_F", "text": "Suivi des patients dans l\u2019unit\u00e9 de soins intensifs", "correct": false}, {"id": "20_G", "text": "Activit\u00e9s de recherche", "correct": false}, {"id": "20_H", "text": "Activit\u00e9s m\u00e9dicales", "correct": false}, {"id": "20_I", "text": "Soins palliatifs pour les patients atteints de maladies en phase terminale", "correct": false}, {"id": "20_J", "text": "Activit\u00e9s de divertissement du personnel m\u00e9dical", "correct": false}]}];
        let allQuestions = [];
        let totalScore = 0, maxPossibleScore = 0;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function initQuiz() {
            allQuestions = JSON.parse(JSON.stringify(quizData));
            shuffleArray(allQuestions);
            allQuestions.forEach(q => shuffleArray(q.options));
            totalScore = 0; maxPossibleScore = 0;
            allQuestions.forEach(q => { q.options.forEach(o => { if (o.correct) maxPossibleScore++; }) });
            document.getElementById('btn-recommencer').style.display = 'none';
            document.getElementById('results').style.display = 'none';
            document.getElementById('nav-buttons').style.display = 'flex';
            renderPage();
        }

        function renderPage() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';
            
            allQuestions.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = 'q-' + q.id;
                
                const title = document.createElement('h3');
                title.className = 'question-title';
                title.textContent = `Q${q.id} - ${q.question}`;
                card.appendChild(title);
                
                const optionsGrid = document.createElement('div');
                optionsGrid.className = 'options-grid';
                
                q.options.forEach(opt => {
                    const label = document.createElement('label');
                    label.className = 'option-label';
                    label.id = 'label-' + opt.id;
                    
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.name = 'question-' + q.id;
                    checkbox.value = opt.id;
                    
                    const textNode = document.createTextNode(opt.text);
                    label.appendChild(checkbox);
                    label.appendChild(textNode);
                    
                    optionsGrid.appendChild(label);
                });
                card.appendChild(optionsGrid);
                container.appendChild(card);
            });

            document.getElementById('btn-valider').style.display = 'block';
            document.getElementById('results').style.display = 'none';
        }

        function validerReponses() {
            let pageScore = 0, pageMaxScore = 0;
            allQuestions.forEach(q => {
                q.options.forEach(opt => {
                    if (opt.correct) pageMaxScore++;
                    const checkbox = document.querySelector(`input[value="${opt.id}"]`);
                    const label = document.getElementById(`label-${opt.id}`);
                    
                    checkbox.disabled = true;
                    label.classList.add('disabled');
                    
                    if (checkbox.checked) {
                        if (opt.correct) { 
                            label.classList.add('is-correct'); 
                            pageScore++; 
                            totalScore++; 
                        } else { 
                            label.classList.add('is-incorrect'); 
                        }
                    } else {
                        if (opt.correct) { 
                            label.classList.add('missed-correct'); 
                        }
                    }
                });
            });
            
            const resultsDiv = document.getElementById('results');
            const scoreText = document.getElementById('score-text');
            const globalScoreText = document.getElementById('global-score-text');
            const percentage = pageMaxScore > 0 ? Math.round((pageScore / pageMaxScore) * 100) : 0;
            
            scoreText.textContent = `Score Total : ${pageScore} / ${pageMaxScore} (${percentage}%)`;
            globalScoreText.innerHTML = `Le bouton ci-dessous vous permet de mélanger les questions et de retenter votre chance !`;
            resultsDiv.style.display = 'block';
            document.getElementById('btn-valider').style.display = 'none';
            
            document.getElementById('nav-buttons').style.display = 'none';
            document.getElementById('btn-recommencer').style.display = 'block';
            resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        window.onload = initQuiz;
    </script>
