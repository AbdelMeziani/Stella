    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --correct-bg: #d4edda;
            --correct-border: #c3e6cb;
            --correct-text: #155724;
            --incorrect-bg: #f8d7da;
            --incorrect-border: #f5c6cb;
            --incorrect-text: #721c24;

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; margin: 0; padding: 40px 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--primary-color); font-size: 2.5em; margin-bottom: 10px; }

        .nav-links a { text-decoration: none; padding: 10px 20px; background-color: #2c3e50; color: white; border-radius: 5px; font-weight: bold; transition: background-color 0.2s; }
        .nav-links a:hover { background-color: #1a252f; }

        .revision-box h3 { margin-top: 0; color: #856404; margin-bottom: 10px; }
        .question-card { background: var(--card-bg); border-radius: 12px; padding: 30px; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 4px solid var(--accent-color); animation: fadeIn 0.5s ease; }
        .question-title { font-size: 1.3em; font-weight: 600; color: var(--primary-color); margin-top: 0; margin-bottom: 20px; line-height:1.4; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .option-label { display: flex; align-items: flex-start; padding: 12px 15px; background-color: #f8f9fa; border: 1px solid #e9ecef; border-radius: 8px; cursor: pointer; transition: all 0.2s ease; font-size: 1.05em; }
        .option-label:hover:not(.disabled) { background-color: #e2e6ea; border-color: #dae0e5; }
        .option-label input[type="checkbox"] { margin-top: 5px; margin-right: 15px; transform: scale(1.2); cursor: pointer; flex-shrink: 0; }
        .option-label.disabled { cursor: default; }
        .buttons-container { display: flex; gap: 20px; margin-top: 40px; }
        .btn { flex: 1; padding: 18px; color: white; border: none; border-radius: 8px; font-size: 1.2em; font-weight: bold; text-align: center; transition: all 0.3s; cursor:pointer; }
        .btn-valider { background-color: var(--accent-color); box-shadow: 0 4px 6px rgba(52, 152, 219, 0.3); }
        .btn-valider:hover { background-color: #2980b9; transform: translateY(-2px); }
        .btn-recommencer { background-color: #f39c12; display: none; margin-top: 20px; cursor: pointer; box-shadow: 0 4px 6px rgba(243, 156, 18, 0.3); }
        .btn-recommencer:hover { background-color: #d68910; transform: translateY(-2px); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .is-correct { background-color: var(--correct-bg) !important; border-color: var(--correct-border) !important; color: var(--correct-text); font-weight: 500; }
        .is-incorrect { background-color: var(--incorrect-bg) !important; border-color: var(--incorrect-border) !important; color: var(--incorrect-text); text-decoration: line-through; opacity: 0.8; }
        .missed-correct { background-color: var(--correct-bg) !important; border-color: var(--correct-border) !important; border-style: dashed !important; border-width: 2px !important; color: var(--correct-text); }
        #results { margin-top: 30px; padding: 20px; background: var(--card-bg); border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: none; animation: fadeIn 0.5s ease; }
        #score-text { font-size: 1.8em; color: var(--primary-color); font-weight: bold; margin: 0; }

ect": false}, {"id": "72_J", "text": "Modules n\u00e9cessaires au fonctionnement du syst\u00e8me", "correct": false}]}, {"id": 73, "question": "Lesquels des exemples suivants sont des proc\u00e9dures de contr\u00f4le qui prot\u00e8gent les ressources pr\u00e9cieuses d\u2019un syst\u00e8me d\u2019information hospitalier :", "options": [{"id": "73_A", "text": "Verrouillage automatique du syst\u00e8me dans les situations d\u2019urgence", "correct": true}, {"id": "73_B", "text": "L'ex\u00e9cution de certaines op\u00e9rations dans le syst\u00e8me en suivant strictement un ensemble d\u2019\u00e9tapes", "correct": false}, {"id": "73_C", "text": "Formation du personnel de l\u2019institution pour l\u2019ex\u00e9cution d\u2019op\u00e9rations sp\u00e9ciales dans le syst\u00e8me", "correct": true}, {"id": "73_D", "text": "L'ex\u00e9cution de certaines op\u00e9rations dans le syst\u00e8me uniquement dans des situations particuli\u00e8res", "correct": true}, {"id": "73_E", "text": "Acc\u00e8s libre des utilisateurs au syst\u00e8me", "correct": false}, {"id": "73_F", "text": "Fonctionnement du syst\u00e8me uniquement sur site, sans acc\u00e8s \u00e0 distance", "correct": false}, {"id": "73_G", "text": "Identification et \u00e9limination des faiblesses du syst\u00e8me", "correct": false}, {"id": "73_H", "text": "Fonctionnement du syst\u00e8me uniquement sur une base intranet, sans acc\u00e8s \u00e0 Internet", "correct": false}, {"id": "73_I", "text": "L'exigence d'authentification de l'utilisateur au d\u00e9but d'une session du syst\u00e8me", "correct": false}, {"id": "73_J", "text": "L'ex\u00e9cution des contr\u00f4les technologiques automatiquement, sans intervention humaine", "correct": false}]}, {"id": 74, "question": "Lesquelles des actions suivantes font partie du cycle d\u2019identi\ufb01cation / \u00e9valuation des violations de la s\u00e9curit\u00e9 :", "options": [{"id": "74_A", "text": "Comprendre le risque r\u00e9siduel en tant que tel", "correct": true}, {"id": "74_B", "text": "Ajout des nouvelles proc\u00e9dures de contr\u00f4le pour r\u00e9duire les risques identifi\u00e9s", "correct": false}, {"id": "74_C", "text": "Quantification de la virulence exprim\u00e9e par le degr\u00e9 de perturbation du syst\u00e8me caus\u00e9", "correct": true}, {"id": "74_D", "text": "Acceptation formelle des risques par les gestionnaires des ressources menac\u00e9es", "correct": true}, {"id": "74_E", "text": "Surveillance permanente de l\u2019activit\u00e9 du syst\u00e8me", "correct": false}, {"id": "74_F", "text": "Utilisation de syst\u00e8mes d\u2019assurance pour compenser les pertes mat\u00e9rielles caus\u00e9es par les incidents de s\u00e9curit\u00e9", "correct": false}, {"id": "74_G", "text": "Quantification de l\u2019impact exprim\u00e9 par le nombre d\u2019utilisateurs qui ne peuvent plus exercer leur activit\u00e9 normale", "correct": false}, {"id": "74_H", "text": "Constatation de l\u2019absence de la ressource touch\u00e9e", "correct": false}, {"id": "74_I", "text": "Am\u00e9lioration des proc\u00e9dures de contr\u00f4le pour r\u00e9duire les risques identifi\u00e9s", "correct": false}, {"id": "74_J", "text": "Quantification de l\u2019impact exprim\u00e9 par le nombre d\u2019ordinateurs touches", "correct": false}]}, {"id": 75, "question": "Parmi les \u00e9v\u00e9nements suivants, lesquels constituent des menaces pour la con\ufb01dentialit\u00e9 de l\u2019information contenue dans le syst\u00e8me d\u2019information de l\u2019h\u00f4pital :", "options": [{"id": "75_A", "text": "Erreur humaine lors de l'utilisation du syst\u00e8me", "correct": true}, {"id": "75_B", "text": "Dysfonctionnement de l'\u00e9quipement mat\u00e9riel", "correct": false}, {"id": "75_C", "text": "Surveillance des changements", "correct": true}, {"id": "75_D", "text": "Vol de mots de passe", "correct": true}, {"id": "75_E", "text": "Mise en place de comptes d\u2019utilisateurs distincts avec des droits d\u2019acc\u00e8s diff\u00e9rents aux fonctions du syst\u00e8me" ans le r\u00e9seau (IPDS) :", "options": [{"id": "78_A", "text": "Limitent le degr\u00e9 de connectivit\u00e9 entre le r\u00e9seau informatique interne et Internet sur la base de r\u00e8gles pr\u00e9d\u00e9finies", "correct": true}, {"id": "78_B", "text": "\u00c9tendent les r\u00e9seaux priv\u00e9s sur les r\u00e9seaux publics", "correct": false}, {"id": "78_C", "text": "Lancent d\u2019op\u00e9rations concr\u00e8tes pour \u00e9liminer les activit\u00e9s dangereuses", "correct": true}, {"id": "78_D", "text": "D\u00e9tectent les activit\u00e9s dangereuses", "correct": true}, {"id": "78_E", "text": "Utilisent une op\u00e9ration d\u2019identification avant que l\u2019ordinateur ne soit autoris\u00e9 \u00e0 connecter le logiciel au r\u00e9seau interne", "correct": false}, {"id": "78_F", "text": "Mettent en quarantaine les ordinateurs qui ont \u00e9t\u00e9 identifi\u00e9s avec des vuln\u00e9rabilit\u00e9s", "correct": false}, {"id": "78_G", "text": "Surveillent dynamique des vuln\u00e9rabilit\u00e9s des postes de travail", "correct": false}, {"id": "78_H", "text": "G\u00e9n\u00e8rent des alertes lorsque des activit\u00e9s dangereuses ont \u00e9t\u00e9 identifi\u00e9es", "correct": false}, {"id": "78_I", "text": "Suppriment le r\u00e9seau de l\u2019ordinateur \u00e0 partir duquel les activit\u00e9s dangereuses ont \u00e9t\u00e9 initi\u00e9es", "correct": false}, {"id": "78_J", "text": "Surveillent passivement le trafic r\u00e9seau", "correct": false}]}, {"id": 79, "question": "Parmi les \u00e9l\u00e9ments suivants, lesquels sont utilis\u00e9s pour \u00e9tablir les droits d\u2019acc\u00e8s des utilisateurs au syst\u00e8me d\u2019information hospitalier :", "options": [{"id": "79_A", "text": "Analyse de l\u2019efficacit\u00e9 hospitali\u00e8re", "correct": true}, {"id": "79_B", "text": "Nature des diagnostics trait\u00e9s", "correct": false}, {"id": "79_C", "text": "Type de donn\u00e9es cliniques", "correct": true}, {"id": "79_D", "text": "Intention de traiter des donn\u00e9es", "correct": true}, {"id": "79_E", "text": "\u00c2ge des donn\u00e9es", "correct": false}, {"id": "79_F", "text": "Cr\u00e9ation d\u2019une image favorable dans les m\u00e9dias locaux", "correct": false}, {"id": "79_G", "text": "Possibilit\u00e9 d\u2019attirer des sources de financement externes", "correct": false}, {"id": "79_H", "text": "Scolarit\u00e9", "correct": false}, {"id": "79_I", "text": "Position dans l\u2019institution", "correct": false}, {"id": "79_J", "text": "Anciennet\u00e9", "correct": false}]}, {"id": 80, "question": "Parmi les \u00e9l\u00e9ments suivants, lesquels sont utilis\u00e9s pour \u00e9tablir les droits d\u2019acc\u00e8s des utilisateurs au syst\u00e8me d\u2019information hospitalier : ", "options": [{"id": "80_A", "text": "Int\u00e9r\u00eats professionnels", "correct": true}, {"id": "80_B", "text": "Relation professionnelle avec la direction de l\u2019h\u00f4pital", "correct": false}, {"id": "80_C", "text": "Niveau de revenu", "correct": true}, {"id": "80_D", "text": "Politique institutionnelle", "correct": true}, {"id": "80_E", "text": "Relation avec les patients concern\u00e9s", "correct": false}, {"id": "80_F", "text": "Identification de nouveaux fournisseurs de m\u00e9dicaments et de mat\u00e9riel biologique", "correct": false}, {"id": "80_G", "text": "Facilitation de l\u2019audit externe", "correct": false}, {"id": "80_H", "text": "\u00c2ge", "correct": false}, {"id": "80_I", "text": "Cat\u00e9gorie de personnel \u00e0 laquelle ils appartiennent", "correct": false}, {"id": "80_J", "text": "Type de donn\u00e9es cliniques", "correct": false}]}];
        let allQuestions = [];
        let totalScore = 0, maxPossibleScore = 0;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function initQuiz() {
            allQuestions = JSON.parse(JSON.stringify(quizData));
            shuffleArray(allQuestions);
            allQuestions.forEach(q => shuffleArray(q.options));
            totalScore = 0; maxPossibleScore = 0;
            allQuestions.forEach(q => { q.options.forEach(o => { if (o.correct) maxPossibleScore++; }) });
            document.getElementById('btn-recommencer').style.display = 'none';
            document.getElementById('results').style.display = 'none';
            document.getElementById('nav-buttons').style.display = 'flex';
            renderPage();
        }

        function renderPage() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';
            
            allQuestions.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = 'q-' + q.id;
                
                const title = document.createElement('h3');
                title.className = 'question-title';
                title.textContent = `Q${q.id} - ${q.question}`;
                card.appendChild(title);
                
                const optionsGrid = document.createElement('div');
                optionsGrid.className = 'options-grid';
                
                q.options.forEach(opt => {
                    const label = document.createElement('label');
                    label.className = 'option-label';
                    label.id = 'label-' + opt.id;
                    
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.name = 'question-' + q.id;
                    checkbox.value = opt.id;
                    
                    const textNode = document.createTextNode(opt.text);
                    label.appendChild(checkbox);
                    label.appendChild(textNode);
                    
                    optionsGrid.appendChild(label);
                });
                card.appendChild(optionsGrid);
                container.appendChild(card);
            });

            document.getElementById('btn-valider').style.display = 'block';
            document.getElementById('results').style.display = 'none';
        }

        function validerReponses() {
            let pageScore = 0, pageMaxScore = 0;
            allQuestions.forEach(q => {
                q.options.forEach(opt => {
                    if (opt.correct) pageMaxScore++;
                    const checkbox = document.querySelector(`input[value="${opt.id}"]`);
                    const label = document.getElementById(`label-${opt.id}`);
                    
                    checkbox.disabled = true;
                    label.classList.add('disabled');
                    
                    if (checkbox.checked) {
                        if (opt.correct) { 
                            label.classList.add('is-correct'); 
                            pageScore++; 
                            totalScore++; 
                        } else { 
                            label.classList.add('is-incorrect'); 
                        }
                    } else {
                        if (opt.correct) { 
                            label.classList.add('missed-correct'); 
                        }
                    }
                });
            });
            
            const resultsDiv = document.getElementById('results');
            const scoreText = document.getElementById('score-text');
            const globalScoreText = document.getElementById('global-score-text');
            const percentage = pageMaxScore > 0 ? Math.round((pageScore / pageMaxScore) * 100) : 0;
            
            scoreText.textContent = `Score Total : ${pageScore} / ${pageMaxScore} (${percentage}%)`;
            globalScoreText.innerHTML = `Le bouton ci-dessous vous permet de mélanger les questions et de retenter votre chance !`;
            resultsDiv.style.display = 'block';
            document.getElementById('btn-valider').style.display = 'none';
            
            document.getElementById('nav-buttons').style.display = 'none';
            document.getElementById('btn-recommencer').style.display = 'block';
            resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        window.onload = initQuiz;
    </script>
