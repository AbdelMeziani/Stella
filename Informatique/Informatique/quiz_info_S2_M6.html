    <script>
        const quizData = [{"id": 101, "question": "Les syst\u00e8mes de d\u00e9clenchement des stimulateurs cardiaques (\u00ab\u00a0pacemaker trigger\u00a0\u00bb) sont caract\u00e9ris\u00e9s par les \u00e9nonc\u00e9s suivants :", "options": [{"id": "101_A", "text": "Ce sont des syst\u00e8mes de surveillance d\u2019un \u00e9quipement m\u00e9dical", "correct": true}, {"id": "101_B", "text": "Ils effectuent le r\u00e9glage et l\u2019\u00e9talonnage automatiques de l\u2019\u00e9quipement surveill\u00e9", "correct": false}, {"id": "101_C", "text": "L\u2019appareil surveille l\u2019activit\u00e9 cardiaque du patient", "correct": true}, {"id": "101_D", "text": "Ce sont des syst\u00e8mes de contr\u00f4le th\u00e9rapeutique", "correct": true}, {"id": "101_E", "text": "Ils d\u00e9clenchent le stimulateur lorsque des perturbations du rythme cardiaque sont d\u00e9tect\u00e9es", "correct": false}, {"id": "101_F", "text": "Ce sont des syst\u00e8mes d\u2019alerte/d\u2019avertissement", "correct": false}, {"id": "101_G", "text": "Ils corr\u00e8lent les connaissances cliniques dans une sp\u00e9cialit\u00e9 m\u00e9dicale particuli\u00e8re", "correct": false}, {"id": "101_H", "text": "Ils sont utilis\u00e9s par les patients qui portent des stimulateurs cardiaques", "correct": false}, {"id": "101_I", "text": "Ils utilisent des algorithmes de contr\u00f4le de la perfusion bas\u00e9s sur des mod\u00e8les pharmacocin\u00e9tiques", "correct": false}, {"id": "101_J", "text": "Ils utilisent des structures de donn\u00e9es compos\u00e9es de n\u0153uds et de connexions", "correct": false}]}, {"id": 102, "question": "L\u2019\u00e9tude des processus biologiques a\ufb01n de pouvoir les formaliser puis de d\u00e9velopper des mod\u00e8les et algorithmes appropri\u00e9s pour les simuler pr\u00e9sente les avantages suivants :", "options": [{"id": "102_A", "text": "Cr\u00e9ation de th\u00e9rapies et de m\u00e9dicaments adapt\u00e9s aux sp\u00e9cificit\u00e9s du patient", "correct": true}, {"id": "102_B", "text": "Compr\u00e9hension des m\u00e9canismes intrins\u00e8ques des processus biologiques et des r\u00e9ponses aux stimuli externes", "correct": false}, {"id": "102_C", "text": "Conception de d\u00e9p\u00f4ts de donn\u00e9es pouvant \u00eatre utilis\u00e9s ult\u00e9rieurement dans la recherche", "correct": true}, {"id": "102_D", "text": "Conception des th\u00e9rapies universelles et des m\u00e9dicaments qui fonctionnent correctement, quelles que soient les sp\u00e9cificit\u00e9s du patient", "correct": true}, {"id": "102_E", "text": "Conception des th\u00e9rapies efficaces, m\u00eame si les co\u00fbts des soins de sant\u00e9 augmentent", "correct": false}, {"id": "102_F", "text": "D\u00e9couverte de nouveaux traitements", "correct": false}, {"id": "102_G", "text": "Compr\u00e9hension plus correcte des processus de la maladie", "correct": false}, {"id": "102_H", "text": "Suivi en temps r\u00e9el des th\u00e9rapies prescrites et identification rapide des b\u00e9n\u00e9fices et des effets ind\u00e9sirables", "correct": false}, {"id": "102_I", "text": "Practication de la m\u00e9decine bas\u00e9e sur des preuves", "correct": false}, {"id": "102_J", "text": "Analyse des donn\u00e9es acquises par des m\u00e9thodes math\u00e9matiques et statistiques", "correct": false}]}, {"id": 103, "question": "Parmi les applications pratiques de l\u2019utilisation des m\u00e9thodes d\u2019informatisation dans la recherche m\u00e9dicale, on peut citer :", "options": [{"id": "103_A", "text": "D\u00e9veloppement des technologies pour l\u2019analyse intelligente d\u2019images et l\u2019identification de leur signification", "correct": true}, {"id": "103_B", "text": "Analyse des donn\u00e9es acquises par des m\u00e9thodes math\u00e9matiques et statistiques afin d\u2019extraire des informations \u00e9pid\u00e9miologiques", "correct": false}, {"id": "103_C", "text": "D\u00e9veloppement de syst\u00e8mes d\u2019aide \u00e0 la d\u00e9cision clinique CDSS", "correct": true}, {"id": "103_D", "text": "D\u00e9veloppement de syst\u00e8mes d\u2019assistance m\u00e9dicale CAD", "correct": true}, {"id": "103_E", "text": "D\u00e9veloppement de mod\u00e8les informatiques pour simuler des processus biologiques complexes, pour comprendre les m\u00e9canismes intrins\u00e8ques et les r\u00e9ponses aux stimuli externes", "correct": false}, {"id": "103_F", "text": "Cr\u00e9ation d\u2019entrep\u00f4ts de donn\u00e9es bas\u00e9s sur les dossiers m\u00e9dicaux \u00e9lectroniques des patients, qui peuvent ensuite \u00eatre utilis\u00e9s dans la recherche", "correct": false}, {"id": "103_G", "text": "\u00c9tablissement de sp\u00e9cifications techniques pour la normalisation des donn\u00e9es de sant\u00e9", "correct": false}, {"id": "103_H", "text": "\u00c9tablissement de sp\u00e9cifications techniques pour la codification et la classification des donn\u00e9es m\u00e9dicales", "correct": false}, {"id": "103_I", "text": "R\u00e9alisation des mod\u00e8les informatiques pour des exp\u00e9riences in vivo, \u00e9tablissement de protocoles et v\u00e9rification d\u2019hypoth\u00e8ses de travail", "correct": false}, {"id": "103_J", "text": "D\u00e9veloppement de la proc\u00e9dure-cadre pour cr\u00e9er le dossier m\u00e9dical \u00e9lectronique du patient", "correct": false}]}, {"id": 104, "question": "Lequel des logiciels suivants peut \u00eatre utilis\u00e9 pour l\u2019analyse des donn\u00e9es m\u00e9dicales par des m\u00e9thodes math\u00e9matiques et statistiques, a\ufb01n d\u2019extraire des informations \u00e9pid\u00e9miologiques :", "options": [{"id": "104_A", "text": "Pascal", "correct": true}, {"id": "104_B", "text": "SPSS", "correct": false}, {"id": "104_C", "text": "Adobe Lightroom", "correct": true}, {"id": "104_D", "text": "PowerPoint", "correct": true}, {"id": "104_E", "text": "Statistiques", "correct": false}, {"id": "104_F", "text": "R", "correct": false}, {"id": "104_G", "text": "C++", "correct": false}, {"id": "104_H", "text": "Epi-Info", "correct": false}, {"id": "10 0e9tectent les mouvements de la t\u00eate", "correct": false}, {"id": "106_I", "text": "Imprimante 3D", "correct": false}, {"id": "106_J", "text": "Fax, pour la transmission de donn\u00e9es enregistr\u00e9es", "correct": false}]}, {"id": 107, "question": "Laquelle des af\ufb01rmations suivantes caract\u00e9rise le concept de \u00ab r\u00e9alit\u00e9 augment\u00e9e \u00bb :", "options": [{"id": "107_A", "text": "Il s\u2019agit d\u2019une simulation interactive d\u2019un environnement imaginaire", "correct": true}, {"id": "107_B", "text": "Des informations suppl\u00e9mentaires superpos\u00e9es \u00e0 l\u2019image de l\u2019environnement r\u00e9el peuvent \u00eatre ajout\u00e9es \u00e0 des fins constructives", "correct": false}, {"id": "107_C", "text": "Il s\u2019agit d\u2019une simulation immersive d\u2019un environnement imaginaire", "correct": true}, {"id": "107_D", "text": "L\u2019environnement virtuel est r\u00e9aliste et rendu avec une pr\u00e9cision maximale", "correct": true}, {"id": "107_E", "text": "Les informations suppl\u00e9mentaires obtenues par traitement informatique se superposent \u00e0 l\u2019image de l\u2019environnement r\u00e9el", "correct": false}, {"id": "107_F", "text": "Des informations suppl\u00e9mentaires superpos\u00e9es \u00e0 l\u2019image de l\u2019environnement r\u00e9el peuvent \u00eatre ajout\u00e9es \u00e0 des fins destructrices", "correct": false}, {"id": "107_G", "text": "C\u2019est une variante particuli\u00e8re de la r\u00e9alit\u00e9 virtuelle", "correct": false}, {"id": "107_H", "text": "Il s\u2019agit d\u2019une simulation interactive d\u2019un environnement r\u00e9aliste", "correct": false}, {"id": "107_I", "text": "L\u2019utilisateur a la sensation de pr\u00e9sence, entour\u00e9 par l\u2019espace et capable d\u2019interagir avec les objets environnants", "correct": false}, {"id": "107_J", "text": "L\u2019environnement r\u00e9el est visualis\u00e9 directement ou indirectement", "correct": false}]}, {"id": 108, "question": "Les  des calculs et des graphiques", "correct": false}, {"id": "119_F", "text": "Contient des mod\u00e8les int\u00e9gr\u00e9s de travail", "correct": false}, {"id": "119_G", "text": "C\u2019est un programme sp\u00e9cialis\u00e9 pour l\u2019\u00e9dition de textes", "correct": false}, {"id": "119_H", "text": "Il est connu sous le nom de \"programme de calcul sur des tableaux\".", "correct": false}, {"id": "119_I", "text": "C\u2019est l\u2019un des composants de base du logiciel Office", "correct": false}, {"id": "119_J", "text": "Permet d\u2019ajouter des en-t\u00eates et des pieds de page", "correct": false}]}, {"id": 120, "question": "Parmi les options suivantes permettant d\u2019aligner du texte dans une cellule, lesquelles sont disponibles dans Microsoft Excel :", "options": [{"id": "120_A", "text": "Merge Cells", "correct": true}, {"id": "120_B", "text": "Bottom Align", "correct": false}, {"id": "120_C", "text": "Align Text Left", "correct": true}, {"id": "120_D", "text": "Center Text", "correct": true}, {"id": "120_E", "text": "Autofit", "correct": false}, {"id": "120_F", "text": "Middle Align", "correct": false}, {"id": "120_G", "text": "Merge and Center", "correct": false}, {"id": "120_H", "text": "Wrap Text", "correct": false}, {"id": "120_I", "text": "Split Cell", "correct": false}, {"id": "120_J", "text": "Top Align", "correct": false}]}];
        let allQuestions = [];
        let totalScore = 0, maxPossibleScore = 0;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function initQuiz() {
            allQuestions = JSON.parse(JSON.stringify(quizData));
            shuffleArray(allQuestions);
            allQuestions.forEach(q => shuffleArray(q.options));
            totalScore = 0; maxPossibleScore = 0;
            allQuestions.forEach(q => { q.options.forEach(o => { if (o.correct) maxPossibleScore++; }) });
            document.getElementById('btn-recommencer').style.display = 'none';
            document.getElementById('results').style.display = 'none';
            document.getElementById('nav-buttons').style.display = 'flex';
            renderPage();
        }

        function renderPage() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';
            
            allQuestions.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = 'q-' + q.id;
                
                const title = document.createElement('h3');
                title.className = 'question-title';
                title.textContent = `Q${q.id} - ${q.question}`;
                card.appendChild(title);
                
                const optionsGrid = document.createElement('div');
                optionsGrid.className = 'options-grid';
                
                q.options.forEach(opt => {
                    const label = document.createElement('label');
                    label.className = 'option-label';
                    label.id = 'label-' + opt.id;
                    
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.name = 'question-' + q.id;
                    checkbox.value = opt.id;
                    
                    const textNode = document.createTextNode(opt.text);
                    label.appendChild(checkbox);
                    label.appendChild(textNode);
                    
                    optionsGrid.appendChild(label);
                });
                card.appendChild(optionsGrid);
                container.appendChild(card);
            });

            document.getElementById('btn-valider').style.display = 'block';
            document.getElementById('results').style.display = 'none';
        }

        function validerReponses() {
            let pageScore = 0, pageMaxScore = 0;
            allQuestions.forEach(q => {
                q.options.forEach(opt => {
                    if (opt.correct) pageMaxScore++;
                    const checkbox = document.querySelector(`input[value="${opt.id}"]`);
                    const label = document.getElementById(`label-${opt.id}`);
                    
                    checkbox.disabled = true;
                    label.classList.add('disabled');
                    
                    if (checkbox.checked) {
                        if (opt.correct) { 
                            label.classList.add('is-correct'); 
                            pageScore++; 
                            totalScore++; 
                        } else { 
                            label.classList.add('is-incorrect'); 
                        }
                    } else {
                        if (opt.correct) { 
                            label.classList.add('missed-correct'); 
                        }
                    }
                });
            });
            
            const resultsDiv = document.getElementById('results');
            const scoreText = document.getElementById('score-text');
            const globalScoreText = document.getElementById('global-score-text');
            const percentage = pageMaxScore > 0 ? Math.round((pageScore / pageMaxScore) * 100) : 0;
            
            scoreText.textContent = `Score Total : ${pageScore} / ${pageMaxScore} (${percentage}%)`;
            globalScoreText.innerHTML = `Le bouton ci-dessous vous permet de mélanger les questions et de retenter votre chance !`;
            resultsDiv.style.display = 'block';
            document.getElementById('btn-valider').style.display = 'none';
            
            document.getElementById('nav-buttons').style.display = 'none';
            document.getElementById('btn-recommencer').style.display = 'block';
            resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        window.onload = initQuiz;
    </script>
