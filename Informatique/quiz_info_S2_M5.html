ptions": [{"id": "84_A", "text": "Radiographie par projection", "correct": true}, {"id": "84_B", "text": "Ultrasonographie", "correct": false}, {"id": "84_C", "text": "Tomodensitom\u00e9trie", "correct": true}, {"id": "84_D", "text": "Tomographie", "correct": true}, {"id": "84_E", "text": "\u00c9chographie", "correct": false}, {"id": "84_F", "text": "R\u00e9sonance magn\u00e9tique nucl\u00e9aire", "correct": false}, {"id": "84_G", "text": "Endoscopie", "correct": false}, {"id": "84_H", "text": "M\u00e9decine nucl\u00e9aire", "correct": false}, {"id": "84_I", "text": "\u00c9lastographie", "correct": false}, {"id": "84_J", "text": "CBCT", "correct": false}]}, {"id": 85, "question": "Lesquels des processus de communication suivants sont utilis\u00e9s pour le transfert de donn\u00e9es ?", "options": [{"id": "85_A", "text": "\u00c9change \u00e9lectronique de donn\u00e9es entre les syst\u00e8mes informatis\u00e9s d\u2019enregistrement des patients", "correct": true}, {"id": "85_B", "text": "Transmission des enregistrements ECG du lieu o\u00f9 ils ont \u00e9t\u00e9 effectu\u00e9s vers le service de cardiologie", "correct": false}, {"id": "85_C", "text": "Transfert des r\u00e9sultats des investigations au patient ou aux soignants", "correct": true}, {"id": "85_D", "text": "Transfert des rapports de n\u00e9cessit\u00e9 des sections au service administratif", "correct": true}, {"id": "85_E", "text": "Transmission d\u2019erreurs \u00e0 partir d\u2019\u00e9quipements m\u00e9dicaux", "correct": false}, {"id": "85_F", "text": "Transmission des contrats entre les services administratifs de l\u2019h\u00f4pital", "correct": false}, {"id": "85_G", "text": "Transfert des r\u00e9sultats des analyses du laboratoire de biochimie de l\u2019h\u00f4pital vers les services cliniques", "correct": false}, {"id": "85_H", "text": "Transmission d\u2019images radiologiques des h\u00f4pitaux locaux vers le CHU", "correct": false}, {"id": "85_I", "text": "Transfert de courriers et de rapports entre ues suivantes :", "options": [{"id": "100_A", "text": "Traitent l\u2019\u00e9tat de sant\u00e9 g\u00e9n\u00e9ral du patient, selon les protocoles standard", "correct": true}, {"id": "100_B", "text": "Signalent les contre-indications \u00e0 une proc\u00e9dure recommand\u00e9e qui n\u2019est pas li\u00e9e \u00e0 l\u2019\u00e9tat du patient", "correct": false}, {"id": "100_C", "text": "Ils sont utilis\u00e9s pour g\u00e9n\u00e9rer automatiquement le plan de tentative de traitement", "correct": true}, {"id": "100_D", "text": "Ils sont utilis\u00e9s apr\u00e8s que le plan de traitement final a \u00e9t\u00e9 \u00e9tabli et v\u00e9rifi\u00e9", "correct": true}, {"id": "100_E", "text": "Signalent d\u2019\u00e9v\u00e9nements planifi\u00e9s et \u00e0 compl\u00e9ter", "correct": false}, {"id": "100_F", "text": "Signalent les interactions ind\u00e9sirables entre les m\u00e9dicaments", "correct": false}, {"id": "100_G", "text": "Signalent les erreurs de dosage", "correct": false}, {"id": "100_H", "text": "Aucune autre v\u00e9rification par le m\u00e9decin du calendrier de traitement g\u00e9n\u00e9r\u00e9 n\u2019est requise", "correct": false}, {"id": "100_I", "text": "D\u00e9tectent toute incoh\u00e9rence, erreur ou omission existant dans le plan de traitement", "correct": false}, {"id": "100_J", "text": "Signalent les contre-indications possibles \u00e0 un m\u00e9dicament prescrit, lorsque le patient est allergique", "correct": false}]}];
        let allQuestions = [];
        let totalScore = 0, maxPossibleScore = 0;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function initQuiz() {
            allQuestions = JSON.parse(JSON.stringify(quizData));
            shuffleArray(allQuestions);
            allQuestions.forEach(q => shuffleArray(q.options));
            totalScore = 0; maxPossibleScore = 0;
            allQuestions.forEach(q => { q.options.forEach(o => { if (o.correct) maxPossibleScore++; }) });
            document.getElementById('btn-recommencer').style.display = 'none';
            document.getElementById('results').style.display = 'none';
            document.getElementById('nav-buttons').style.display = 'flex';
            renderPage();
        }

        function renderPage() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';
            
            allQuestions.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = 'q-' + q.id;
                
                const title = document.createElement('h3');
                title.className = 'question-title';
                title.textContent = `Q${q.id} - ${q.question}`;
                card.appendChild(title);
                
                const optionsGrid = document.createElement('div');
                optionsGrid.className = 'options-grid';
                
                q.options.forEach(opt => {
                    const label = document.createElement('label');
                    label.className = 'option-label';
                    label.id = 'label-' + opt.id;
                    
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.name = 'question-' + q.id;
                    checkbox.value = opt.id;
                    
                    const textNode = document.createTextNode(opt.text);
                    label.appendChild(checkbox);
                    label.appendChild(textNode);
                    
                    optionsGrid.appendChild(label);
                });
                card.appendChild(optionsGrid);
                container.appendChild(card);
            });

            document.getElementById('btn-valider').style.display = 'block';
            document.getElementById('results').style.display = 'none';
        }

        function validerReponses() {
            let pageScore = 0, pageMaxScore = 0;
            allQuestions.forEach(q => {
                q.options.forEach(opt => {
                    if (opt.correct) pageMaxScore++;
                    const checkbox = document.querySelector(`input[value="${opt.id}"]`);
                    const label = document.getElementById(`label-${opt.id}`);
                    
                    checkbox.disabled = true;
                    label.classList.add('disabled');
                    
                    if (checkbox.checked) {
                        if (opt.correct) { 
                            label.classList.add('is-correct'); 
                            pageScore++; 
                            totalScore++; 
                        } else { 
                            label.classList.add('is-incorrect'); 
                        }
                    } else {
                        if (opt.correct) { 
                            label.classList.add('missed-correct'); 
                        }
                    }
                });
            });
            
            const resultsDiv = document.getElementById('results');
            const scoreText = document.getElementById('score-text');
            const globalScoreText = document.getElementById('global-score-text');
            const percentage = pageMaxScore > 0 ? Math.round((pageScore / pageMaxScore) * 100) : 0;
            
            scoreText.textContent = `Score Total : ${pageScore} / ${pageMaxScore} (${percentage}%)`;
            globalScoreText.innerHTML = `Le bouton ci-dessous vous permet de mélanger les questions et de retenter votre chance !`;
            resultsDiv.style.display = 'block';
            document.getElementById('btn-valider').style.display = 'none';
            
            document.getElementById('nav-buttons').style.display = 'none';
            document.getElementById('btn-recommencer').style.display = 'block';
            resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        window.onload = initQuiz;
    </script>
