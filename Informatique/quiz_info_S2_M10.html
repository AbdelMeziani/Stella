<!DOCTYPE html>

<head>

    <title>Informatique Médicale - M10</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --correct-bg: #d4edda;
            --correct-border: #c3e6cb;
            --correct-text: #155724;
            --incorrect-bg: #f8d7da;
            --incorrect-border: #f5c6cb;
            --incorrect-text: #721c24;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; margin: 0; padding: 40px 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--primary-color); font-size: 2.5em; margin-bottom: 10px; }
        .nav-links { display: flex; justify-content: space-between; margin-bottom: 30px; margin-top: 20px; }
        .nav-links a { text-decoration: none; padding: 10px 20px; background-color: #2c3e50; color: white; border-radius: 5px; font-weight: bold; transition: background-color 0.2s; }
        .nav-links a:hover { background-color: #1a252f; }
        .revision-box { background-color: #fff3cd; color: #856404; padding: 20px; border-radius: 8px; border-left: 6px solid #ffeeba; margin-bottom: 30px; font-size: 1.1em; line-height: 1.5; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .revision-box h3 { margin-top: 0; color: #856404; margin-bottom: 10px; }
        .question-card { background: var(--card-bg); border-radius: 12px; padding: 30px; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 4px solid var(--accent-color); animation: fadeIn 0.5s ease; }
        .question-title { font-size: 1.3em; font-weight: 600; color: var(--primary-color); margin-top: 0; margin-bottom: 20px; line-height:1.4; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .option-label { display: flex; align-items: flex-start; padding: 12px 15px; background-color: #f8f9fa; border: 1px solid #e9ecef; border-radius: 8px; cursor: pointer; transition: all 0.2s ease; font-size: 1.05em; }
        .option-label:hover:not(.disabled) { background-color: #e2e6ea; border-color: #dae0e5; }
        .option-label input[type="checkbox"] { margin-top: 5px; margin-right: 15px; transform: scale(1.2); cursor: pointer; flex-shrink: 0; }
        .option-label.disabled { cursor: default; }
        .buttons-container { display: flex; gap: 20px; margin-top: 40px; }
        .btn { flex: 1; padding: 18px; color: white; border: none; border-radius: 8px; font-size: 1.2em; font-weight: bold; text-align: center; transition: all 0.3s; cursor:pointer; }
        .btn-valider { background-color: var(--accent-color); box-shadow: 0 4px 6px rgba(52, 152, 219, 0.3); }
        .btn-valider:hover { background-color: #2980b9; transform: translateY(-2px); }
        .btn-recommencer { background-color: #f39c12; display: none; margin-top: 20px; cursor: pointer; box-shadow: 0 4px 6px rgba(243, 156, 18, 0.3); }
        .btn-recommencer:hover { background-color: #d68910; transform: translateY(-2px); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .is-correct { background-color: var(--correct-bg) !important; border-color: var(--correct-border) !important; color: var(--correct-text); font-weight: 500; }
        .is-incorrect { background-color: var(--incorrect-bg) !important; border-color: var(--incorrect-border) !important; color: var(--incorrect-text); text-decoration: line-through; opacity: 0.8; }
        .missed-correct { background-color: var(--correct-bg) !important; border-color: var(--correct-border) !important; border-style: dashed !important; border-width: 2px !important; color: var(--correct-text); }
        #results { margin-top: 30px; padding: 20px; background: var(--card-bg); border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: none; animation: fadeIn 0.5s ease; }
        #score-text { font-size: 1.8em; color: var(--primary-color); font-weight: bold; margin: 0; }
        #global-score-text { font-size: 1.3em; color: #7f8c8d; margin-top: 10px; }
    </style>
</head>

observations sont situ\u00e9es pr\u00e8s d\u2019une ligne droite", "correct": false}, {"id": "195_I", "text": "La corr\u00e9lation est r\u00e9duite si les paires d\u2019observations sont situ\u00e9es pr\u00e8s d\u2019une ligne", "correct": false}, {"id": "195_J", "text": "La corr\u00e9lation est une mesure du degr\u00e9 d\u2019association lin\u00e9aire entre deux variables num\u00e9riques", "correct": false}]}, {"id": 196, "question": "S\u2019il existe une corr\u00e9lation entre 2 variables quantitatives, le nuage de points sur le diagramme de dispersion peut avoir l\u2019aspect suivant :", "options": [{"id": "196_A", "text": "Allong\u00e9 obliquement, vers le bas et vers la droite", "correct": true}, {"id": "196_B", "text": "Allong\u00e9 vers la droite", "correct": false}, {"id": "196_C", "text": "Allong\u00e9 et parall\u00e8le \u00e0 l\u2019axe horizontal", "correct": true}, {"id": "196_D", "text": "Allong\u00e9 obliquement, vers le bas et vers la gauche", "correct": true}, {"id": "196_E", "text": "Allong\u00e9 vers la gauche", "correct": false}, {"id": "196_F", "text": "Allong\u00e9 obliquement, vers la droite ou vers la gauche", "correct": false}, {"id": "196_G", "text": "Allong\u00e9 obliquement, vers le haut et vers la droite", "correct": false}, {"id": "196_H", "text": "Allong\u00e9 et parall\u00e8le \u00e0 l\u2019axe vertical", "correct": false}, {"id": "196_I", "text": "Distribue uniforme", "correct": false}, {"id": "196_J", "text": "Allong\u00e9 obliquement, vers le haut et vers la gauche", "correct": false}]}, {"id": 197, "question": "Lesquelles des d\u00e9clarations suivantes concernant la notion de covariance sont vraies :", "options": [{"id": "197_A", "text": "S\u2019il n\u2019y a pas de relation constante entre les deux variables, la covariance est nulle", "correct": true}, {"id": "197_B", "text": "La notion de covariance est similaire \u00e0 la notion de variance", "correct": false}, {"id": "197_C", "text": "Si les deux variables varient inversement  {"id": "198_F", "text": "Cela peut \u00eatre fait dans Excel en utilisant un graphique de type \u00ab\u00a0Combo\u00a0\u00bb", "correct": false}, {"id": "198_G", "text": "La variable d\u00e9pendante est repr\u00e9sent\u00e9e sur l\u2019axe vertical", "correct": false}, {"id": "198_H", "text": "La variable d\u00e9pendante est repr\u00e9sent\u00e9e sur l\u2019axe horizontal", "correct": false}, {"id": "198_I", "text": "La variable ind\u00e9pendante est repr\u00e9sent\u00e9e sur l\u2019axe horizontal", "correct": false}, {"id": "198_J", "text": "Cela peut \u00eatre fait dans Excel \u00e0 l\u2019aide d\u2019un graphique de type \u00ab\u00a0Scatter\u00a0\u00bb", "correct": false}]}, {"id": 199, "question": "Lesquelles des d\u00e9clarations suivantes concernant la droite de r\u00e9gression sont vraies :", "options": [{"id": "199_A", "text": "Elle est construite par la \u00ab\u00a0m\u00e9thode des plus grandes carr\u00e9s\u00a0\u00bb", "correct": true}, {"id": "199_B", "text": "Les distances verticales de chaque point \u00e0 la droite sont appel\u00e9es \u00ab\u00a0r\u00e9sidus\u00a0\u00bb", "correct": false}, {"id": "199_C", "text": "C\u2019est la droite qui maximise la somme des carr\u00e9s des \u00e9carts verticaux des points sur le graphique jusqu\u2019\u00e0 celle-ci", "correct": true}, {"id": "199_D", "text": "C\u2019est la droite qui minimise les distances moyennes des points du graphique jusqu\u2019\u00e0 celle-ci", "correct": true}, {"id": "199_E", "text": "C\u2019est la droite la mieux adapt\u00e9e pour un \u00e9chantillon de donn\u00e9es", "correct": false}, {"id": "199_F", "text": "C\u2019est la droite situ\u00e9e le plus loin de tous les points du graphique", "correct": false}, {"id": "199_G", "text": "Elle est construite par la \u00ab\u00a0m\u00e9thode des plus petits carr\u00e9s\u00a0\u00bb", "correct": false}, {"id": "199_H", "text": "C\u2019est la droite qui minimise les distances horizontales des points du graphique jusqu\u2019\u00e0 celle-ci", "correct": false}, {"id": "199_I", "text": "C\u2019est la droite qui minimise la somme des carr\u00e9s des \u00e9carts verticaux des points sur le graphique jusqu\u2019\u00e0 celle-ci", "correct": false}, {"id": "199_J", "text": "C\u2019est la droite qui, en moyenne, est situ\u00e9e le plus pr\u00e8s de tous les points du graphique", "correct": false}]}];
        let allQuestions = [];
        let totalScore = 0, maxPossibleScore = 0;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function initQuiz() {
            allQuestions = JSON.parse(JSON.stringify(quizData));
            shuffleArray(allQuestions);
            allQuestions.forEach(q => shuffleArray(q.options));
            totalScore = 0; maxPossibleScore = 0;
            allQuestions.forEach(q => { q.options.forEach(o => { if (o.correct) maxPossibleScore++; }) });
            document.getElementById('btn-recommencer').style.display = 'none';
            document.getElementById('results').style.display = 'none';
            document.getElementById('nav-buttons').style.display = 'flex';
            renderPage();
        }

        function renderPage() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';
            
            allQuestions.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = 'q-' + q.id;
                
                const title = document.createElement('h3');
                title.className = 'question-title';
                title.textContent = `Q${q.id} - ${q.question}`;
                card.appendChild(title);
                
                const optionsGrid = document.createElement('div');
                optionsGrid.className = 'options-grid';
                
                q.options.forEach(opt => {
                    const label = document.createElement('label');
                    label.className = 'option-label';
                    label.id = 'label-' + opt.id;
                    
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.name = 'question-' + q.id;
                    checkbox.value = opt.id;
                    
                    const textNode = document.createTextNode(opt.text);
                    label.appendChild(checkbox);
                    label.appendChild(textNode);
                    
                    optionsGrid.appendChild(label);
                });
                card.appendChild(optionsGrid);
                container.appendChild(card);
            });

            document.getElementById('btn-valider').style.display = 'block';
            document.getElementById('results').style.display = 'none';
        }

        function validerReponses() {
            let pageScore = 0, pageMaxScore = 0;
            allQuestions.forEach(q => {
                q.options.forEach(opt => {
                    if (opt.correct) pageMaxScore++;
                    const checkbox = document.querySelector(`input[value="${opt.id}"]`);
                    const label = document.getElementById(`label-${opt.id}`);
                    
                    checkbox.disabled = true;
                    label.classList.add('disabled');
                    
                    if (checkbox.checked) {
                        if (opt.correct) { 
                            label.classList.add('is-correct'); 
                            pageScore++; 
                            totalScore++; 
                        } else { 
                            label.classList.add('is-incorrect'); 
                        }
                    } else {
                        if (opt.correct) { 
                            label.classList.add('missed-correct'); 
                        }
                    }
                });
            });
            
            const resultsDiv = document.getElementById('results');
            const scoreText = document.getElementById('score-text');
            const globalScoreText = document.getElementById('global-score-text');
            const percentage = pageMaxScore > 0 ? Math.round((pageScore / pageMaxScore) * 100) : 0;
            
            scoreText.textContent = `Score Total : ${pageScore} / ${pageMaxScore} (${percentage}%)`;
            globalScoreText.innerHTML = `Le bouton ci-dessous vous permet de mélanger les questions et de retenter votre chance !`;
            resultsDiv.style.display = 'block';
            document.getElementById('btn-valider').style.display = 'none';
            
            document.getElementById('nav-buttons').style.display = 'none';
            document.getElementById('btn-recommencer').style.display = 'block';
            resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        window.onload = initQuiz;
    </script>
