s", "correct": true}, {"id": "14_G", "text": "cellules de Paneth", "correct": true}, {"id": "14_H", "text": "cellules muqueuses accessoires", "correct": false}, {"id": "14_I", "text": "cellules musculaires", "correct": false}, {"id": "14_J", "text": "cellules basales", "correct": true}]}, {"id": 15, "question": "Les ent\u00e9rocytes:", "options": [{"id": "15_A", "text": "montrent une condensation au niveau du p\u00f4le apical (plateau stri\u00e9)", "correct": true}, {"id": "15_B", "text": "pr\u00e9sentent une condensation au niveau du p\u00f4le basal", "correct": false}, {"id": "15_C", "text": "sont des cellules cylindriques hautes", "correct": true}, {"id": "15_D", "text": "montrent un cytoplasme intens\u00e9ment acidophile", "correct": true}, {"id": "15_E", "text": "ont un noyau ovale, situ\u00e9 au p\u00f4le basal", "correct": true}, {"id": "15_F", "text": "ont des cils", "correct": false}, {"id": "15_G", "text": "recouvrent l'ext\u00e9rieur des villosit\u00e9s intestinales", "correct": true}, {"id": "15_H", "text": "ne sont pr\u00e9sentes que dans le c\u00f4lon", "correct": false}, {"id": "15_I", "text": "sont des cellules cubiques", "correct": false}, {"id": "15_J", "text": "montrent un cytoplasme basophile", "correct": false}]}, {"id": 16, "question": "Les ent\u00e9rocytes:", "options": [{"id": "16_A", "text": "sont des cellules cylindriques (columnaries) jouant un r\u00f4le dans l'absorption", "correct": true}, {"id": "16_B", "text": "pr\u00e9sentent de microvillosit\u00e9s au p\u00f4le apical", "correct": true}, {"id": "16_C", "text": "montrent des granules endocrines dans le cytoplasme", "correct": false}, {"id": "16_D", "text": "ne sont pr\u00e9sentes que dans la muqueuse du gros intestin", "correct": false}, {"id": "16_E", "text": "sont pr\u00e9sentes dans la muqueuse de l'intestin gr\u00eale et du gros intestin", "correct": true}, {"id": "16_F", "text": "ne sont pr\u00e9sentes que dans la muqueuse de l'intestin gr\u00eale", "correct": false}, {"id": "16_G", "text": "n\u00e9cessitent une coloration sp\u00e9ciale pour l'identification", "correct": false}, {"id": "16_H", "text": "tapissent les villosit\u00e9s intestinales", "correct": true}, {"id": "16_I", "text": "sont situ\u00e9es sur la surface externe des glandes de Lieberkuhn", "correct": true}, {"id": "16_J", "text": "sont absentes au niveau de l'appendice", "correct": false}]}, {"id": 17, "question": "Les cellules caliciformes:", "options": [{"id": "17_A", "text": "montrent un cytoplasme extr\u00eamement p\u00e2le, en raison de la teneur en mucus", "correct": true}, {"id": "17_B", "text": "ont la forme d'un calice de fleur ou d'une coupe \u00e0 champagne", "correct": true}, {"id": "17_C", "text": "ont un noyau aplati au p\u00f4le basal", "correct": true}, {"id": "17_D", "text": "sont pr\u00e9sentes \u00e0 la surface des villosit\u00e9s intestinales", "correct": true}, {"id": "17_E", "text": "manquent dans le c\u00f4lon", "correct": false}, {"id": "17_F", "text": "sont absentes de l'intestin gr\u00eale", "correct": false}, {"id": "17_G", "text": "recouvrent l'ext\u00e9rieur des glandes de Lieberkuhn", "correct": true}, {"id": "17_H", "text": "manquent au niveau de l'appendice", "correct": false}, {"id": "17_I", "text": "ont un r\u00f4le neuroendocrinien", "correct": false}, {"id": "17_J", "text": "sont sp\u00e9cifiques de la muqueuse gastrique", "correct": false}]}, {"id": 18, "question": "L'intestin gr\u00eale:", "options": [{"id": "18_A", "text": "montre un muscle stri\u00e9 dans le tiers distal", "correct": false}, {"id": "18_B", "text": "montre des villosit\u00e9s intestinales", "correct": true}, {"id": "18_C", "text": "pr\u00e9sente 3 r\u00e9gions: duod\u00e9num, j\u00e9junum, il\u00e9on", "correct": true}, {"id": "18_D", "text": "pr\u00e9sente 4 tuniques concentriques: muqueuse, sous-muqueuse, musculaire, s\u00e9reuse", "correct": true}, {"id": "18_E", "text": "ne pr\u00e9sente pas la muscularis mucosae", "correct": false}, {"id": "18_F", "text": "pr\u00e9sente des microvillosit\u00e9s au p\u00f4le apical des ent\u00e9rocytes", "correct": true}, {"id": "18_G", "text": "a une couche musculaire plexiforme", "correct": false}, {"id": "18_H", "text": "montre les glandes de Lieberkuhn", "correct": true}, {"id": "18_I", "text": "montre les glandes de Lieberkuhn dans la sous-muqueuse", "correct": false}, {"id": "18_J", "text": "a des cils pr\u00e9sents au p\u00f4le apical des ent\u00e9rocytes", "correct": false}]}, {"id": 19, "question": "La muqueuse de l'intestin gr\u00eale:", "options": [{"id": "19_A", "text": "pr\u00e9sente un \u00e9pith\u00e9lium de surface cylindrique simple, h\u00e9t\u00e9rog\u00e8ne, de type s\u00e9cr\u00e9toire-absorbant", "correct": true}, {"id": "19_B", "text": "se compose de: l'\u00e9pith\u00e9lium, la lamina propria (chorion) et la musculeuse propre", "correct": false}, {"id": "19_C", "text": "se compose de: \u00e9pith\u00e9lium, chorion et muscularis mucosae", "correct": true}, {"id": "19_D", "text": "fait saillie pour former des glandes de Lieberkuhn", "correct": false}, {"id": "19_E", "text": "contient des structures qui augmentent/amplifient la surface de contact", "correct": true}, {"id": "19_F", "text": "s'invagine pour former des villosit\u00e9s intestinales", "correct": false}, {"id": "19_G", "text": "contient des structures qui diminuent la surface de contact", "correct": false}, {"id": "19_H", "text": "s'invagine pour former des glandes de Lieberkuhn", "correct": true}, {"id": "19_I", "text": "fait saillie pour former des villosit\u00e9s intestinales", "correct": true}, {"id": "19_J", "text": "pr\u00e9sente un \u00e9pith\u00e9lium de surface simple, cylindrique, homog\u00e8ne", "correct": false}]}, {"id": 20, "question": "La muqueuse de l'intestin gr\u00eale contient:", "options": [{"id": "20_A", "text": "glandes de Brunner", "correct": false}, {"id": "20_B", "text": "cellules apocrines", "correct": false}, {"id": "20_C", "text": "cellules caliciformes/cellules \u00e0 p\u00f4le ouvert", "correct": true}, {"id": "20_D", "text": "cellules myo\u00e9pith\u00e9liales", "correct": false}, {"id": "20_E", "text": "ent\u00e9rocytes (cellules absorbantes)", "correct": true}, {"id": "20_F", "text": "cellules ent\u00e9roendocrines", "correct": true}, {"id": "20_G", "text": "cellules de Paneth", "correct": true}, {"id": "20_H", "text": "cellules musculaires stri\u00e9es", "correct": false}, {"id": "20_I", "text": "cellules M", "correct": true}, {"id": "20_J", "text": "cellules \u00e0 s\u00e9cr\u00e9tion lipidique", "correct": false}]}, {"id": 21, "question": "Le gros intestin:", "options": [{"id": "21_A", "text": "pr\u00e9sente 4 tuniques concentriques: muqueuse, sous-muqueuse, musculaire, s\u00e9reuse", "correct": true}, {"id": "21_B", "text": "pr\u00e9sente 5 r\u00e9gions: caecum, c\u00f4lon, appendice, rectum, anus", "correct": true}, {"id": "21_C", "text": "ne pr\u00e9sente pas de villosit\u00e9s intestinales", "correct": true}, {"id": "21_D", "text": "ne pr\u00e9sente pas de microvillosit\u00e9s", "correct": false}, {"id": "21_E", "text": "ne contient pas de cellules caliciformes", "correct": false}, {"id": "21_F", "text": "montre des villosit\u00e9s intestinales", "correct": false}, {"id": "21_G", "text": "contient moins d'ent\u00e9rocytes", "correct": true}, {"id": "21_H", "text": "ne contient pas d'ent\u00e9rocytes", "correct": false}, {"id": "21_I", "text": "contient des cellules caliciformes extr\u00eamement nombreuses", "correct": true}, {"id": "21_J", "text": "n'a pas de glandes de Lieberkuhn", "correct": false}]}, {"id": 22, "question": "L'appendice il\u00e9o-caecal:", "options": [{"id": "22_A", "text": "a une muqueuse et une sous-muqueuse qui ne contiennent pas d'infiltrations lympho\u00efdes", "correct": false}, {"id": "22_B", "text": "n'a pas de glandes de Lieberkuhn", "correct": false}, {"id": "22_C", "text": "pr\u00e9sente une muscularis mucosae discontinue et interrompue", "correct": true}, {"id": "22_D", "text": "contient des cellules de Paneth", "correct": true}, {"id": "22_E", "text": "pr\u00e9sente des muscularis mucosae continue", "correct": false}, {"id": "22_F", "text": "ne pr\u00e9sente pas de villosit\u00e9s intestinales", "correct": true}, {"id": "22_G", "text": "pr\u00e9sente des glandes de Lieberkuhn (glandes tubulaires simples)", "correct": true}, {"id": "22_H", "text": "a une muqueuse et une sous-muqueuse contiennent de nombreuses infiltrations lympho\u00efdes", "correct": true}, {"id": "22_I", "text": "montre des villosit\u00e9s intestinales", "correct": false}, {"id": "22_J", "text": "ne contient pas de cellules de Paneth", "correct": false}]}, {"id": 23, "question": "L'acinus:", "options": [{"id": "23_A", "text": "est le composant excr\u00e9teur du salivon", "correct": false}, {"id": "23_B", "text": "le type s\u00e9reux montre des croissants s\u00e9reux, qui ne sont pas des artefacts de fixation", "correct": true}, {"id": "23_C", "text": "a une structure de sac form\u00e9e par des cellules s\u00e9cr\u00e9toires", "correct": true}, {"id": "23_D", "text": "a des cellules myo\u00e9pith\u00e9liales pr\u00e9sentes au p\u00f4le apical des cellules s\u00e9cr\u00e9toires", "correct": false}, {"id": "23_E", "text": "de type muqueux est constitu\u00e9 de cellules s\u00e9cr\u00e9tant des prot\u00e9ines", "correct": false}, {"id": "23_F", "text": "le type s\u00e9reux est constitu\u00e9 de cellules s\u00e9cr\u00e9tant de la mucine", "correct": false}, {"id": "23_G", "text": "peut \u00eatre de type muqueux", "correct": false}, {"id": "23_H", "text": "est le composant s\u00e9cr\u00e9toire du salivon", "correct": true}, {"id": "23_I", "text": "peut \u00eatre de type mixte", "correct": true}, {"id": "23_J", "text": "peut \u00eatre de type s\u00e9reux", "correct": true}]}, {"id": 24, "question": "Les canaux salivaires:", "options": [{"id": "24_A", "text": "type stri\u00e9 son sont bord\u00e9s par un simple \u00e9pith\u00e9lium cubique qui devient simple cylindrique", "correct": true}, {"id": "24_B", "text": "type excr\u00e9teur sont situ\u00e9s dans le tissu conjonctif interlobulaire et interlobaire", "correct": true}, {"id": "24_C", "text": "les types intercal\u00e9s sont plus nombreux dans les glandes salivaires s\u00e9reuses", "correct": false}, {"id": "24_D", "text": "type stri\u00e9 sont tapiss\u00e9s par un \u00e9pith\u00e9lium cubique bisstratifi\u00e9", "correct": false}, {"id": "24_E", "text": "le type stri\u00e9 assure la secretion de sodium et de bicarbonate", "correct": true}, {"id": "24_F", "text": "de type intercal\u00e9 sont tapiss\u00e9s d'\u00e9pith\u00e9lium cylindrique simple", "correct": false}, {"id": "24_G", "text": "de type stri\u00e9 assure la r\u00e9absorption du potassium", "correct": false}, {"id": "24_H", "text": "comprennent les canaux intercal\u00e9s, stri\u00e9s et excr\u00e9teurs", "correct": true}, {"id": "24_I", "text": "continuent la lumi\u00e8re de l'acinus (composante s\u00e9cr\u00e9toire)", "correct": true}, {"id": "24_J", "text": "type excr\u00e9teur sont situ\u00e9s dans le tissu conjonctif intralobulaire", "correct": false}]}, {"id": 25, "question": "La glande parotide:", "options": [{"id": "25_A", "text": "montre de grands canaux stri\u00e9s et est facilement mis en \u00e9vidence", "correct": true}, {"id": "25_B", "text": "est une grande (majeure) glande salivaire mixte", "correct": false}, {"id": "25_C", "text": "ont des quantit\u00e9s r\u00e9duites de tissu adipeux", "correct": false}, {"id": "25_D", "text": "montre des conduits intercal\u00e9s courts et larges", "correct": false}, {"id": "25_E", "text": "est une glande salivaire grande (majeure) s\u00e9reuse, paire", "correct": true}, {"id": "25_F", "text": "montre des unit\u00e9s s\u00e9cr\u00e9toires s\u00e9reuses entourant de nombreux canaux intercal\u00e9s", "correct": true}, {"id": "25_G", "text": "comprend dans sa structure le nerf facial (nerf cr\u00e2nien VII)", "correct": true}, {"id": "25_H", "text": "pr\u00e9sente principalement des acini muqueux", "correct": false}, {"id": "25_I", "text": "montre de petits canaux stri\u00e9s", "correct": false}, {"id": "25_J", "text": "comprend de grandes quantit\u00e9s de tissu adipeux", "correct": true}]}, {"id": 26, "question": "Les composants structurels du foie comprennent :", "options": [{"id": "26_A", "text": "la capsule fibreuse de Glisson", "correct": true}, {"id": "26_B", "text": "le stroma conjonctif", "correct": true}, {"id": "26_C", "text": "le parenchyme form\u00e9 par des cordons d'h\u00e9patocytes", "correct": true}, {"id": "26_D", "text": "le parenchyme constitu\u00e9 exclusivement de cellules de Kupffer", "correct": false}, {"id": "26_E", "text": "les espaces p\u00e9risinuso\u00efdaux connus sous le nom d'espaces Disse", "correct": true}, {"id": "26_F", "text": "les capillaires sinusoidaux dispos\u00e9s dans les espaces portes", "correct": false}, {"id": "26_G", "text": "les espaces p\u00e9risinuso\u00efdaux appel\u00e9s espaces de Glisson", "correct": false}, {"id": "26_H", "text": "les capillaires sinusoidaux dispos\u00e9s entre les cordons d'h\u00e9patocytes", "correct": true}, {"id": "26_I", "text": "le parenchyme constitu\u00e9 exclusivement de cellules de Ito", "correct": false}, {"id": "26_J", "text": "le stroma \u00e9pith\u00e9lial", "correct": false}]}, {"id": 27, "question": "Le lobule h\u00e9patique classique:", "options": [{"id": "27_A", "text": "est une masse tissulaire relativement hexagonale", "correct": true}, {"id": "27_B", "text": "est constitu\u00e9 de cordons d'h\u00e9patocytes dispos\u00e9s radialement autour de la veine centrolobulaire", "correct": true}, {"id": "27_C", "text": "pr\u00e9sente des veines centrolobulaires aux angles de l'hexagone au centre", "correct": false}, {"id": "27_D", "text": "est la modalit\u00e9 traditionnelle de description de l'organisation du parenchyme h\u00e9patique", "correct": true}, {"id": "27_E", "text": "est une masse tissulaire triangulaire", "correct": false}, {"id": "27_F", "text": "pr\u00e9sente un espace porte au centre", "correct": false}, {"id": "27_G", "text": "la veine centrolobulaire se trouve au centre", "correct": true}, {"id": "27_H", "text": "a une forme rhombo\u00efdale", "correct": false}, {"id": "27_I", "text": "son organisation est bas\u00e9e sur la distribution des branches de la veine porte et de l'art\u00e8re h\u00e9patique", "correct": true}, {"id": "27_J", "text": "est constitu\u00e9 de cordons d'h\u00e9patocytes d'une \u00e9paisseur \u00e9quivalente \u00e0 trois cellules", "correct": false}]}, {"id": 28, "question": "Les h\u00e9patocytes:", "options": [{"id": "28_A", "text": "sont de petites cellules sph\u00e9riques", "correct": false}, {"id": "28_B", "text": "ont de grands noyaux sph\u00e9riques et centraux", "correct": true}, {"id": "28_C", "text": "ont une faible capacit\u00e9 de r\u00e9g\u00e9n\u00e9ration", "correct": false}, {"id": "28_D", "text": "forment des cordons cellulaires anastomos\u00e9s", "correct": true}, {"id": "28_E", "text": "sont de grandes cellules polygonales", "correct": true}, {"id": "28_F", "text": "ont des noyaux petits, aplatis et situ\u00e9s \u00e0 la base", "correct": false}, {"id": "28_G", "text": "ont une dur\u00e9e de vie moyenne d'environ 5 mois", "correct": true}, {"id": "28_H", "text": "ont une capacit\u00e9 de r\u00e9g\u00e9n\u00e9ration consid\u00e9rable lorsque le parenchyme h\u00e9patique est d\u00e9truit", "correct": true}, {"id": "28_I", "text": "sont dispos\u00e9es en \u00eelots et en nids cellulaires", "correct": false}, {"id": "28_J", "text": "ont une dur\u00e9e de vie courte de quelques jours", "correct": false}]}, {"id": 29, "question": "Le pancr\u00e9as :", "options": [{"id": "29_A", "text": "int\u00e8gre la composante endocrine dispers\u00e9e dans la structure de la composante exocrine", "correct": false}, {"id": "29_B", "text": "se compose de deux \u00e9l\u00e9ments structurellement distincts", "correct": true}, {"id": "29_C", "text": "comprend une composante exocrine dispers\u00e9e dans la structure de la composante endocrine", "correct": true}, {"id": "29_D", "text": "a des fonctions exclusivement exocrines", "correct": false}, {"id": "29_E", "text": "a des fonctions exclusivement endocrines", "correct": false}, {"id": "29_F", "text": "synth\u00e9tise et s\u00e9cr\u00e8te des hormones pancr\u00e9atiques dans le sang", "correct": true}, {"id": "29_G", "text": "synth\u00e9tise et s\u00e9cr\u00e8te des enzymes dans le duod\u00e9num", "correct": true}, {"id": "29_H", "text": "synth\u00e9tise et s\u00e9cr\u00e8te des hormones glucocortico\u00efdes", "correct": false}, {"id": "29_I", "text": "est une glande exocrine et endocrine", "correct": true}, {"id": "29_J", "text": "synth\u00e9tise et s\u00e9cr\u00e8te des enzymes dans le j\u00e9num", "correct": false}]}, {"id": 30, "question": "Le pancr\u00e9as exocrine :", "options": [{"id": "30_A", "text": "est constitu\u00e9e de cellules s\u00e9cr\u00e9toires muqueuses, de forme sph\u00e9rique", "correct": false}, {"id": "30_B", "text": "poss\u00e8de des unit\u00e9s s\u00e9cr\u00e9toires de forme acineuse ou tubulo-acineuse", "correct": true}, {"id": "30_C", "text": "est une glande mixte, muqueuse et s\u00e9reuse.", "correct": false}, {"id": "30_D", "text": "ne poss\u00e8de pas de cellules myo\u00e9pith\u00e9liales", "correct": true}, {"id": "30_E", "text": "est constitu\u00e9e de cellules s\u00e9cr\u00e9toires dispos\u00e9es en cordons parall\u00e8les", "correct": false}, {"id": "30_F", "text": "est structurellement similaire \u00e0 la glande parotide", "correct": true}, {"id": "30_G", "text": "est une glande muqueuse", "correct": false}, {"id": "30_H", "text": "poss\u00e8de des cellules myo\u00e9pith\u00e9liales associ\u00e9es", "correct": false}, {"id": "30_I", "text": "est constitu\u00e9 de cellules s\u00e9cr\u00e9toires s\u00e9reuses pyramidales", "correct": true}, {"id": "30_J", "text": "est une glande s\u00e9reuse", "correct": true}]}, {"id": 31, "question": "L'\u00e9pith\u00e9lium respiratoire:", "options": [{"id": "31_A", "text": "peut se transformer, dans la bronchite cronique et la bronchectasie, en \u00e9pith\u00e9lium squameux simple", "correct": true}, {"id": "31_B", "text": "est pr\u00e9sent dans la muqueuse trach\u00e9ale", "correct": true}, {"id": "31_C", "text": "contient des cellules sensorielles olfactives", "correct": false}, {"id": "31_D", "text": "on la retrouve au niveau des bronchioles terminales", "correct": true}, {"id": "31_E", "text": "contient des cellules cylindriques avec de courtes microvillosit\u00e9s au p\u00f4le apical", "correct": false}, {"id": "31_F", "text": "tapisse la cavit\u00e9 nasale", "correct": true}, {"id": "31_G", "text": "contient des cellules de Clara non cili\u00e9es", "correct": false}, {"id": "31_H", "text": "couvre la surface luminale des cordes vocales et de l'\u00e9piglotte", "correct": false}, {"id": "31_I", "text": "contient des cellules caliciformes, qui synth\u00e9tisent et s\u00e9cr\u00e8tent du mucus", "correct": false}, {"id": "31_J", "text": "est compos\u00e9 de cinq types de cellules", "correct": true}]}, {"id": 32, "question": "Les cellules de l'\u00e9pith\u00e9lium respiratoire ont les caract\u00e9ristiques suivantes:", "options": [{"id": "32_A", "text": "les cellules basales ne sont pas tr\u00e8s visibles dans la coloration HE de routine", "correct": true}, {"id": "32_B", "text": "les cellules basales pr\u00e9sentent des noyaux petits et ronds et peu de cytoplasme", "correct": false}, {"id": "32_C", "text": "les cellules caliciformes sont facilement reconnaissables gr\u00e2ce aux granules de mucine accumul\u00e9s", "correct": true}, {"id": "32_D", "text": "les cellules de Bowman sont dispers\u00e9es parmi les cellules cili\u00e9es", "correct": false}, {"id": "32_E", "text": "les cellules cili\u00e9es sont des cellules cylindriques hautes avec des cils au p\u00f4le apical", "correct": true}, {"id": "32_F", "text": "les cellules avec la bordure en brosse sont de cellules cylindriques hautes avec des microvillosit\u00e9s", "correct": true}, {"id": "32_G", "text": "les petites cellules granuleuses sont des cellules endocrines et appartiennent au syst\u00e8me neuroendocrinien", "correct": true}, {"id": "32_H", "text": "les petites cellules granuleuses sont les plus nombreuses", "correct": false}, {"id": "32_I", "text": "les cellules \u00e0 bordure en brosse ont des cils courts", "correct": false}, {"id": "32_J", "text": "le nombre de cellules caliciformes diminue dans les processus inflammatoires chroniques", "correct": false}]}, {"id": 33, "question": "La trach\u00e9e:", "options": [{"id": "33_A", "text": "a une sous-muqueuse, compos\u00e9e de tissu conjonctif l\u00e2che", "correct": false}, {"id": "33_B", "text": "pr\u00e9sente une membrane basale, tr\u00e8s facile \u00e0 identifier dans la coloration HE de routine", "correct": false}, {"id": "33_C", "text": "pr\u00e9sente une sous-muqueuse, constitu\u00e9e de tissu conjonctif dense semi-ordonn\u00e9", "correct": false}, {"id": "33_D", "text": "pr\u00e9sente la lamina propria contient des glandes s\u00e9romuqueuses", "correct": true}, {"id": "33_E", "text": "pr\u00e9sente des cartilages trach\u00e9aux, qui s\u00e9parent la muqueuse de la sous-muqueuse", "correct": true}, {"id": "33_F", "text": "pr\u00e9sente une lamina propria contenant du tissu lympho\u00efde", "correct": false}, {"id": "33_G", "text": "pr\u00e9sente le muscle trach\u00e9al, qui s\u00e9pare la muqueuse de la sous-muqueuse", "correct": false}, {"id": "33_H", "text": "est bord\u00e9e par un \u00e9pith\u00e9lium cili\u00e9 cylindrique stratifi\u00e9", "correct": true}, {"id": "33_I", "text": "montre la sous-muqueuse contenant des glandes s\u00e9romuqueuses", "correct": true}, {"id": "33_J", "text": "pr\u00e9sente une lamina propria contenant des fibres de collag\u00e8ne et de nombreuses fibres \u00e9lastiques", "correct": true}]}, {"id": 34, "question": "Les alv\u00e9oles pulmonaires:", "options": [{"id": "34_A", "text": "contiennent des cellules de Clara", "correct": false}, {"id": "34_B", "text": "sont tapiss\u00e9s de cellules alv\u00e9olaires de type I, de type II et de cellules \u00e0 bordure en brosse", "correct": true}, {"id": "34_C", "text": "pr\u00e9sentent des septa interalv\u00e9olaires imperm\u00e9ables", "correct": false}, {"id": "34_D", "text": "pr\u00e9sentent du mucus \u00e0 la surface de l'\u00e9pith\u00e9lium alv\u00e9olaire", "correct": false}, {"id": "34_E", "text": "s'ouvrent au niveau des bronchioles terminales", "correct": true}, {"id": "34_F", "text": "contiennent des cellules neuroendocrines", "correct": false}, {"id": "34_G", "text": "repr\u00e9sentent les derni\u00e8res r\u00e9gions du syst\u00e8me respiratoire", "correct": true}, {"id": "34_H", "text": "sont s\u00e9par\u00e9es par des septa alv\u00e9olaires pr\u00e9sentant des pores", "correct": true}, {"id": "34_I", "text": "ont une surface totale d'environ 75 m2", "correct": true}, {"id": "34_J", "text": "il y en a entre 150 et 250 millions dans chaque poumon", "correct": false}]}, {"id": 35, "question": "Les alv\u00e9oles pulmonaires:", "options": [{"id": "35_A", "text": "sont tapiss\u00e9es, sur la majeure partie de leur surface, de cellules alv\u00e9olaires de type II", "correct": true}, {"id": "35_B", "text": "poss\u00e8dent un \u00e9pith\u00e9lium compos\u00e9 de cellules alv\u00e9olaires de type I, de type II, et de cellules de Kulchitsky", "correct": true}, {"id": "35_C", "text": "montrent du tissu lympho\u00efde au niveau des septa alv\u00e9olaires", "correct": false}, {"id": "35_D", "text": "ont la surface alv\u00e9olaire recouverte par le surfactant", "correct": true}, {"id": "35_E", "text": "ont un diam\u00e8tre d'environ 0,2 mm", "correct": true}, {"id": "35_F", "text": "sont regroup\u00e9s en faisceaux formant les sacs alv\u00e9olaires", "correct": true}, {"id": "35_G", "text": "se prolongent par la lumi\u00e8re des bronchioles respiratoires", "correct": false}, {"id": "35_H", "text": "sont recouverts, sur la plus grande partie de leur surface, de cellules alv\u00e9olaires de type I", "correct": false}, {"id": "35_I", "text": "montrent des fibres musculaires lisses au niveau des septa alv\u00e9olaires", "correct": false}, {"id": "35_J", "text": "sont s\u00e9par\u00e9es par des septa interalv\u00e9olaires epais", "correct": false}]}, {"id": 36, "question": "Les cellules de Clara:", "options": [{"id": "36_A", "text": "pr\u00e9sentent des cils au niveau du domaine apical", "correct": false}, {"id": "36_B", "text": "ont un domaine apical d'aspect caract\u00e9ristique, arrondi ou en forme de d\u00f4me", "correct": true}, {"id": "36_C", "text": "se trouvent au niveau de la trach\u00e9e", "correct": false}, {"id": "36_D", "text": "s\u00e9cr\u00e8tent de la s\u00e9rotonine, de la calcitonine et des cat\u00e9cholamines", "correct": false}, {"id": "36_E", "text": "contiennent des granules de mucine qui s'accumulent dans le cytoplasme", "correct": false}, {"id": "36_F", "text": "se trouvent au niveau des bronches segmentaires", "correct": false}, {"id": "36_G", "text": "se trouve au niveau des bronchioles terminales et respiratoires", "correct": true}, {"id": "36_H", "text": "sont dispers\u00e9es parmi les cellules cili\u00e9es des bronchioles", "correct": true}, {"id": "36_I", "text": "s\u00e9cr\u00e8tent un surfactant et une prot\u00e9ine de cellule de Clara", "correct": true}, {"id": "36_J", "text": "sont des cellules non cili\u00e9es", "correct": true}]}, {"id": 37, "question": "Le surfactant pulmonaire:", "options": [{"id": "37_A", "text": "contient des prot\u00e9ines tensioactives A, B, C et D", "correct": true}, {"id": "37_B", "text": "contient principalement de la prot\u00e9ine B tensioactive", "correct": false}, {"id": "37_C", "text": "pr\u00e9vient l'apparition du syndrome de d\u00e9tresse respiratoire du nouveau-n\u00e9", "correct": true}, {"id": "37_D", "text": "r\u00e9duit la tension superficielle \u00e0 l'interface air-\u00e9pith\u00e9lium", "correct": true}, {"id": "37_E", "text": "contient principalement de la prot\u00e9ine C tensioactive", "correct": false}, {"id": "37_F", "text": "emp\u00eache l'effondrement des alv\u00e9oles lors de l'expiration", "correct": true}, {"id": "37_G", "text": "est synth\u00e9tis\u00e9 apr\u00e8s la 35e semaine de grossesse", "correct": true}, {"id": "37_H", "text": "augmente la tension superficielle \u00e0 la surface des alv\u00e9oles pulmonaires", "correct": false}, {"id": "37_I", "text": "est synth\u00e9tis\u00e9 par les cellules avec la bordure en brosse", "correct": false}, {"id": "37_J", "text": "est synth\u00e9tis\u00e9 par les cellules cili\u00e9es", "correct": false}]}, {"id": 38, "question": "Les bronchioles terminales:", "options": [{"id": "38_A", "text": "ne pr\u00e9sentent pas de glandes sous-\u00e9pith\u00e9liales", "correct": true}, {"id": "38_B", "text": "montrent un \u00e9pith\u00e9lium cubique simple", "correct": true}, {"id": "38_C", "text": "comprennent dans l'\u00e9pith\u00e9lium des cellules appel\u00e9es cellules de Clara", "correct": true}, {"id": "38_D", "text": "Comprennent une couche musculaire lisse qui est quantitativement r\u00e9duite ou absente", "correct": false}, {"id": "38_E", "text": "se continuent avec les alv\u00e9oles pulmonaires", "correct": false}, {"id": "38_F", "text": "comprennent des cellules caliciformes dans l'\u00e9pith\u00e9lium, chez les fumeurs", "correct": false}, {"id": "38_G", "text": "participent aux \u00e9changes de gaz respiratoires", "correct": true}, {"id": "38_H", "text": "ont un \u00e9pith\u00e9lium recouvert de mucus", "correct": false}, {"id": "38_I", "text": "comprennent dans l'\u00e9pith\u00e9lium, parmi les cellules \u00e9pith\u00e9liales cili\u00e9es, les cellules de Clara", "correct": true}, {"id": "38_J", "text": "se continuent avec les bronchioles respiratoires", "correct": false}]}, {"id": 39, "question": "Les cellules alv\u00e9olaires (pneumocytes) de type I :", "options": [{"id": "39_A", "text": "ont une forme arrondie avec un noyau rond entour\u00e9 d'une quantit\u00e9 consid\u00e9rable de cytoplasme", "correct": false}, {"id": "39_B", "text": "sont des cellules squameuses tr\u00e8s aplaties", "correct": true}, {"id": "39_C", "text": "ont la membrane basale fusionn\u00e9e avec la membrane basale de la cellule endoth\u00e9liale capillaire", "correct": true}, {"id": "39_D", "text": "sont situ\u00e9es sur la lame basale", "correct": true}, {"id": "39_E", "text": "peuvent \u00eatre charg\u00e9s de particules de carbone, de silicium ou de pigment anthracotique", "correct": false}, {"id": "39_F", "text": "contiennent la prot\u00e9ine A du surfactant qui r\u00e9gule la s\u00e9cr\u00e9tion", "correct": false}, {"id": "39_G", "text": "participent aux \u00e9changes gazeux respiratoires", "correct": true}, {"id": "39_H", "text": "ont un aspect p\u00e2le et clair dans la coloration HE de routine", "correct": false}, {"id": "39_I", "text": "sont aussi appel\u00e9es cellules septales", "correct": false}, {"id": "39_J", "text": "couvrent 95% de la surface des alv\u00e9oles", "correct": true}]}, {"id": 40, "question": "La barri\u00e8re alv\u00e9olo-capillaire a les caract\u00e9ristiques suivantes:", "options": [{"id": "40_A", "text": "permet la diffusion des gaz respiratoires entre les alv\u00e9oles et les capillaires", "correct": true}, {"id": "40_B", "text": "comprend des cellules musculaires lisses", "correct": false}, {"id": "40_C", "text": "le liquide tissulaire peut s'accumuler et p\u00e9n\u00e9trer dans les alv\u00e9oles au niveau de la partie fine", "correct": true}, {"id": "40_D", "text": "le liquide tissulaire peut s'accumuler et p\u00e9n\u00e9trer dans les alv\u00e9oles au niveau de la partie \u00e9paisse", "correct": false}, {"id": "40_E", "text": "ne permet pas la diffusion des gaz respiratoires", "correct": false}, {"id": "40_F", "text": "a deux portions, une mince et une \u00e9paisse", "correct": true}, {"id": "40_G", "text": "les \u00e9changes gazeux se font principalement au niveau de la partie \u00e9paisse", "correct": false}, {"id": "40_H", "text": "contient des cellules de Clara", "correct": false}, {"id": "40_I", "text": "comprend: couche mince de surfactant, pneumocytes de type I, membrane basale, cellules endoth\u00e9liales", "correct": true}, {"id": "40_J", "text": "les \u00e9changes gazeux se font principalement au niveau de la partie fine", "correct": true}]}, {"id": 41, "question": "Les macrophages pulmonaires:", "options": [{"id": "41_A", "text": "sont situ\u00e9s \u00e0 la fois au niveau alv\u00e9olaire et septal", "correct": true}, {"id": "41_B", "text": "traversent l'arbre bronchique dans le mucus", "correct": true}, {"id": "41_C", "text": "appartiennent au syst\u00e8me des phagocytes mononucl\u00e9aires", "correct": true}, {"id": "41_D", "text": "participent \u00e0 la formation de la barri\u00e8re alv\u00e9olo-capillaire", "correct": false}, {"id": "41_E", "text": "pr\u00e9sentent une surface apicale en forme de d\u00f4me", "correct": false}, {"id": "41_F", "text": "contiennent des corps lamellaires", "correct": false}, {"id": "41_G", "text": "s\u00e9cr\u00e8tent la prot\u00e9ine D tensioactive impliqu\u00e9e dans la d\u00e9fense immunitaire", "correct": false}, {"id": "41_H", "text": "peuvent \u00eatre charg\u00e9s de particules de carbone, de silicium et de pigment anthracotique", "correct": true}, {"id": "41_I", "text": "peuvent phagocyter les globules rouges des alv\u00e9oles", "correct": true}, {"id": "41_J", "text": "sont aussi appel\u00e9es cellules de Kulchitsky", "correct": false}]}, {"id": 42, "question": "La trach\u00e9e:", "options": [{"id": "42_A", "text": "pr\u00e9sente une paroi organis\u00e9e en 4 tuniques", "correct": true}, {"id": "42_B", "text": "pr\u00e9sente une adventice qui est situ\u00e9e \u00e0 l'int\u00e9rieur des anneaux cartilagineux", "correct": false}, {"id": "42_C", "text": "pr\u00e9sente une couche cartilagineuse est constitu\u00e9e de 2-3 anneaux de cartilage \u00e9lastique", "correct": false}, {"id": "42_D", "text": "pr\u00e9sente une sous-muqueuse contient des glandes tubuloglom\u00e9rulaires", "correct": false}, {"id": "42_E", "text": "pr\u00e9sente une muqueuse qui est tapiss\u00e9e par un \u00e9pith\u00e9lium pavimenteux stratifi\u00e9", "correct": true}, {"id": "42_F", "text": "pr\u00e9sente une muqueuse qui est tapiss\u00e9e par un \u00e9pith\u00e9lium pseudostratifi\u00e9 cylindrique cili\u00e9", "correct": true}, {"id": "42_G", "text": "pr\u00e9sente une paroi organis\u00e9e en 6 tuniques", "correct": false}, {"id": "42_H", "text": "pr\u00e9sente une couche cartilagineuse qui est constitu\u00e9e de 6 \u00e0 20 anneaux de cartilage hyalin", "correct": true}, {"id": "42_I", "text": "pr\u00e9sente une sous-muqueuse qui contient des glandes constitu\u00e9es de mucus et de petits acini", "correct": true}, {"id": "42_J", "text": "pr\u00e9sente une adventice qui est situ\u00e9e \u00e0 la p\u00e9riph\u00e9rie des anneaux cartilagineux", "correct": false}]}, {"id": 43, "question": "Les cellules alv\u00e9olaires (pneumocytes) de type I:", "options": [{"id": "43_A", "text": "pr\u00e9sentent une surface apicale en forme de d\u00f4me", "correct": false}, {"id": "43_B", "text": "\u00e9tablissent entre eux des jonctions \u00e9tanches", "correct": true}, {"id": "43_C", "text": "sont aussi appel\u00e9es cellules avec une bordure en brosse", "correct": false}, {"id": "43_D", "text": "ne couvrent que 5% de la surface alv\u00e9olaire", "correct": false}, {"id": "43_E", "text": "\u00e9tablissent des jonctions serr\u00e9es avec d'autres types de cellules", "correct": true}, {"id": "43_F", "text": "contiennent des granules appel\u00e9s corps lamellaires", "correct": false}, {"id": "43_G", "text": "repr\u00e9sentent 40% du nombre total de cellules tapissant les alv\u00e9oles", "correct": false}, {"id": "43_H", "text": "d\u00e9passent dans la cavit\u00e9 alv\u00e9olaire", "correct": true}, {"id": "43_I", "text": "participent \u00e0 la formation de la barri\u00e8re alv\u00e9olo-capillaire", "correct": true}, {"id": "43_J", "text": "ne sont pas capables de division", "correct": true}]}, {"id": 44, "question": "L'\u00e9pith\u00e9lium trach\u00e9al:", "options": [{"id": "44_A", "text": "contient de petites cellules granulaires endocrines", "correct": true}, {"id": "44_B", "text": "contient de nombreuses cellules cili\u00e9es cylindriques", "correct": true}, {"id": "44_C", "text": "contient des cellules basales qui synth\u00e9tisent la bomb\u00e9sine", "correct": false}, {"id": "44_D", "text": "contient des cellules avec une bordure en brosse qui s\u00e9cr\u00e8tent des cat\u00e9cholamines", "correct": false}, {"id": "44_E", "text": "contient des cellules avec une bordure en brosse qui font partie du syst\u00e8me neuroendocrinien", "correct": true}, {"id": "44_F", "text": "contient quelques cellules avec une bordure en brosse", "correct": true}, {"id": "44_G", "text": "s'appelle aussi \u00e9pith\u00e9lium respiratoire", "correct": false}, {"id": "44_H", "text": "contient des cellules de Clara", "correct": false}, {"id": "44_I", "text": "est situ\u00e9 sur une membrane basale \u00e9paisse", "correct": true}, {"id": "44_J", "text": "contient de nombreuses cellules avec une bordure en brosse", "correct": false}]}, {"id": 45, "question": "L'\u00e9pith\u00e9lium respiratoire:", "options": [{"id": "45_A", "text": "est situ\u00e9 au niveau des bronches primaires", "correct": true}, {"id": "45_B", "text": "a trois principaux types de cellules", "correct": true}, {"id": "45_C", "text": "est un \u00e9pith\u00e9lium cili\u00e9 cylindrique simple", "correct": false}, {"id": "45_D", "text": "se trouve au niveau des bronchioles respiratoires", "correct": true}, {"id": "45_E", "text": "contient des cellules caliciformes", "correct": false}, {"id": "45_F", "text": "est situ\u00e9 au niveau des bronches segmentaires", "correct": false}, {"id": "45_G", "text": "a des cellules sensorielles olfactives", "correct": false}, {"id": "45_H", "text": "se situe au niveau des bronches lobaires", "correct": true}, {"id": "45_I", "text": "se trouve au niveau des canaux alv\u00e9olaires", "correct": false}, {"id": "45_J", "text": "montre les cellules de Clara", "correct": true}]}, {"id": 46, "question": "Les cellules alv\u00e9olaires (pneumocytes) de type II:", "options": [{"id": "46_A", "text": "entrent en contact par des jonctions serr\u00e9es avec des cellules alv\u00e9olaires de type I", "correct": true}, {"id": "46_B", "text": "pr\u00e9sentent une surface apicale en forme de d\u00f4me", "correct": false}, {"id": "46_C", "text": "sont de grandes cellules irr\u00e9guli\u00e8res avec des inclusions cytoplasmiques", "correct": false}, {"id": "46_D", "text": "pr\u00e9sentent, au niveau du domaine apical, plusieurs courtes microvillosit\u00e9s", "correct": true}, {"id": "46_E", "text": "repr\u00e9sentent environ 60% du total des cellules alv\u00e9olaires", "correct": true}, {"id": "46_F", "text": "servent de r\u00e9cepteurs pour la surveillance de la qualit\u00e9 de l'air", "correct": false}, {"id": "46_G", "text": "montrent les pores de Kohn", "correct": false}, {"id": "46_H", "text": "ne sont pas capables de division", "correct": true}, {"id": "46_I", "text": "participent \u00e0 la formation de la barri\u00e8re alv\u00e9olo-capillaire", "correct": false}, {"id": "46_J", "text": "contiennent dans leur cytoplasme un agent tensioactif appel\u00e9 surfactant", "correct": false}]}, {"id": 47, "question": "Les cellules alv\u00e9olaires (pneumocytes) de type II:", "options": [{"id": "47_A", "text": "d\u00e9passent dans la cavit\u00e9 alv\u00e9olaire", "correct": true}, {"id": "47_B", "text": "s\u00e9cr\u00e8tent du surfactant pulmonaire", "correct": true}, {"id": "47_C", "text": "sont des cellules cylindriques", "correct": false}, {"id": "47_D", "text": "sont des cellules pavimenteuses", "correct": false}, {"id": "47_E", "text": "sont des cellules cubiques", "correct": false}, {"id": "47_F", "text": "retiennent une partie du dioxyde de carbone", "correct": false}, {"id": "47_G", "text": "sont des cellules s\u00e9cr\u00e9toires", "correct": false}, {"id": "47_H", "text": "couvrent la majeure partie de la surface alv\u00e9olaire", "correct": false}, {"id": "47_I", "text": "contiennent des granules appel\u00e9s corps lamellaires", "correct": true}, {"id": "47_J", "text": "d\u00e9passent dans le septum interalv\u00e9olaire", "correct": true}]}, {"id": 48, "question": "Les cellules de Clara:", "options": [{"id": "48_A", "text": "s\u00e9cr\u00e8tent la prot\u00e9ine des cellules de Clara", "correct": true}, {"id": "48_B", "text": "pr\u00e9sentent des v\u00e9sicules de REN et de surfactant bien d\u00e9velopp\u00e9es", "correct": true}, {"id": "48_C", "text": "appartiennent au syst\u00e8me neuroendocrinien diffus", "correct": true}, {"id": "48_D", "text": "montrent le noyau situ\u00e9 \u00e0 la base", "correct": true}, {"id": "48_E", "text": "s\u00e9cr\u00e8tent un surfactant", "correct": false}, {"id": "48_F", "text": "pr\u00e9sentent un RER bien d\u00e9velopp\u00e9", "correct": false}, {"id": "48_G", "text": "montrent les granules de lipofuscine", "correct": false}, {"id": "48_H", "text": "se trouvent au niveau de la trach\u00e9e", "correct": false}, {"id": "48_I", "text": "appartiennent au syst\u00e8me phagocytaire mononucl\u00e9aire", "correct": false}, {"id": "48_J", "text": "ont des cils au p\u00f4le apical", "correct": false}]}, {"id": 49, "question": "Le surfactant pulmonaire a les caract\u00e9ristiques suivantes:", "options": [{"id": "49_A", "text": "est synth\u00e9tis\u00e9 au deuxi\u00e8me trimestre de la grossesse", "correct": true}, {"id": "49_B", "text": "contient un phospholipide appel\u00e9 dipalmitoyl-phosphatidylcholine", "correct": false}, {"id": "49_C", "text": "la plus abondante est la prot\u00e9ine A du surfactant", "correct": false}, {"id": "49_D", "text": "est synth\u00e9tis\u00e9 par les cellules alv\u00e9olaires de type I", "correct": false}, {"id": "49_E", "text": "le manque de surfactant entra\u00eene l'effondrement des alv\u00e9oles", "correct": true}, {"id": "49_F", "text": "la s\u00e9cr\u00e9tion de surfactant pulmonaire est influenc\u00e9e par la vasopressine", "correct": true}, {"id": "49_G", "text": "son absence provoque l'effondrement des alv\u00e9oles, provoquant le syndrome de d\u00e9tresse respiratoire", "correct": false}, {"id": "49_H", "text": "se trouve dans les corps lamellaires des cellules alv\u00e9olaires de type II", "correct": false}, {"id": "49_I", "text": "la plus abondante est la prot\u00e9ine C du surfactant", "correct": false}, {"id": "49_J", "text": "favorise la circulation capillaire alv\u00e9olaire", "correct": true}]}, {"id": 50, "question": "La trach\u00e9e:", "options": [{"id": "50_A", "text": "est un conduit d'air long et rigide", "correct": true}, {"id": "50_B", "text": "pr\u00e9sente une lumi\u00e8re ferm\u00e9e gr\u00e2ce \u00e0 la disposition des anneaux cartilagineux", "correct": true}, {"id": "50_C", "text": "pr\u00e9sente une lumi\u00e8re ouverte en raison de la disposition des anneaux cartilagineux", "correct": true}, {"id": "50_D", "text": "s'\u00e9tend du larynx au milieu du thorax, o\u00f9 il se divise en deux bronches secondaires", "correct": false}, {"id": "50_E", "text": "s'\u00e9tend du larynx au milieu du thorax, o\u00f9 il se divise en deux bronches principales", "correct": false}, {"id": "50_F", "text": "montre le cartilage hyalin en forme de fer \u00e0 cheval / lettre C", "correct": false}, {"id": "50_G", "text": "montre le cartilage \u00e9lastique en forme de fer \u00e0 cheval / lettre C", "correct": false}, {"id": "50_H", "text": "pr\u00e9sente une paroi organis\u00e9e en 4 tuniques", "correct": false}, {"id": "50_I", "text": "est un conduit d'air court et flexible", "correct": false}, {"id": "50_J", "text": "pr\u00e9sente une paroi organis\u00e9e en 5 tuniques", "correct": true}]}, {"id": 51, "question": "D'un point de vue structurel, le rein pr\u00e9sente:", "options": [{"id": "51_A", "text": "capsule avec une couche externe constitu\u00e9e de fibroblastes et de fibres de collag\u00e8ne", "correct": false}, {"id": "51_B", "text": "capsule avec une couche interne constitu\u00e9e de myofibroblastes", "correct": false}, {"id": "51_C", "text": "capsule avec une couche interne constitu\u00e9e de fibroblastes et de fibres de collag\u00e8ne", "correct": false}, {"id": "51_D", "text": "capsule dont la couche externe est constitu\u00e9e de myofibroblastes", "correct": true}, {"id": "51_E", "text": "des tubes rectilignes, des tubes collecteurs et un r\u00e9seau particulier de capillaires, au niveau de la m\u00e9dullaire", "correct": true}, {"id": "51_F", "text": "corpuscules r\u00e9naux et leurs tubules associ\u00e9s, au niveau du cortex", "correct": false}, {"id": "51_G", "text": "tubes droits, tubes collecteurs et vasa recta, au niveau de la zone corticale", "correct": false}, {"id": "51_H", "text": "macroscopiquement deux zones: zone corticale (cortex) et zone m\u00e9dullaire", "correct": false}, {"id": "51_I", "text": "corpuscules r\u00e9naux et leurs tubes associ\u00e9s, au niveau de la zone m\u00e9dullaire", "correct": true}, {"id": "51_J", "text": "macroscopiquement trois zones: glom\u00e9rulaire, fasciculaire et r\u00e9ticul\u00e9e", "correct": true}]}, {"id": 52, "question": "Les n\u00e9phrons:", "options": [{"id": "52_A", "text": "constituent les unit\u00e9s morphofonctionnelles du rein", "correct": false}, {"id": "52_B", "text": "sont responsables de la production de lymphe", "correct": false}, {"id": "52_C", "text": "consistent exclusivement d'un syst\u00e8me de tubes", "correct": true}, {"id": "52_D", "text": "sont responsables de la production d'urine", "correct": false}, {"id": "52_E", "text": "sont constitu\u00e9s d'acini et d'un syst\u00e8me de canaux", "correct": false}, {"id": "52_F", "text": "sont au nombre d'environ deux millions dans les deux reins", "correct": false}, {"id": "52_G", "text": "proviennent de primordiums identiques", "correct": false}, {"id": "52_H", "text": "sont constitu\u00e9s du corpuscule r\u00e9nal et d'un syst\u00e8me de tubules", "correct": true}, {"id": "52_I", "text": "sont au nombre d'environ deux mille dans les deux reins", "correct": false}, {"id": "52_J", "text": "proviennent de primordiums diff\u00e9rents et deviennent plus tard connect\u00e9s", "correct": true}]}, {"id": 53, "question": "L'appareil de filtrage du rein:", "options": [{"id": "53_A", "text": "s'appelle aussi la barri\u00e8re h\u00e9mato-enc\u00e9phalique", "correct": false}, {"id": "53_B", "text": "comprend des cellules sp\u00e9cialis\u00e9es appel\u00e9es podocytes", "correct": true}, {"id": "53_C", "text": "comprend des cellules sp\u00e9cialis\u00e9es appel\u00e9es cellules \u00e9pith\u00e9liales r\u00e9ticulaires stromales", "correct": false}, {"id": "53_D", "text": "est constitu\u00e9 de la membrane basale glom\u00e9rulaire (BMG)", "correct": true}, {"id": "53_E", "text": "est constitu\u00e9 exclusivement de m\u00e9soth\u00e9lium", "correct": false}, {"id": "53_F", "text": "est constitu\u00e9 exclusivement du feuillet pari\u00e9tal de la capsule de Bowman", "correct": false}, {"id": "53_G", "text": "n'inclut pas la membrane basale glom\u00e9rulaire (MBM)", "correct": true}, {"id": "53_H", "text": "est constitu\u00e9 par la feuillet visc\u00e9rale de la capsule de Bowman", "correct": true}, {"id": "53_I", "text": "est constitu\u00e9 par l'endoth\u00e9lium des capillaires glom\u00e9rulaires", "correct": false}, {"id": "53_J", "text": "s'appelle aussi barri\u00e8re de filtration glom\u00e9rulaire", "correct": true}]}, {"id": 54, "question": "Le corpuscule r\u00e9nal:", "options": [{"id": "54_A", "text": "repr\u00e9sente la derni\u00e8re partie du n\u00e9phron", "correct": true}, {"id": "54_B", "text": "comprend un composant vasculaire, repr\u00e9sent\u00e9 par une boule de 10 \u00e0 20 anses capillaires (glom\u00e9rule)", "correct": true}, {"id": "54_C", "text": "comprend une composante m\u00e9sangiale, repr\u00e9sent\u00e9e par la capsule de Bowman", "correct": true}, {"id": "54_D", "text": "comprend une composante vasculaire, repr\u00e9sent\u00e9e par les cellules m\u00e9sangiales", "correct": false}, {"id": "54_E", "text": "comprend un composant vasculaire, repr\u00e9sent\u00e9 par la capsule de Bowman", "correct": false}, {"id": "54_F", "text": "repr\u00e9sente la premi\u00e8re partie du n\u00e9phron", "correct": true}, {"id": "54_G", "text": "comprend une composante \u00e9pith\u00e9liale, repr\u00e9sent\u00e9e par les cellules m\u00e9sangiales", "correct": false}, {"id": "54_H", "text": "comprend un composant \u00e9pith\u00e9lial, repr\u00e9sent\u00e9 par la capsule de Bowman", "correct": false}, {"id": "54_I", "text": "comprend une composante m\u00e9sangiale, repr\u00e9sent\u00e9e par les cellules m\u00e9sangiales et leur matrice", "correct": false}, {"id": "54_J", "text": "est une structure sph\u00e9rique", "correct": false}]}, {"id": 55, "question": "Les n\u00e9phrons du cortex r\u00e9nal:", "options": [{"id": "55_A", "text": "sont de trois types", "correct": false}, {"id": "55_B", "text": "comprennent les n\u00e9phrons dans le bassinet du rein", "correct": true}, {"id": "55_C", "text": "sont class\u00e9s selon la localisation des corpuscules r\u00e9naux au niveau de la m\u00e9dullaire", "correct": true}, {"id": "55_D", "text": "sont de deux types", "correct": false}, {"id": "55_E", "text": "comprennent les n\u00e9phrons au niveau des rayons m\u00e9dullaires", "correct": true}, {"id": "55_F", "text": "ne comprennent pas les n\u00e9phrons juxtam\u00e9dullaires", "correct": false}, {"id": "55_G", "text": "comprennent les n\u00e9phrons juxtam\u00e9dullaires", "correct": false}, {"id": "55_H", "text": "comprennent les n\u00e9phrons sous-capsulaires/corticaux", "correct": false}, {"id": "55_I", "text": "sont class\u00e9s selon la localisation des corpuscules r\u00e9naux au niveau cortical", "correct": true}, {"id": "55_J", "text": "comprennent les n\u00e9phrons corticaux interm\u00e9diaires/moyens", "correct": false}]}, {"id": 56, "question": "Le m\u00e9sangium du corpuscule r\u00e9nal:", "options": [{"id": "56_A", "text": "est constitu\u00e9 de cellules m\u00e9sangiales situ\u00e9es exclusivement \u00e0 l'int\u00e9rieur du corpuscule", "correct": true}, {"id": "56_B", "text": "est constitu\u00e9 de cellules myo\u00e9pith\u00e9liales", "correct": false}, {"id": "56_C", "text": "n'est pas \u00e9vident au niveau des interstices entre les capillaires glom\u00e9rulaires", "correct": false}, {"id": "56_D", "text": "n'est pas \u00e9vident au niveau de la base vasculaire du glom\u00e9rule", "correct": true}, {"id": "56_E", "text": "est plus \u00e9vidente au niveau de la base vasculaire du glom\u00e9rule", "correct": false}, {"id": "56_F", "text": "est constitu\u00e9 par la matrice extracellulaire des cellules m\u00e9sangiales", "correct": false}, {"id": "56_G", "text": "est plus \u00e9vidente au niveau des interstices entre les capillaires glom\u00e9rulaires", "correct": true}, {"id": "56_H", "text": "est constitu\u00e9 de cellules \u00e9pith\u00e9liales au niveau de la capsule de Bowmann", "correct": false}, {"id": "56_I", "text": "est constitu\u00e9 de cellules m\u00e9sangiales entour\u00e9es par la membrane basale glom\u00e9rulaire", "correct": true}, {"id": "56_J", "text": "comprend des cellules situ\u00e9es au p\u00f4le vasculaire du corpuscule r\u00e9nal, appel\u00e9es cellules lacis", "correct": true}]}, {"id": 57, "question": "Le tubule contourn\u00e9 r\u00e9nal proximal:", "options": [{"id": "57_A", "text": "pr\u00e9sente un \u00e9pith\u00e9lium avec une bordure en brosse compos\u00e9 de microvillosit\u00e9s", "correct": false}, {"id": "57_B", "text": "ne pr\u00e9sente pas des plis sur les faces lat\u00e9rales des cellules \u00e9pith\u00e9liales", "correct": false}, {"id": "57_C", "text": "contr\u00f4le l'osmolarit\u00e9 urinaire finale", "correct": true}, {"id": "57_D", "text": "montre un \u00e9pith\u00e9lium \u00e0 complexes jonctionnels, form\u00e9 par une jonction serr\u00e9e et une zonule adh\u00e9rente", "correct": false}, {"id": "57_E", "text": "pr\u00e9sente un \u00e9pith\u00e9lium stri\u00e9 basal, compos\u00e9 de RER bien d\u00e9velopp\u00e9", "correct": true}, {"id": "57_F", "text": "a un \u00e9pith\u00e9lium stri\u00e9 basal, constitu\u00e9 de mitochondries allong\u00e9es concentr\u00e9es dans les extensions basales", "correct": false}, {"id": "57_G", "text": "pr\u00e9sente un \u00e9pith\u00e9lium \u00e0 bordure en brosse, compos\u00e9 de longs cils", "correct": true}, {"id": "57_H", "text": "est le segment le plus important pour le processus de r\u00e9absorption", "correct": false}, {"id": "57_I", "text": "pr\u00e9sente un \u00e9pith\u00e9lium avec des complexes jonctionnels, form\u00e9s par des contacts focaux", "correct": true}, {"id": "57_J", "text": "pr\u00e9sente un \u00e9pith\u00e9lium avec plis, situ\u00e9 sur les faces lat\u00e9rales des cellules", "correct": false}]}, {"id": 58, "question": "La structure g\u00e9n\u00e9rale du rein:", "options": [{"id": "58_A", "text": "comprend un hile, \u00e0 travers lequel passent les vaisseaux r\u00e9naux et les nerfs et l'uret\u00e8re sort", "correct": false}, {"id": "58_B", "text": "comprend une zone externe de couleur p\u00e2le appel\u00e9e la m\u00e9dullaire", "correct": true}, {"id": "58_C", "text": "comprend une zone interne rouge-brun appel\u00e9e cortex", "correct": false}, {"id": "58_D", "text": "comprend un r\u00e9seau particulier de capillaires (vasa recta) dans la m\u00e9dullaire", "correct": false}, {"id": "58_E", "text": "comprend une zone externe rouge-brun appel\u00e9e cortex (corticale)", "correct": false}, {"id": "58_F", "text": "comprend une s\u00e9rie de stries verticales, appel\u00e9es rayons corticaux", "correct": true}, {"id": "58_G", "text": "comprend une zone int\u00e9rieure de couleur p\u00e2le appel\u00e9e la m\u00e9dullaire", "correct": false}, {"id": "58_H", "text": "comprend un hile, au niveau duquel sont pr\u00e9sents des corpuscules r\u00e9naux", "correct": false}, {"id": "58_I", "text": "comprend une s\u00e9rie de stries verticales, appel\u00e9es rayons Ferrein (rayons m\u00e9dullaires)", "correct": true}, {"id": "58_J", "text": "comprend un r\u00e9seau particulier de capillaires (vasa recta) dans le cortex", "correct": false}]}, {"id": 59, "question": "Le tissu interstitiel r\u00e9nal:", "options": [{"id": "59_A", "text": "entoure les n\u00e9phrons, les tubules et les vaisseaux sanguins et lymphatiques", "correct": true}, {"id": "59_B", "text": "repr\u00e9sente environ 20% du volume de la zone m\u00e9dullaire et de la papille r\u00e9nale", "correct": false}, {"id": "59_C", "text": "est constitu\u00e9 de deux types de cellules interstitielles: les cellules de type fibroblaste et les macrophages", "correct": false}, {"id": "59_D", "text": "repr\u00e9sente environ 7% du volume de la corticale r\u00e9nale", "correct": false}, {"id": "59_E", "text": "montre principalement des cellules interstitielles semblables \u00e0 des myofibroblastes, au niveau de la m\u00e9dullaire", "correct": false}, {"id": "59_F", "text": "repr\u00e9sente environ 7% du volume de la zone m\u00e9dullaire r\u00e9nale", "correct": false}, {"id": "59_G", "text": "repr\u00e9sente environ 20% du volume de l'aire corticale", "correct": false}, {"id": "59_H", "text": "est constitu\u00e9 exclusivement de myofibroblastes", "correct": true}, {"id": "59_I", "text": "montre deux types de cellules interstitielles: les cellules de type chondroblaste et les macrophages", "correct": true}, {"id": "59_J", "text": "montre surtout des cellules interstitielles similaires aux myofibroblastes, au niveau cortical", "correct": true}]}, {"id": 60, "question": "La membrane basale glom\u00e9rulaire r\u00e9nale:", "options": [{"id": "60_A", "text": "fonctionne comme une barri\u00e8re physique", "correct": true}, {"id": "60_B", "text": "pr\u00e9sente la lamina rara externa (lucida) adjacente \u00e0 l'endoth\u00e9lium capillaire", "correct": false}, {"id": "60_C", "text": "ne fonctionne pas comme un filtre ionique s\u00e9lectif", "correct": false}, {"id": "60_D", "text": "fonctionne comme un filtre ionique s\u00e9lectif", "correct": true}, {"id": "60_E", "text": "montre la lamina rara externa (lucida) adjacente aux extensions des podocytes", "correct": true}, {"id": "60_F", "text": "ne fonctionne pas comme une barri\u00e8re physique", "correct": false}, {"id": "60_G", "text": "pr\u00e9sente la lamina rara interna (lucida) adjacente \u00e0 l'endoth\u00e9lium capillaire", "correct": false}, {"id": "60_H", "text": "pr\u00e9sente lamina densa, entre deux lamina rara (lucida) externe et interne", "correct": true}, {"id": "60_I", "text": "pr\u00e9sente la lamina rara interna (lucida) adjacente aux extensions des podocytes", "correct": false}, {"id": "60_J", "text": "pr\u00e9sente la lamina rara (lucida) qui se positionne entre les deux lamina densa", "correct": false}]}];
        let allQuestions = [], currentQuestions = [], currentPage = 0;
        const questionsPerPage = 20;
        let totalScore = 0, maxPossibleScore = 0;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function initQuiz() {
            allQuestions = JSON.parse(JSON.stringify(quizData));
            shuffleArray(allQuestions);
            allQuestions.forEach(q => shuffleArray(q.options));
            currentPage = 0; totalScore = 0; maxPossibleScore = 0;
            allQuestions.forEach(q => { q.options.forEach(o => { if (o.correct) maxPossibleScore++; }) });
            document.getElementById('btn-recommencer').style.display = 'none';
            document.getElementById('results').style.display = 'none';
            document.getElementById('nav-buttons').style.display = 'flex';
            renderPage();
        }

        function updateProgress() {
            const totalPages = Math.ceil(allQuestions.length / questionsPerPage);
            const percent = ((currentPage) / totalPages) * 100;
            document.getElementById('progress-fill').style.width = percent + '%';
            document.getElementById('status-text').innerHTML = `Page ${currentPage + 1} sur ${totalPages} <strong>(${allQuestions.length} Questions)</strong>`;
        }

        function renderPage() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';
            const startIndex = currentPage * questionsPerPage;
            const endIndex = Math.min(startIndex + questionsPerPage, allQuestions.length);
            currentQuestions = allQuestions.slice(startIndex, endIndex);

            currentQuestions.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = 'q-' + q.id;
                
                const title = document.createElement('h3');
                title.className = 'question-title';
                // Affiche uniquement le numéro interne + la question sans re-afficher le numero "102." qui perturbait la lecture
                title.textContent = `Q${startIndex + index + 1} - ${q.question}`;
                card.appendChild(title);
                
                const optionsGrid = document.createElement('div');
                optionsGrid.className = 'options-grid';
                
                q.options.forEach(opt => {
                    const label = document.createElement('label');
                    label.className = 'option-label';
                    label.id = 'label-' + opt.id;
                    
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.name = 'question-' + q.id;
                    checkbox.value = opt.id;
                    
                    const text = document.createTextNode(opt.text);
                    label.appendChild(checkbox);
                    label.appendChild(text);
                    optionsGrid.appendChild(label);
                });
                card.appendChild(optionsGrid);
                container.appendChild(card);
            });

            updateProgress();
            const btnSuivant = document.getElementById('btn-suivant');
            btnSuivant.disabled = true;
            btnSuivant.textContent = "Page Suivante (validez d'abord) 🔒";
            btnSuivant.classList.remove('ready');
            document.getElementById('btn-valider').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function validerReponses() {
            let pageScore = 0, pageMaxScore = 0;
            currentQuestions.forEach(q => {
                q.options.forEach(opt => {
                    if (opt.correct) pageMaxScore++;
                    const checkbox = document.querySelector(`input[value="${opt.id}"]`);
                    const label = document.getElementById(`label-${opt.id}`);
                    checkbox.disabled = true;
                    label.classList.add('disabled');
                    if (checkbox.checked) {
                        if (opt.correct) { label.classList.add('is-correct'); pageScore++; totalScore++; } 
                        else { label.classList.add('is-incorrect'); }
                    } else {
                        if (opt.correct) { label.classList.add('missed-correct'); }
                    }
                });
            });
            
            const resultsDiv = document.getElementById('results');
            const scoreText = document.getElementById('score-text');
            const globalScoreText = document.getElementById('global-score-text');
            const percentage = pageMaxScore > 0 ? Math.round((pageScore / pageMaxScore) * 100) : 0;
            
            scoreText.textContent = `Score de la page : ${pageScore} / ${pageMaxScore} (${percentage}%)`;
            globalScoreText.textContent = `Score cumulé : ${totalScore} bonnes réponses.`;
            resultsDiv.style.display = 'block';
            document.getElementById('btn-valider').style.display = 'none';
            
            const btnSuivant = document.getElementById('btn-suivant');
            if ((currentPage + 1) * questionsPerPage < allQuestions.length) {
                btnSuivant.disabled = false;
                btnSuivant.textContent = "Page Suivante ➡️";
                btnSuivant.classList.add('ready');
            } else {
                document.getElementById('nav-buttons').style.display = 'none';
                document.getElementById('progress-fill').style.width = '100%';
                const finalPercentage = maxPossibleScore > 0 ? Math.round((totalScore/maxPossibleScore)*100) : 0;
                globalScoreText.innerHTML = `<strong>🎉 FINI !</strong><br>Score Final : ${totalScore} / ${maxPossibleScore} (${finalPercentage}%)`;
                document.getElementById('btn-recommencer').style.display = 'block';
            }
            resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function pageSuivante() { currentPage++; renderPage(); }
        window.onload = initQuiz;
    </script>
