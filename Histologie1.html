<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Histologie - Fichier 1 (Q1 à Q60)</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333333;
            --correct-bg: #d4edda;
            --correct-border: #c3e6cb;
            --correct-text: #155724;
            --incorrect-bg: #f8d7da;
            --incorrect-border: #f5c6cb;
            --incorrect-text: #721c24;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; margin: 0; padding: 40px 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: var(--primary-color); font-size: 2.5em; margin-bottom: 10px; }
        p.subtitle { color: #7f8c8d; font-size: 1.1em; background: #e8f4f8; padding: 10px; border-radius: 8px; border-left: 5px solid #3498db; }
        .progress-bar { background-color: #e9ecef; border-radius: 8px; height: 10px; width: 100%; margin-bottom: 30px; overflow: hidden; }
        .progress-fill { background-color: var(--accent-color); height: 100%; width: 0%; transition: width 0.3s ease; }
        .question-card { background: var(--card-bg); border-radius: 12px; padding: 30px; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-top: 4px solid var(--accent-color); animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .question-title { font-size: 1.3em; font-weight: 600; color: var(--primary-color); margin-top: 0; margin-bottom: 20px; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .option-label { display: flex; align-items: flex-start; padding: 12px 15px; background-color: #f8f9fa; border: 1px solid #e9ecef; border-radius: 8px; cursor: pointer; transition: all 0.2s ease; font-size: 1.05em; }
        .option-label:hover:not(.disabled) { background-color: #e2e6ea; border-color: #dae0e5; }
        .option-label input[type="checkbox"] { margin-top: 5px; margin-right: 15px; transform: scale(1.2); cursor: pointer; }
        .option-label.disabled { cursor: default; }
        .buttons-container { display: flex; gap: 20px; margin-top: 40px; }
        .btn { flex: 1; padding: 18px; color: white; border: none; border-radius: 8px; font-size: 1.2em; font-weight: bold; text-align: center; transition: all 0.3s; }
        .btn-valider { background-color: var(--accent-color); cursor: pointer; box-shadow: 0 4px 6px rgba(52, 152, 219, 0.3); }
        .btn-valider:hover { background-color: #2980b9; transform: translateY(-2px); }
        .btn-suivant { background-color: #bdc3c7; cursor: not-allowed; opacity: 0.7; }
        .btn-suivant.ready { background-color: #27ae60; cursor: pointer; opacity: 1; box-shadow: 0 4px 6px rgba(39, 174, 96, 0.3); animation: pulse 2s infinite; }
        .btn-suivant.ready:hover { background-color: #219653; transform: translateY(-2px); animation: none; }
        .btn-recommencer { background-color: #f39c12; display: none; margin-top: 20px; cursor: pointer; box-shadow: 0 4px 6px rgba(243, 156, 18, 0.3); }
        .btn-recommencer:hover { background-color: #d68910; transform: translateY(-2px); }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(39, 174, 96, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(39, 174, 96, 0); } 100% { box-shadow: 0 0 0 0 rgba(39, 174, 96, 0); } }
        .is-correct { background-color: var(--correct-bg) !important; border-color: var(--correct-border) !important; color: var(--correct-text); font-weight: 500; }
        .is-incorrect { background-color: var(--incorrect-bg) !important; border-color: var(--incorrect-border) !important; color: var(--incorrect-text); text-decoration: line-through; opacity: 0.8; }
        .missed-correct { background-color: var(--correct-bg) !important; border-color: var(--correct-border) !important; border-style: dashed !important; border-width: 2px !important; color: var(--correct-text); }
        #results { margin-top: 30px; padding: 20px; background: var(--card-bg); border-radius: 12px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: none; animation: fadeIn 0.5s ease; }
        #score-text { font-size: 1.8em; color: var(--primary-color); font-weight: bold; margin: 0; }
        #global-score-text { font-size: 1.3em; color: #7f8c8d; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Quiz Histologie - Fichier 1 (Q1 à Q60)</h1>
            <p class="subtitle" id="status-text">Chargement des questions...</p>
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

        <form id="quiz-form">

            <div id="results">

                <p id="global-score-text"></p>

            <div class="buttons-container" id="nav-buttons">
                <button type="button" class="btn btn-valider" id="btn-valider" onclick="validerReponses()">Valider mes réponses</button>
                <button type="button" class="btn btn-suivant" id="btn-suivant" onclick="pageSuivante()" disabled>Page Suivante (validez d'abord) 🔒</button>
            </div>
            <button type="button" class="btn btn-recommencer" id="btn-recommencer" style="width: 100%;" onclick="initQuiz()">Recommencer le Quiz 🔄</button>
        </form>
    </div>
    <script>
        const quizData = [{"id": 1, "question": "Le tube digestif comporte:", "options": [{"id": "1_A", "text": "capsule en p\u00e9riph\u00e9rie", "correct": false}, {"id": "1_B", "text": "m\u00e9dullaire", "correct": false}, {"id": "1_C", "text": "adventice", "correct": true}, {"id": "1_D", "text": "s\u00e9reuse", "correct": true}, {"id": "1_E", "text": "muqueuse", "correct": true}, {"id": "1_F", "text": "sous-muqueuse", "correct": true}, {"id": "1_G", "text": "muscleuse propre", "correct": true}, {"id": "1_H", "text": "corticale", "correct": false}, {"id": "1_I", "text": "pseudolobules", "correct": false}, {"id": "1_J", "text": "lobules", "correct": false}]}, {"id": 2, "question": "La muqueuse du tube digestif est caract\u00e9ris\u00e9e par:", "options": [{"id": "2_A", "text": "diff\u00e9rents aspects structurels, caract\u00e9ristiques des diff\u00e9rentes r\u00e9gions/segments du tube digestif", "correct": true}, {"id": "2_B", "text": "aspects structurels identiques pour toutes les r\u00e9gions/segments du tube digestif", "correct": false}, {"id": "2_C", "text": "3 composants: \u00e9pith\u00e9lium, lamina propria, muscularis mucosae", "correct": true}, {"id": "2_D", "text": "pr\u00e9sence d'\u00e9l\u00e9ments lympho\u00efdes permanents: plaques de Peyer (estomac)", "correct": false}, {"id": "2_E", "text": "3 composants: \u00e9pith\u00e9lium, lamina propria et musculeuse propre", "correct": false}, {"id": "2_F", "text": "la pr\u00e9sence d'un \u00e9pith\u00e9lium cylindrique simple: homog\u00e8ne, de type s\u00e9cr\u00e9toire/cellules s\u00e9cr\u00e9trices muco\u00efdes dans l'estomac", "correct": true}, {"id": "2_G", "text": "pr\u00e9sence des glandes \u0153sophagiennes propres (\u0153sophage)", "correct": false}, {"id": "2_H", "text": "la pr\u00e9sence de glandes von Ebner (duoden)", "correct": false}, {"id": "2_I", "text": "la pr\u00e9sence d'invaginations/cryptes (estomac, gros intestin)", "correct": true}, {"id": "2_J", "text": "la pr\u00e9sence d'expansions/saillies (intestin gr\u00eale)", "correct": true}]}, {"id": 3, "question": "L'\u0153sophage:", "options": [{"id": "3_A", "text": "pr\u00e9sente 4 tuniques concentriques: muqueuse, sous-muqueuse, musculeuse, adventice", "correct": true}, {"id": "3_B", "text": "pr\u00e9sente glandes oesophagiennes propres (glandes tubulo-acineuses de type muqueux) dans la sous-muqueuse", "correct": true}, {"id": "3_C", "text": "ne pr\u00e9sente pas la muscularis mucosae", "correct": false}, {"id": "3_D", "text": "pr\u00e9sente des plis longitudinaux de la muqueuse et en partie de la sous-muqueuse", "correct": true}, {"id": "3_E", "text": "montre les plis longitudinaux de la propre tunique musculaire", "correct": false}, {"id": "3_F", "text": "pr\u00e9sente un \u00e9pith\u00e9lium pavimenteux stratifi\u00e9 k\u00e9ratinis\u00e9", "correct": false}, {"id": "3_G", "text": "pr\u00e9sente la muqueuse form\u00e9e par l'\u00e9pith\u00e9lium, la lamina propria, la muscularis mucosae", "correct": true}, {"id": "3_H", "text": "pr\u00e9sente un \u00e9pith\u00e9lium stratifi\u00e9 pavimenteux (squameux) non k\u00e9ratinis\u00e9", "correct": true}, {"id": "3_I", "text": "pr\u00e9sente les glandes oesophagiennes propres dans la muqueuse", "correct": false}, {"id": "3_J", "text": "est tapiss\u00e9 de m\u00e9soth\u00e9lium sur toute sa longueur", "correct": false}]}, {"id": 4, "question": "La couche musculaire propre dans la structure de l'\u0153sophage:", "options": [{"id": "4_A", "text": "contient exclusivement du tissu musculaire stri\u00e9 dans le tiers inf\u00e9rieur", "correct": false}, {"id": "4_B", "text": "contient la muscularis mucosae, comme d\u00e9limitation de l'adventice", "correct": false}, {"id": "4_C", "text": "contient des fibres dispos\u00e9es en deux couches, circulaire interne et longitudinale externe", "correct": true}, {"id": "4_D", "text": "contient du tissu musculaire stri\u00e9 dans le tiers sup\u00e9rieur", "correct": true}, {"id": "4_E", "text": "contient du tissu musculaire lisse dans le tiers inf\u00e9rieur", "correct": true}, {"id": "4_F", "text": "contient exclusivement du tissu musculaire lisse dans le tiers moyen", "correct": false}, {"id": "4_G", "text": "contient dans le tiers moyen des fibres musculaires stri\u00e9es et des fibres musculaires lisses, qui s'entrem\u00ealent", "correct": true}, {"id": "4_H", "text": "contient du tissu musculaire lisse dans le tiers sup\u00e9rieur", "correct": false}, {"id": "4_I", "text": "contient le plexus nerveux de Meissner", "correct": false}, {"id": "4_J", "text": "contient le plexus nerveux d'Auerbach", "correct": true}]}, {"id": 5, "question": "La muqueuse \u0153sophagienne:", "options": [{"id": "5_A", "text": "contient les glandes cardiales inf\u00e9rieures (dans le tiers sup\u00e9rieur)", "correct": false}, {"id": "5_B", "text": "contient les glandes cardiales sup\u00e9rieures (dans le tiers inf\u00e9rieur)", "correct": false}, {"id": "5_C", "text": "contient la lamina propria", "correct": true}, {"id": "5_D", "text": "se compose d'\u00e9pith\u00e9lium, de lamina propria, de la muscularis mucosae", "correct": true}, {"id": "5_E", "text": "contient des glandes oesophagiennes propres", "correct": false}, {"id": "5_F", "text": "est tapiss\u00e9e d'un \u00e9p\u00edth\u00e9lium pavimenteux stratifi\u00e9 avec k\u00e9ratinisation", "correct": false}, {"id": "5_G", "text": "contient les glandes cardiales sup\u00e9rieures (dans le tiers sup\u00e9rieur)", "correct": true}, {"id": "5_H", "text": "contient des glandes cardiales inf\u00e9rieures (dans le tiers inf\u00e9rieur)", "correct": true}, {"id": "5_I", "text": "ne pr\u00e9sente pas de muscularis mucosae", "correct": false}, {"id": "5_J", "text": "est bord\u00e9e par un \u00e9pith\u00e9lium pavimenteux stratifi\u00e9 non k\u00e9ratinis\u00e9", "correct": true}]}, {"id": 6, "question": "L'estomac:", "options": [{"id": "6_A", "text": "montre les cellules de Paneth", "correct": false}, {"id": "6_B", "text": "pr\u00e9sente un muscle muqueux discontinu", "correct": false}, {"id": "6_C", "text": "pr\u00e9sente 4 tuniques concentriques: muqueuse, sous-muqueuse, musculaire, et s\u00e9reuse", "correct": true}, {"id": "6_D", "text": "pr\u00e9sente des glandes situ\u00e9es dans la sous-muqueuse", "correct": false}, {"id": "6_E", "text": "a une fonction: m\u00e9canique, s\u00e9cr\u00e9tion exocrine et s\u00e9cr\u00e9tion endocrine", "correct": true}, {"id": "6_F", "text": "montre des plis longitudinaux \u00e9vidents, form\u00e9s par la muqueuse et la sous-muqueuse", "correct": true}, {"id": "6_G", "text": "pr\u00e9sente 3 zones anatomiques, avec des correspondances histologiques: la r\u00e9gion cardiale, la r\u00e9gion fundique et la r\u00e9gion pylorique", "correct": true}, {"id": "6_H", "text": "montre des cellules caliciformes dans la r\u00e9gion fundique", "correct": false}, {"id": "6_I", "text": "pr\u00e9sente une muqueuse compos\u00e9e de: \u00e9pith\u00e9lium, lamina propria (chorion), muscularis mucosae", "correct": true}, {"id": "6_J", "text": "montre focalement des villosit\u00e9s \u00e9lev\u00e9es", "correct": false}]}, {"id": 7, "question": "La muqueuse gastrique:", "options": [{"id": "7_A", "text": "a des cellules caliciformes", "correct": false}, {"id": "7_B", "text": "se compose de: \u00e9pith\u00e9lium, lamina propria, musculeuse propre", "correct": false}, {"id": "7_C", "text": "pr\u00e9sente un \u00e9pith\u00e9lium de surface, qui s'invagine dans le chorion sous-jacent, formant les cryptes gastriques", "correct": true}, {"id": "7_D", "text": "contient le plexus myent\u00e9rique de Miessener", "correct": false}, {"id": "7_E", "text": "montre des cellules s\u00e9cr\u00e9tant des muco\u00efdes, avec un p\u00f4le ferm\u00e9", "correct": true}, {"id": "7_F", "text": "pr\u00e9sente un \u00e9pith\u00e9lium de surface simple, cylindrique, homog\u00e8ne, de type s\u00e9cr\u00e9toire", "correct": true}, {"id": "7_G", "text": "pr\u00e9senter une population cellulaire purement endocrinienne", "correct": false}, {"id": "7_H", "text": "pr\u00e9sente des glandes situ\u00e9es dans la sous-muqueuse", "correct": false}, {"id": "7_I", "text": "se compose de: \u00e9pith\u00e9lium, lamina propria, muscularis mucosae", "correct": true}, {"id": "7_J", "text": "pr\u00e9sente lamina propria avec des \u00e9l\u00e9ments cellulaires migr\u00e9s bien repr\u00e9sent\u00e9s", "correct": true}]}, {"id": 8, "question": "L'\u00e9pith\u00e9lium de surface gastrique:", "options": [{"id": "8_A", "text": "a un noyau situ\u00e9 au p\u00f4le basal, perpendiculaire \u00e0 la membrane basale", "correct": true}, {"id": "8_B", "text": "ne s'invagine pas dans la lamina propria sous-jacente", "correct": false}, {"id": "8_C", "text": "montre des \u00e9l\u00e9ments cellulaires migr\u00e9s bien repr\u00e9sent\u00e9s", "correct": false}, {"id": "8_D", "text": "pr\u00e9sente un \u00e9pith\u00e9lium cylindrique simple, homog\u00e8ne, de type s\u00e9cr\u00e9toire", "correct": true}, {"id": "8_E", "text": "s'invagine dans la lamina propria sous-jacente (chorion)", "correct": true}, {"id": "8_F", "text": "pr\u00e9sente un \u00e9pith\u00e9lium cylindrique simple et h\u00e9t\u00e9rog\u00e8ne", "correct": false}, {"id": "8_G", "text": "est diff\u00e9rent par rapport aux r\u00e9gions gastriques", "correct": false}, {"id": "8_H", "text": "est identique pour toutes les r\u00e9gions gastriques", "correct": true}, {"id": "8_I", "text": "ne forme pas de cryptes gastriques", "correct": false}, {"id": "8_J", "text": "forme les cryptes gastriques", "correct": true}]}, {"id": 9, "question": "La musculeuse propre gastrique:", "options": [{"id": "9_A", "text": "est une couche plus mince par rapport \u00e0 la musculeuse de muqueuse", "correct": false}, {"id": "9_B", "text": "est dispos\u00e9e en 3 couches: oblique interne, circulaire moyenne, longitudinale externe", "correct": true}, {"id": "9_C", "text": "pr\u00e9sente une couche externe longitudinale tr\u00e8s d\u00e9velopp\u00e9e dans la r\u00e9gion cardiale et la r\u00e9gion pylorique", "correct": false}, {"id": "9_D", "text": "contient le plexus nerveux de Meissner, situ\u00e9 entre les couches circulaire et longitudinale", "correct": false}, {"id": "9_E", "text": "contient le plexus nerveux d'Auerbach, situ\u00e9 entre les couches circulaire et longitudinale", "correct": true}, {"id": "9_F", "text": "est dispos\u00e9e en 3 couches: circulaire interne, oblique m\u00e9diane, circulaire externe", "correct": false}, {"id": "9_G", "text": "est constitu\u00e9e de fibres musculaires lisses et stri\u00e9es", "correct": false}, {"id": "9_H", "text": "est constitu\u00e9e de fibres musculaires lisses", "correct": true}, {"id": "9_I", "text": "est une couche plus \u00e9paisse que la musculeuse de muqueuse", "correct": true}, {"id": "9_J", "text": "pr\u00e9sente une couche circulaire tr\u00e8s bien d\u00e9velopp\u00e9e dans la r\u00e9gion cardiale et la r\u00e9gion pylorique", "correct": true}]}, {"id": 10, "question": "La muqueuse de la r\u00e9gion pylorique gastrique:", "options": [{"id": "10_A", "text": "montre les glandes de Lieberkuhn", "correct": false}, {"id": "10_B", "text": "pr\u00e9sente une muqueuse qui s'invagine dans la lamina propria (chorion)", "correct": true}, {"id": "10_C", "text": "pr\u00e9sente de longues cryptes gastriques, occupant la moiti\u00e9 ou les deux tiers de la muqueuse", "correct": true}, {"id": "10_D", "text": "montre des microvillosit\u00e9s", "correct": false}, {"id": "10_E", "text": "pr\u00e9sente des glandes pyloriques avec une s\u00e9cr\u00e9tion muqueuse", "correct": true}, {"id": "10_F", "text": "pr\u00e9sente des glandes situ\u00e9es exclusivement dans la muqueuse", "correct": true}, {"id": "10_G", "text": "pr\u00e9sente un \u00e9pith\u00e9lium cylindrique simple, homog\u00e8ne, de type s\u00e9cr\u00e9toire qui tapisse les cryptes", "correct": true}, {"id": "10_H", "text": "a des cellules caliciformes", "correct": false}, {"id": "10_I", "text": "montre des cellules myo\u00e9pith\u00e9liales", "correct": false}, {"id": "10_J", "text": "montre des villosit\u00e9s intestinales", "correct": false}]}, {"id": 11, "question": "Les villosit\u00e9s intestinales:", "options": [{"id": "11_A", "text": "sont des projections/saillies de la muqueuse et de la sous-muqueuse intestinales", "correct": false}, {"id": "11_B", "text": "sont form\u00e9es uniquement d'\u00e9pith\u00e9lium", "correct": false}, {"id": "11_C", "text": "montrent les cellules myo\u00e9pith\u00e9liales", "correct": false}, {"id": "11_D", "text": "pr\u00e9sentent un axe conjonctivo-vasculaire central", "correct": true}, {"id": "11_E", "text": "sont form\u00e9es par l'\u00e9pith\u00e9lium et la lamina propria (chorion)", "correct": true}, {"id": "11_F", "text": "sont sp\u00e9cifiques \u00e0 l'appendice", "correct": false}, {"id": "11_G", "text": "sont des saillies/\u00e9vaginations de la muqueuse intestinale", "correct": true}, {"id": "11_H", "text": "sont pr\u00e9sentes dans le gros intestin", "correct": false}, {"id": "11_I", "text": "sont pr\u00e9sentes dans les 3 r\u00e9gions de l'intestin gr\u00eale", "correct": true}, {"id": "11_J", "text": "sont tapiss\u00e9s par un \u00e9pith\u00e9lium \u00e0 l'ext\u00e9rieur compos\u00e9 d'ent\u00e9rocytes et de cellules caliciformes", "correct": true}]}, {"id": 12, "question": "Les villosit\u00e9s intestinales:", "options": [{"id": "12_A", "text": "contiennent les glandes de Lieberkuhn", "correct": false}, {"id": "12_B", "text": "sont constitu\u00e9es d'un axe central form\u00e9 de tissu conjonctif l\u00e2che", "correct": true}, {"id": "12_C", "text": "ont un axe central repr\u00e9sent\u00e9 par une extension de la lamina propria", "correct": true}, {"id": "12_D", "text": "pr\u00e9sentent des cils \u00e0 la surface", "correct": false}, {"id": "12_E", "text": "sont recouvertes d'un simple \u00e9pith\u00e9lium cylindrique", "correct": true}, {"id": "12_F", "text": "sont pr\u00e9sentes dans la sous-muqueuse du c\u00f4lon", "correct": false}, {"id": "12_G", "text": "conti
