: false}, {"id": "141_E", "text": "est diff\u00e9rent pour toutes les dents de la dentition permanente", "correct": true}, {"id": "141_F", "text": "utilise le terme germe dentaire pour caract\u00e9riser la dent en d\u00e9veloppement", "correct": false}, {"id": "141_G", "text": "utilise le terme bourgeon dentaire pour caract\u00e9riser la dent en d\u00e9veloppement", "correct": true}, {"id": "141_H", "text": "n\u00e9cessite une r\u00e9f\u00e9rence aux \u00e9tapes de d\u00e9veloppement et aux stades de d\u00e9veloppement", "correct": true}, {"id": "141_I", "text": "est diff\u00e9rent pour toutes les dents de la dentition temporaire", "correct": false}, {"id": "141_J", "text": "est essentiellement le m\u00eame pour toutes les dents (dentition temporaire, dentition permanente)", "correct": true}]}, {"id": 142, "question": "La s\u00e9quence du processus de d\u00e9veloppement des dents pr\u00e9sente les caract\u00e9ristiques suivantes:", "options": [{"id": "142_A", "text": "l'initiation correspond au stade de la cloche", "correct": true}, {"id": "142_B", "text": "l'histo et la morphodiff\u00e9renciation correspondent au stade de la cloche", "correct": true}, {"id": "142_C", "text": "l'apposition correspond au processus d'ach\u00e8vement du stade de la cloche et de formation de la couronne", "correct": true}, {"id": "142_D", "text": "apr\u00e8s la formation de la couronne, la formation de la racine et, en parall\u00e8le, la structuration des tissus de soutien r\u00e9alisent l'ancrage de la dent au niveau maxillaire", "correct": true}, {"id": "142_E", "text": "la prolif\u00e9ration correspond au stade du capuchon", "correct": false}, {"id": "142_F", "text": "l'apposition correspond au processus d'ach\u00e8vement des structures du parodonte superficiel", "correct": false}, {"id": "142_G", "text": "la prolif\u00e9ration correspond au stade de bourgeon", "correct": false}, {"id": "142_H", "text": "l'initiation correspond au stade bourgeon", "correct": false}, {"id": "142_I", "text": "l'histo et la morphodiff\u00e9renciation correspondent au stade du capuchon", "correct": false}, {"id": "142_J", "text": "l'histo et la morphodiff\u00e9renciation correspondent au processus de compl\u00e9tion des structures du parodonte profond", "correct": false}]}, {"id": 143, "question": "Le stade d'initiation/bourgeon est caract\u00e9ris\u00e9 par :", "options": [{"id": "143_A", "text": "l'apparition de germes dentaires en forme de cloche", "correct": true}, {"id": "143_B", "text": "l'apparition de zones individualis\u00e9es \u00e0 forte activit\u00e9 prolif\u00e9rative, au niveau de la lame dentaire, \u00e9videntes dans la r\u00e9gion des futurs processus alv\u00e9olaires sous forme de conglom\u00e9rats \u00e9pith\u00e9liaux orient\u00e9s vers l'int\u00e9rieur, vers l'ectomesenchyme", "correct": false}, {"id": "143_C", "text": "le d\u00e9veloppement des bourgeons \u00e9p\u00edth\u00e9liaux, par la prolif\u00e9ration de zones d\u00e9sign\u00e9es sur la lame dentaire", "correct": true}, {"id": "143_D", "text": "l'apparition du vestibule buccal par la prolif\u00e9ration, l'\u00e9largissement et la d\u00e9g\u00e9n\u00e9rescence des cellules qui forment la lame vestibulaire, cr\u00e9ant un espace libre comme un \u00e9videment, orient\u00e9 facialement ou oralement vers la lame dentaire", "correct": false}, {"id": "143_E", "text": "l'apparition, au sixi\u00e8me mois de d\u00e9veloppement i.u. (intra-ut\u00e9rin), \u00e0 l'emplacement des futures arcades dentaires, de deux bandelettes \u00e9pith\u00e9liales primaires", "correct": true}, {"id": "143_F", "text": "subdivision rapide de chaque bande \u00e9pith\u00e9liale primaire (d\u00e9velopp\u00e9e \u00e0 l'emplacement des futures arcades dentaires) en une lame vestibulaire et une lame dentaire", "correct": true}, {"id": "143_G", "text": "l'apparition de germes dentaires sous la forme d'une capuchon", "correct": true}, {"id": "143_H", "text": "le d\u00e9veloppement des racines dentaires, par la prolif\u00e9ration de zones d\u00e9sign\u00e9es sur la lame dentaire", "correct": false}, {"id": "143_I", "text": "l'apparition, au 37\u00e8me jour de d\u00e9veloppement, \u00e0 l'endroit des futures arcades dentaires, de deux bandes \u00e9pith\u00e9liales primaires continues et \u00e9paisses, en forme de fer \u00e0 cheval", "correct": false}, {"id": "143_J", "text": "le d\u00e9veloppement du parodonte superficiel", "correct": false}]}, {"id": 144, "question": "Les germes dentaires:", "options": [{"id": "144_A", "text": "se forment \u00e0 la sixi\u00e8me - huiti\u00e8me semaine - pour les 20 dents de lait", "correct": true}, {"id": "144_B", "text": "apparaissent avant la formation des germes des futures dents de lait - pour les dents permanentes", "correct": false}, {"id": "144_C", "text": "sont form\u00e9s \u00e0 la suite de l'influence instructive que l'\u00e9pith\u00e9lium exerce sur le m\u00e9senchyme dentaire / ectomesenchyme sus-jacent", "correct": false}, {"id": "144_D", "text": "apparaissent \u00e0 la suite d'interactions \u00e9pith\u00e9liales-m\u00e9senchymateuses", "correct": true}, {"id": "144_E", "text": "il n'implique pas, dans sa formation, d'interactions \u00e9pith\u00e9liales-m\u00e9senchymateuses", "correct": false}, {"id": "144_F", "text": "sont form\u00e9s \u00e0 la suite de l'influence permissive que l'\u00e9pith\u00e9lium exerce sur le m\u00e9senchyme dentaire / ectomesenchyme sous-jacent", "correct": true}, {"id": "144_G", "text": "se formes \u00e0 la suite de l'influence instructive que le m\u00e9senchyme exerce sur l'\u00e9pith\u00e9lium sous-jacent", "correct": true}, {"id": "144_H", "text": "sont form\u00e9s \u00e0 la suite de l'influence instructive que le m\u00e9senchyme exerce sur l'\u00e9pith\u00e9lium sus-jacent", "correct": false}, {"id": "144_I", "text": "se forment au sixieme mois - le huiti\u00e8me mois i.u. (intra-ut\u00e9rin)- pour les 20 dents de lait", "correct": true}, {"id": "144_J", "text": "apparaissent apr\u00e8s la formation des germes des futures dents de lait - pour les 32 dents permanentes", "correct": false}]}, {"id": 145, "question": "Au cours du d\u00e9veloppement dentaire, le stade du bourgeon se caract\u00e9rise par:", "options": [{"id": "145_A", "text": "\u00e9mergence de cellules m\u00e9senchymateuses/ectom\u00e9senchymateuses dans le bourgeon \u00e9pith\u00e9lial, formant le futur follicule/sac dentaire", "correct": true}, {"id": "145_B", "text": "l'apparition de bourgeons ectomesenchymateux, qui font saillie au-dessus de l'\u00e9pith\u00e9lium stomod\u00e9al", "correct": false}, {"id": "145_C", "text": "l'apparition de structures sp\u00e9cifiques au stade du capuchon", "correct": false}, {"id": "145_D", "text": "la pr\u00e9sence de cellules \u00e9pith\u00e9liales organis\u00e9es de mani\u00e8re compacte, qui conservent toutes leurs caract\u00e9ristiques morphologiques \u00e9pith\u00e9liales, sont identiques les unes aux autres et sont dispos\u00e9es sous la forme d'une structure ronde", "correct": true}, {"id": "145_E", "text": "l'apparition de cellules m\u00e9senchymateuses/ectom\u00e9senchymateuses \u00e0 l'ext\u00e9rieur du bourgeon \u00e9pithelial, formant le futur follicule/sac dentaire", "correct": false}, {"id": "145_F", "text": "l'apparition de bourgeons \u00e9pith\u00e9liaux, qui d\u00e9passent de l'\u00e9pith\u00e9lium stomod\u00e9al", "correct": false}, {"id": "145_G", "text": "l'apparition de bourgeons \u00e9pith\u00e9liaux, qui s'invaginent dans l'ectomesenchyme sous-jacent", "correct": false}, {"id": "145_H", "text": "l'apparition de cellules m\u00e9senchymateuses/ectom\u00e9senchymateuses qui entourent la zone \u00e9pith\u00e9liale et formeront la future papille dentaire", "correct": true}, {"id": "145_I", "text": "l'apparition de structures sp\u00e9cifiques au stade de cloche", "correct": false}, {"id": "145_J", "text": "la pr\u00e9sence de cellules m\u00e9senchymateuses/ectom\u00e9senchymateuses qui induisent une augmentation de la prolif\u00e9ration des cellules \u00e9p\u00edth\u00e9liales basales de l'\u00e9pith\u00e9lium stomod\u00e9al, provoquant l'apparition de conglom\u00e9rats \u00e9pith\u00e9liaux", "correct": false}]}, {"id": 146, "question": "Dans le d\u00e9veloppement dentaire, le stade de capuchon se caract\u00e9rise par:", "options": [{"id": "146_A", "text": "la poursuite des processus de d\u00e9veloppement \u00e0 partir du stade de bourgeon", "correct": false}, {"id": "146_B", "text": "la pr\u00e9sence d'une structure m\u00e9senchymateuse/ectom\u00e9senchymateuse condens\u00e9e d'aspect en \"ballon\", qui constitue la papille dentaire", "correct": true}, {"id": "146_C", "text": "la pr\u00e9sence de dentine", "correct": true}, {"id": "146_D", "text": "la diff\u00e9renciation beaucoup plus nette des \u00e9l\u00e9ments constitutifs du germe dentaire", "correct": true}, {"id": "146_E", "text": "la pr\u00e9sence d'une structure \u00e9pith\u00e9liale d'aspect de \"capuchon\", qui constitue l'organe de l'\u00e9mail", "correct": false}, {"id": "146_F", "text": "le d\u00e9veloppement des bourgeons \u00e9pith\u00e9liaux, par la prolif\u00e9ration de zones d\u00e9sign\u00e9es sur la lame dentaire", "correct": false}, {"id": "146_G", "text": "la pr\u00e9sence d'\u00e9mail", "correct": false}, {"id": "146_H", "text": "la pr\u00e9sence d'une structure m\u00e9senchymateuse/ectom\u00e9senchymateuse d'aspect compact, situ\u00e9e \u00e0 l'ext\u00e9rieur de l'organe de l'\u00e9mail et de la papille dentaire, qui constitue le sac dentaire", "correct": false}, {"id": "146_I", "text": "apparition de bandes \u00e9pith\u00e9liales primaires", "correct": true}, {"id": "146_J", "text": "la subdivision rapide de chaque bande \u00e9pith\u00e9liale primaire en une lame vestibulaire et une lame dentaire", "correct": true}]}, {"id": 147, "question": "Lors du d\u00e9veloppement dentaire, la papille dentaire:", "options": [{"id": "147_A", "text": "contient, au stade pr\u00e9coce du capuchon, une matrice extracellulaire r\u00e9duite", "correct": false}, {"id": "147_B", "text": "repr\u00e9sente la zone de tissu m\u00e9senchymateux/ectom\u00e9senchymateux condens\u00e9 situ\u00e9e dans la concavit\u00e9 de l'organe de l'\u00e9mail", "correct": false}, {"id": "147_C", "text": "repr\u00e9sente la zone de tissu \u00e9pith\u00e9lial condens\u00e9 situ\u00e9e dans la concavit\u00e9 de l'organe de l'\u00e9mail", "correct": true}, {"id": "147_D", "text": "est form\u00e9 \u00e0 partir de l'organe de l'\u00e9mail", "correct": false}, {"id": "147_E", "text": "a un aspect homog\u00e8ne, au stade pr\u00e9coce du capuchon", "correct": true}, {"id": "147_F", "text": "est d'origine \u00e9pith\u00e9liale", "correct": true}, {"id": "147_G", "text": "a un aspect homog\u00e8ne, \u00e0 un stade du capuchon avanc\u00e9", "correct": true}, {"id": "147_H", "text": "se forme avant la prolif\u00e9ration de l'\u00e9pith\u00e9lium interne de l'organe de l'\u00e9mail", "correct": true}, {"id": "147_I", "text": "contient, au stade pr\u00e9coce du capuchon, un composant cellulaire repr\u00e9sent\u00e9 par des cellules m\u00e9senchymateuses/ectom\u00e9senchymateuses, des macrophages, des lymphocytes", "correct": false}, {"id": "147_J", "text": "se forme sous l'influence et parall\u00e8lement \u00e0 la prolif\u00e9ration de l'\u00e9pith\u00e9lium interne de l'organe de l'\u00e9mail", "correct": false}]}, {"id": 148, "question": "Dans le d\u00e9veloppement dentaire, le stade de cloche se caract\u00e9rise par:", "options": [{"id": "148_A", "text": "l'augmentation de la profondeur de l'invagination de l'\u00e9pith\u00e9lium interne de l'organe de l'\u00e9mail", "correct": false}, {"id": "148_B", "text": "la forme que prend l'organe d'\u00e9mail, lorsque la surface concave du capuchon s'approfondit", "correct": true}, {"id": "148_C", "text": "changements pr\u00e9coces (cloche pr\u00e9coce) et tardifs (cloche avanc\u00e9e)", "correct": true}, {"id": "148_D", "text": "l'ind\u00e9pendance que le germe dentaire acquiert, par d\u00e9g\u00e9n\u00e9rescence", "correct": false}, {"id": "148_E", "text": "l'apparition de l'\u00e9mail", "correct": true}, {"id": "148_F", "text": "l'apparition de la dentine", "correct": true}, {"id": "148_G", "text": "la disparition de la lame dentaire", "correct": true}, {"id": "148_H", "text": "la disparition de la gaine \u00e9pith\u00e9liale", "correct": false}, {"id": "148_I", "text": "la disparition du sac dentaire", "correct": false}, {"id": "148_J", "text": "l'apparition du ligament parodontal", "correct": false}]}, {"id": 149, "question": "L'\u00e9pith\u00e9lium externe de l'organe de l'\u00e9mail, au stade de cloche, est caract\u00e9ris\u00e9 par:", "options": [{"id": "149_A", "text": "des cellules cubiques, avec un cytoplasme r\u00e9duit, un gros noyau \u00e9vident et des organites cellulaires bien repr\u00e9sent\u00e9s", "correct": true}, {"id": "149_B", "text": "maintenance de la disposition lin\u00e9aire des cellules uniquement au niveau du p\u00f4le sup\u00e9rieur de la concavit\u00e9 de l'organe de l'\u00e9mail", "correct": false}, {"id": "149_C", "text": "la pr\u00e9sence de cellules irr\u00e9guli\u00e8rement dispos\u00e9es", "correct": true}, {"id": "149_D", "text": "absence de jonctions cellulaires", "correct": false}, {"id": "149_E", "text": "la pr\u00e9sence de jonctions cellulaires", "correct": true}, {"id": "149_F", "text": "localisation superficielle, au niveau de l'organe de l'\u00e9mail", "correct": false}, {"id": "149_G", "text": "des cellules sph\u00e9riques", "correct": false}, {"id": "149_H", "text": "connexion directe avec la papille dentaire", "correct": true}, {"id": "149_I", "text": "des cellules cylindriques", "correct": true}, {"id": "149_J", "text": "pseudostratification", "correct": false}]}, {"id": 150, "question": "L'\u00e9pith\u00e9lium r\u00e9ticulaire de l'organe de l'\u00e9mail, en cloche:", "options": [{"id": "150_A", "text": "est constitu\u00e9 de cellules \u00e9toil\u00e9es, avec des extensions dispos\u00e9es dans toutes les directions", "correct": true}, {"id": "150_B", "text": "est constitu\u00e9 de cellules qui synth\u00e9tisent les glycosaminoglycanes", "correct": false}, {"id": "150_C", "text": "est constitu\u00e9 de cellules qui pr\u00e9sentent des jonctions desmosomales avec les cellules de l'\u00e9pith\u00e9lium interne et les cellules de l'\u00e9pith\u00e9lium externe de l'organe de l'\u00e9mail", "correct": false}, {"id": "150_D", "text": "est directement reli\u00e9 \u00e0 la papille dentaire", "correct": true}, {"id": "150_E", "text": "limite la migration des am\u00e9loblastes dans le processus d'am\u00e9logen\u00e8se, cr\u00e9ant l'espace n\u00e9cessaire \u00e0 leur mouvement vers l'int\u00e9rieur", "correct": true}, {"id": "150_F", "text": "est situ\u00e9 entre l'\u00e9pith\u00e9lium interne et l'\u00e9pith\u00e9lium interm\u00e9diaire", "correct": false}, {"id": "150_G", "text": "est un \u00e9pith\u00e9lium cubique simple", "correct": true}, {"id": "150_H", "text": "se compose de cellules dont le cytoplasme contient des organites cellulaires communs dispers\u00e9s et des structures fibrillaires, telles que des tonofilaments", "correct": false}, {"id": "150_I", "text": "est un \u00e9pith\u00e9lium pavimenteux (squameux) simple", "correct": false}, {"id": "150_J", "text": "permet la migration des am\u00e9loblastes dans le processus d'am\u00e9logen\u00e8se, cr\u00e9ant l'espace n\u00e9cessaire \u00e0 leur mouvement vers l'ext\u00e9rieur", "correct": true}]}, {"id": 151, "question": "L'\u00e9pith\u00e9lium interm\u00e9diaire de l'organe de l'\u00e9mail, au stade de cloche:", "options": [{"id": "151_A", "text": "comprend des cellules cubiques", "correct": false}, {"id": "151_B", "text": "se compose d'une seule couche de cellules squameuses", "correct": true}, {"id": "151_C", "text": "est situ\u00e9 entre l'\u00e9pith\u00e9lium externe et l'\u00e9pith\u00e9lium r\u00e9ticulaire", "correct": true}, {"id": "151_D", "text": "est situ\u00e9 entre l'\u00e9pith\u00e9lium interne et l'\u00e9pith\u00e9lium r\u00e9ticulaire", "correct": false}, {"id": "151_E", "text": "comprend des cellules aplaties", "correct": true}, {"id": "151_F", "text": "se compose d'une seule couche de cellules cylindriques", "correct": false}, {"id": "151_G", "text": "est directement reli\u00e9 \u00e0 la papille dentaire", "correct": false}, {"id": "151_H", "text": "est directement reli\u00e9 \u00e0 l'\u00e9pith\u00e9lium externe", "correct": false}, {"id": "151_I", "text": "se compose de plusieurs couches de cellules (1-4) de formes diff\u00e9rentes", "correct": true}, {"id": "151_J", "text": "comprend des cellules fusiformes ou polygonales", "correct": true}]}, {"id": 152, "question": "L'\u00e9pith\u00e9lium interne de l'organe de l'\u00e9mail, en stade de cloche:", "options": [{"id": "152_A", "text": "se diff\u00e9rencie en cellules ectomesenchymateuses", "correct": true}, {"id": "152_B", "text": "provient de la couche interne de l'\u00e9pith\u00e9lium orale", "correct": false}, {"id": "152_C", "text": "est constitu\u00e9 de cellules prismatiques, avec un noyau central et un cytoplasme riche en glycog\u00e8ne", "correct": false}, {"id": "152_D", "text": "se diff\u00e9rencie en odontoblastes", "correct": true}, {"id": "152_E", "text": "est situ\u00e9 au-dessus de la papille dentaire", "correct": false}, {"id": "152_F", "text": "d\u00e9rive de cellules ectomesenchymateuses", "correct": true}, {"id": "152_G", "text": "se diff\u00e9rencie en am\u00e9loblastes qui vont r\u00e9aliser la synth\u00e8se du ciment", "correct": true}, {"id": "152_H", "text": "est situ\u00e9 sur une membrane basale", "correct": false}, {"id": "152_I", "text": "se diff\u00e9rencie en am\u00e9loblastes qui vont r\u00e9aliser la synth\u00e8se de la dentine", "correct": false}, {"id": "152_J", "text": "se diff\u00e9rencie en pr\u00e9am\u00e9loblastes et am\u00e9loblastes qui vont r\u00e9aliser la synth\u00e8se de l'\u00e9mail", "correct": true}]}, {"id": 153, "question": "Les am\u00e9loblastes:", "options": [{"id": "153_A", "text": "sont responsables de la synth\u00e8se et du d\u00e9p\u00f4t du ciment", "correct": false}, {"id": "153_B", "text": "sont des cellules polaris\u00e9es hautement sp\u00e9cialis\u00e9es", "correct": true}, {"id": "153_C", "text": "sont responsables de la synth\u00e8se et du d\u00e9p\u00f4t de la dentine", "correct": false}, {"id": "153_D", "text": "se diff\u00e9rencient de l'\u00e9pith\u00e9lium interne de l'organe de l'\u00e9mail", "correct": true}, {"id": "153_E", "text": "sont des cellules aplaties", "correct": true}, {"id": "153_F", "text": "ont une origine ectomesenchymateuse", "correct": false}, {"id": "153_G", "text": "d\u00e9terminent la forme de la couronne", "correct": false}, {"id": "153_H", "text": "sont responsables de la synth\u00e8se et du d\u00e9p\u00f4t de l'\u00e9mail", "correct": true}, {"id": "153_I", "text": "se diff\u00e9rencient de l'\u00e9pith\u00e9lium externe de l'organe de l'\u00e9mail", "correct": true}, {"id": "153_J", "text": "induisent la diff\u00e9renciation des cellules ectomesenchymateuses de la p\u00e9riph\u00e9rie de la papille dentaire en odontoblastes", "correct": false}]}, {"id": 154, "question": "La papille dentaire au stade de cloche avanc\u00e9:", "options": [{"id": "154_A", "text": "se transforme en pulpe dentaire, \u00e0 la suite du d\u00e9veloppement de la dentine", "correct": false}, {"id": "154_B", "text": "contient une couche de cellules subodontoblastiques, qui ont la capacit\u00e9, sous certaines conditions de stimulation, de se transformer en odontoblastes", "correct": false}, {"id": "154_C", "text": "contient des odontoblastes dispos\u00e9s au centre de la papille", "correct": true}, {"id": "154_D", "text": "contient des am\u00e9loblastes - cellules prismatiques \u00e9lev\u00e9es, polaris\u00e9es", "correct": true}, {"id": "154_E", "text": "contient des odontoblastes situ\u00e9s \u00e0 la p\u00e9riph\u00e9rie de la papille", "correct": true}, {"id": "154_F", "text": "contient des odontoblastes - de cellules prismatiques hautes, polaris\u00e9es", "correct": false}, {"id": "154_G", "text": "est responsable de la synth\u00e8se et du d\u00e9p\u00f4t de l'\u00e9mail", "correct": false}, {"id": "154_H", "text": "se caract\u00e9rise par l'apparition de pr\u00e9am\u00e9loblastes et plus tard d'am\u00e9loblastes", "correct": false}, {"id": "154_I", "text": "se caract\u00e9rise par la diff\u00e9renciation des pr\u00e9odontoblastes et plus tard des odontoblastes", "correct": true}, {"id": "154_J", "text": "contient une couche de cellules subodontoblastiques, qui ont la capacit\u00e9, sous certaines conditions de stimulation, de se transformer en am\u00e9loblastes", "correct": true}]}, {"id": 155, "question": "Le sac dentaire, en stade de cloche:", "options": [{"id": "155_A", "text": "contient des cellules qui vont se diff\u00e9rencier en odontoblastes", "correct": true}, {"id": "155_B", "text": "enveloppe l'organe de l'\u00e9mail et la papille dentaire, les s\u00e9parant du tissu m\u00e9senchymateux de la gencive et de l'os spongieux maxillaire", "correct": false}, {"id": "155_C", "text": "est responsable de la formation du parodonte (c\u00e9ment, ligament, os alv\u00e9olaire)", "correct": true}, {"id": "155_D", "text": "a une structure compacte et dense", "correct": true}, {"id": "155_E", "text": "contient des cellules fibroblastes (\u00e9galement appel\u00e9es fibroblastes folliculaires)", "correct": false}, {"id": "155_F", "text": "contient de nombreux adipocytes", "correct": true}, {"id": "155_G", "text": "a une structure l\u00e2che", "correct": true}, {"id": "155_H", "text": "est avasculaire", "correct": false}, {"id": "155_I", "text": "contient des fibres de collag\u00e8ne orient\u00e9es radialement", "correct": false}, {"id": "155_J", "text": "n'a pas de terminaisons nerveuses", "correct": false}]}, {"id": 156, "question": "La fin de la phase de cloche est caract\u00e9ris\u00e9e par:", "options": [{"id": "156_A", "text": "la structuration des \u00e9l\u00e9ments vasculaires propres \u00e0 la pulpe dentaire", "correct": true}, {"id": "156_B", "text": "l'apparition du sac dentaire", "correct": false}, {"id": "156_C", "text": "aspect de l'organe de l'\u00e9mail", "correct": true}, {"id": "156_D", "text": "l'apparition de la dentine et de l'\u00e9mail", "correct": false}, {"id": "156_E", "text": "apparition de la lame \u00e9pith\u00e9liale primaire", "correct": true}, {"id": "156_F", "text": "la structuration des \u00e9l\u00e9ments nerveux sp\u00e9cifiques de la pulpe dentaire", "correct": false}, {"id": "156_G", "text": "l'apparition de l'anse cervicale (gaine \u00e9pith\u00e9liale de Hertwig)", "correct": false}, {"id": "156_H", "text": "l'apparition de la papille dentaire", "correct": true}, {"id": "156_I", "text": "la transformation de la papille dentaire en pulpe dentaire", "correct": true}, {"id": "156_J", "text": "le d\u00e9but des processus de formation des \u00e9l\u00e9ments provenant du sac dentaire, qui conduiront \u00e9ventuellement \u00e0 l'apparition du parodonte dentaire", "correct": false}]}, {"id": 157, "question": "L'\u00e9tablissement de la forme de la couronne se caract\u00e9rise par:", "options": [{"id": "157_A", "text": "formation du ligament parodontal", "correct": false}, {"id": "157_B", "text": "d\u00e9p\u00f4t de ciment", "correct": true}, {"id": "157_C", "text": "transformation du point de maturation en une zone de maturation, qui se d\u00e9place vers le bas et lat\u00e9ralement sur la pente de la (des) cuspide(s)", "correct": true}, {"id": "157_D", "text": "apparition d'odontoblastes", "correct": false}, {"id": "157_E", "text": "\"pliage\" de l'\u00e9pith\u00e9lium interm\u00e9diaire de l'organe de l'\u00e9mail, qui donne la forme de la future couronne de la dent", "correct": false}, {"id": "157_F", "text": "la prolif\u00e9ration de cellules dans la r\u00e9gion cervicale, ainsi que le d\u00e9p\u00f4t d'\u00e9mail", "correct": true}, {"id": "157_G", "text": "\"pliage\" de l'\u00e9pith\u00e9lium interne de l'organe de l'\u00e9mail, qui donne la forme de la future couronne de la dent", "correct": true}, {"id": "157_H", "text": "prolif\u00e9ration des c\u00e9mentocytes", "correct": false}, {"id": "157_I", "text": "le d\u00e9p\u00f4t de dentine et d'\u00e9mail, \u00e9tablissant le contour externe et la future jonction am\u00e9lodentinale", "correct": false}, {"id": "157_J", "text": "l'apparition de points de maturation ou \"centres de croissance\"", "correct": true}]}, {"id": 158, "question": "\u00c9pith\u00e9lium r\u00e9duit de l'organe de l'\u00e9mail:", "options": [{"id": "158_A", "text": "est constitu\u00e9 de plusieurs rang\u00e9es de cellules cubiques uniformes recouvrant l'\u00e9mail mature", "correct": false}, {"id": "158_B", "text": "remplit une fonction formatrice (intervient dans le d\u00e9p\u00f4t de l'\u00e9mail et dans l'\u00e9tablissement de la jonction dento-gingivale)", "correct": true}, {"id": "158_C", "text": "remplit une fonction morphog\u00e9n\u00e9tique (intervient dans le fa\u00e7onnage de la forme de la couronne)", "correct": true}, {"id": "158_D", "text": "remplit une fonction inductive (isole l'\u00e9mail des composants du tissu conjonctif dans le sac dentaire et permet l'\u00e9ruption sans exposer le tissu conjonctif)", "correct": false}, {"id": "158_E", "text": "remplit une fonction inductive pour l'initiation de la dentinogen\u00e8se coronale et radiculaire (d\u00e9termine la taille, la forme et le nombre de racines)", "correct": true}, {"id": "158_F", "text": "remplit une fonction protectrice (isole l'\u00e9mail des composants du tissu conjonctif dans le sac dentaire et permet l'\u00e9ruption sans exposer le tissu conjonctif)", "correct": false}, {"id": "158_G", "text": "remplit une fonction inductive pour l'initiation de l'am\u00e9log\u00e9n\u00e8se coronale et radiculaire (d\u00e9termine la taille, la forme et le nombre de racines)", "correct": true}, {"id": "158_H", "text": "remplit une fonction morphog\u00e9n\u00e9tique (intervient dans le fa\u00e7onnage de la forme de la racine)", "correct": true}, {"id": "158_I", "text": "recouvre l'\u00e9mail interne", "correct": false}, {"id": "158_J", "text": "remplit une fonction morphog\u00e9n\u00e9tique (intervient dans la mise en forme du parodonte superficiel)", "correct": false}]}, {"id": 159, "question": "Les \u00e9l\u00e9ments impliqu\u00e9s dans la formation des racines sont:", "options": [{"id": "159_A", "text": "la gaine \u00e9pith\u00e9liale de la racine de Hertwig", "correct": true}, {"id": "159_B", "text": "la jonction am\u00e9lodentinaire", "correct": false}, {"id": "159_C", "text": "les fuseaux d'\u00e9mail", "correct": false}, {"id": "159_D", "text": "l'ach\u00e8vement de la formation de la couronne", "correct": true}, {"id": "159_E", "text": "le sac dentaire", "correct": true}, {"id": "159_F", "text": "l'\u00e9pith\u00e9lium interne de l'organe de l'\u00e9mail", "correct": false}, {"id": "159_G", "text": "l'\u00e9pith\u00e9lium r\u00e9duit de l'organe de l'\u00e9mail", "correct": true}, {"id": "159_H", "text": "les prismes d'\u00e9mail", "correct": false}, {"id": "159_I", "text": "l'anse cervicale", "correct": true}, {"id": "159_J", "text": "le diaphragme \u00e9pith\u00e9lial", "correct": false}]}, {"id": 160, "question": "Dans le d\u00e9veloppement dentaire, le stade d'apposition se caract\u00e9rise par:", "options": [{"id": "160_A", "text": "d\u00e9p\u00f4t de couches de dentine en alternance avec des couches d'\u00e9mail", "correct": true}, {"id": "160_B", "text": "ach\u00e8vement du stade de la coiffe du germe de la dent", "correct": false}, {"id": "160_C", "text": "\u00e9limination progressive de la couche d'am\u00e9loblastes de la couche d'odontoblastes", "correct": false}, {"id": "160_D", "text": "d\u00e9p\u00f4t d'\u00e9mail en couches", "correct": true}, {"id": "160_E", "text": "d\u00e9p\u00f4t de dentine en couches", "correct": true}, {"id": "160_F", "text": "le rapprochement progressif de la couche des am\u00e9loblastes vers celle des odontoblastes", "correct": false}, {"id": "160_G", "text": "p\u00e9riodes d'activit\u00e9 et de repos, alternant \u00e0 des intervalles de temps pr\u00e9cis", "correct": false}, {"id": "160_H", "text": "d\u00e9p\u00f4t rythmique de matrice extracellulaire organique qui se min\u00e9ralise ensuite", "correct": true}, {"id": "160_I", "text": "la formation du sac dentaire", "correct": false}, {"id": "160_J", "text": "d\u00e9p\u00f4t rythmique de matrice extracellulaire inorganique qui se transforme ensuite en matrice extracellulaire organique", "correct": true}]}, {"id": 161, "question": "L'\u00e9mail:", "options": [{"id": "161_A", "text": "est produit par les c\u00e9mentocytes", "correct": false}, {"id": "161_B", "text": "se situe exclusivement au niveau de la couronne dentaire", "correct": true}, {"id": "161_C", "text": "se produit tout au long de la vie de la dent", "correct": false}, {"id": "161_D", "text": "a une origine ectomesenchymateuse", "correct": true}, {"id": "161_E", "text": "a une origine m\u00e9senchymateuse", "correct": true}, {"id": "161_F", "text": "est d'origine \u00e9pith\u00e9liale", "correct": false}, {"id": "161_G", "text": "est produit par les am\u00e9loblastes", "correct": true}, {"id": "161_H", "text": "est produit par les odontoblastes", "correct": true}, {"id": "161_I", "text": "est le tissu le plus dur du corps", "correct": false}, {"id": "161_J", "text": "survient exclusivement avant l'\u00e9ruption des dents", "correct": false}]}, {"id": 162, "question": "L'\u00e9mail de surface (superficiel, externe):", "options": [{"id": "162_A", "text": "est le territoire de l'\u00e9mail le mieux repr\u00e9sent\u00e9", "correct": true}, {"id": "162_B", "text": "est mince", "correct": false}, {"id": "162_C", "text": "repr\u00e9sente une zone moins min\u00e9ralis\u00e9e que l'\u00e9mail sous-jacent", "correct": false}, {"id": "162_D", "text": "pr\u00e9serve l'orientation des cristaux d'hydroxyapatite, parall\u00e8le et perpendiculaire \u00e0 la surface externe", "correct": true}, {"id": "162_E", "text": "peut contenir des prismes \u00e0 trajectoire irr\u00e9guli\u00e8re", "correct": false}, {"id": "162_F", "text": "est situ\u00e9 \u00e0 c\u00f4t\u00e9 de la jonction am\u00e9lodentine", "correct": true}, {"id": "162_G", "text": "repr\u00e9sente une zone plus fortement min\u00e9ralis\u00e9e que l'\u00e9mail sous-jacent", "correct": true}, {"id": "162_H", "text": "ne pr\u00e9sente pas de zones aprismatiques", "correct": false}, {"id": "162_I", "text": "pr\u00e9serve l'orientation des cristaux d'hydroxyapatite, obliquement sur la surface externe", "correct": false}, {"id": "162_J", "text": "pr\u00e9sente des zones aprismatiques", "correct": true}]}, {"id": 163, "question": "Membrane Nasmythe:", "options": [{"id": "163_A", "text": "appara\u00eet avant la formation compl\u00e8te de la couronne, apr\u00e8s l'\u00e9ruption de la dent", "correct": false}, {"id": "163_B", "text": "r\u00e9sulte du processus d\u00e9g\u00e9n\u00e9ratif des odontoblastes", "correct": true}, {"id": "163_C", "text": "contient une membrane \u00e9paisse, structur\u00e9e, acellulaire et dense appel\u00e9e \u00e9pith\u00e9lium r\u00e9duit de l'organe de l'\u00e9mail", "correct": true}, {"id": "163_D", "text": "r\u00e9sulte \u00e0 la suite du processus d\u00e9g\u00e9n\u00e9ratif des am\u00e9loblastes", "correct": false}, {"id": "163_E", "text": "est une membrane \u00e9osinophile, d\u00e9limitant apparemment la surface de l'\u00e9mail", "correct": true}, {"id": "163_F", "text": "est une membrane basophile, d\u00e9limitant apparemment la surface de la dentine", "correct": false}, {"id": "163_G", "text": "pr\u00e9sente, sur la cuticule primaire, une couche cellulaire restante appel\u00e9e \u00e9pith\u00e9lium r\u00e9duit de l'organe de l'\u00e9mail", "correct": false}, {"id": "163_H", "text": "est une membrane basophile, d\u00e9limitant apparemment la surface du c\u00e9ment", "correct": true}, {"id": "163_I", "text": "contient une membrane fine, structur\u00e9e et dense appel\u00e9e cuticule primaire", "correct": true}, {"id": "163_J", "text": "appara\u00eet apr\u00e8s la formation compl\u00e8te de la couronne, juste avant l'\u00e9ruption de la dent", "correct": false}]}, {"id": 164, "question": "Les \u00e9l\u00e9ments morphologiques pr\u00e9sents \u00e0 la surface de l'\u00e9mail, les dents en \u00e9ruption, comprennent:", "options": [{"id": "164_A", "text": "les extr\u00e9mit\u00e9s des prismes", "correct": false}, {"id": "164_B", "text": "alternance entre p\u00e9rikymata et lignes de recouvrement de Pickerill", "correct": false}, {"id": "164_C", "text": "les lames", "correct": true}, {"id": "164_D", "text": "jonction am\u00e9lo-c\u00e9mentaire", "correct": false}, {"id": "164_E", "text": "les fissures", "correct": false}, {"id": "164_F", "text": "jonction am\u00e9lodentinaire", "correct": true}, {"id": "164_G", "text": "les lignes des Tomes", "correct": true}, {"id": "164_H", "text": "la pellicule acquise", "correct": true}, {"id": "164_I", "text": "les fuseaux", "correct": false}, {"id": "164_J", "text": "les touffes", "correct": true}]}, {"id": 165, "question": "La p\u00e9rikymata:", "options": [{"id": "165_A", "text": "repr\u00e9sente un d\u00e9faut de min\u00e9ralisation au niveau de l'\u00e9mail interne", "correct": true}, {"id": "165_B", "text": "repr\u00e9sente les extr\u00e9mit\u00e9s des lignes de von Ebner situ\u00e9es \u00e0 la surface de l'\u00e9mail", "correct": true}, {"id": "165_C", "text": "repr\u00e9sente un ph\u00e9nom\u00e8ne optique identifiable au niveau de l'\u00e9mail interne", "correct": false}, {"id": "165_D", "text": "repr\u00e9sente les extr\u00e9mit\u00e9s des stries de Retzius situ\u00e9es \u00e0 la surface de l'\u00e9mail", "correct": true}, {"id": "165_E", "text": "cr\u00e9e, \u00e0 la surface de la couronne, un aspect semblable aux nervures en relief des feuilles", "correct": false}, {"id": "165_F", "text": "donne \u00e0 l'\u00e9mail un fin relief ext\u00e9rieur ondul\u00e9, observable sous une incidence optimale de la lumi\u00e8re", "correct": true}, {"id": "165_G", "text": "appara\u00eet sous forme de petites saillies \u00e0 la surface de l'\u00e9mail", "correct": true}, {"id": "165_H", "text": "est un \u00e9l\u00e9ment morphologique propre \u00e0 l'\u00e9mail", "correct": false}, {"id": "165_I", "text": "appara\u00eet comme de petites d\u00e9pressions sur la surface de l'\u00e9mail", "correct": false}, {"id": "165_J", "text": "est un \u00e9l\u00e9ment morphologique sp\u00e9cifique \u00e0 la dentine", "correct": false}]}, {"id": 166, "question": "Les lignes de superposition Pickerill:", "options": [{"id": "166_A", "text": "sont situ\u00e9s entre les p\u00e9rikymata", "correct": true}, {"id": "166_B", "text": "repr\u00e9sentent des zones plus hautes, plus convexes, identifiables \u00e0 la surface de l'\u00e9mail", "correct": false}, {"id": "166_C", "text": "disparaissent compl\u00e8tement vers la surface occlusale, cuspide ou incisive, sous l'effet des forces de mastication", "correct": true}, {"id": "166_D", "text": "repr\u00e9sentent les extr\u00e9mit\u00e9s des lignes de von Ebner situ\u00e9es \u00e0 la surface de l'\u00e9mail", "correct": false}, {"id": "166_E", "text": "repr\u00e9sentent de petites d\u00e9pressions, identifiables \u00e0 la surface de l'\u00e9mail", "correct": true}, {"id": "166_F", "text": "repr\u00e9sentent un d\u00e9faut de min\u00e9ralisation au niveau de l'\u00e9mail interne", "correct": false}, {"id": "166_G", "text": "repr\u00e9sentent un ph\u00e9nom\u00e8ne optique identifiable au niveau de l'\u00e9mail interne", "correct": false}, {"id": "166_H", "text": "sont dispos\u00e9s en continu, tout autour de la couronne", "correct": false}, {"id": "166_I", "text": "repr\u00e9sentent les extr\u00e9mit\u00e9s des stries de Retzius situ\u00e9es \u00e0 la surface de l'\u00e9mail", "correct": true}, {"id": "166_J", "text": "sont dispos\u00e9s parall\u00e8lement entre eux et \u00e0 la jonction am\u00e9loc\u00e9mentaire", "correct": true}]}, {"id": 167, "question": "Les lamelles d'\u00e9mail:", "options": [{"id": "167_A", "text": "se d\u00e9veloppent dans des plans de tension, lorsqu'un court segment du prisme n'est pas compl\u00e8tement calcifi\u00e9", "correct": false}, {"id": "167_B", "text": "repr\u00e9sentent les lignes de croissance quotidiennes de l'\u00e9mail", "correct": true}, {"id": "167_C", "text": "sont des structures minces, lin\u00e9aires ou \"en forme de feuille\"", "correct": false}, {"id": "167_D", "text": "sont orient\u00e9s longitudinalement et/ou radialement dans la dent, dans toute l'\u00e9paisseur de l'\u00e9mail", "correct": true}, {"id": "167_E", "text": "sont des 4 types (A, B, C, D)", "correct": true}, {"id": "167_F", "text": "repr\u00e9sentent les lignes de croissance annuelle de l'\u00e9mail", "correct": false}, {"id": "167_G", "text": "repr\u00e9sentent les lignes de croissance hebdomadaires de l'\u00e9mail", "correct": true}, {"id": "167_H", "text": "repr\u00e9sentent un ph\u00e9nom\u00e8ne optique produit par la translation de la lumi\u00e8re \u00e0 travers des prismes", "correct": true}, {"id": "167_I", "text": "apparaissent en raison de d\u00e9fauts de min\u00e9ralisation", "correct": false}, {"id": "167_J", "text": "s'\u00e9tendent de la surface de l'\u00e9mail vers la jonction am\u00e9lodentinaire, p\u00e9n\u00e9trant parfois dans la dentine", "correct": false}]}, {"id": 168, "question": "La pellicule acquise:", "options": [{"id": "168_A", "text": "emp\u00eache le contact direct de l'\u00e9mail avec les fluides de la cavit\u00e9 orale", "correct": true}, {"id": "168_B", "text": "couvre la surface de l'\u00e9mail", "correct": false}, {"id": "168_C", "text": "est form\u00e9 d'un pr\u00e9cipit\u00e9 de lipides salivaires", "correct": true}, {"id": "168_D", "text": "repr\u00e9sente un ph\u00e9nom\u00e8ne optique produit par la translation de la lumi\u00e8re \u00e0 travers des prismes", "correct": true}, {"id": "168_E", "text": "appara\u00eet dans un intervalle de temps tr\u00e8s long (mois) apr\u00e8s le nettoyage m\u00e9canique de la surface de l'\u00e9mail", "correct": false}, {"id": "168_F", "text": "appara\u00eet en tr\u00e8s peu de temps (minutes) apr\u00e8s le nettoyage m\u00e9canique de la surface de l'\u00e9mail", "correct": true}, {"id": "168_G", "text": "repr\u00e9sente un \"film\" de nature organique", "correct": false}, {"id": "168_H", "text": "recouvre la surface de la dentine", "correct": false}, {"id": "168_I", "text": "recouvre la surface du ciment", "correct": false}, {"id": "168_J", "text": "est constitu\u00e9 d'un pr\u00e9cipit\u00e9 de prot\u00e9ines salivaires", "correct": true}]}, {"id": 169, "question": "Les fuseaux d'\u00e9mail:", "options": [{"id": "169_A", "text": "sont distribu\u00e9s de fa\u00e7on ordonn\u00e9e", "correct": false}, {"id": "169_B", "text": "proviennent de l'\u00e9mail", "correct": true}, {"id": "169_C", "text": "apparaissent par la p\u00e9n\u00e9tration d'extensions d'am\u00e9loblastes parmi les odontoblastes sus-jacents, avant le d\u00e9but du d\u00e9p\u00f4t d'\u00e9mail", "correct": false}, {"id": "169_D", "text": "ont une faible teneur en mati\u00e8res organiques par rapport aux zones d'\u00e9mail adjacentes", "correct": false}, {"id": "169_E", "text": "ne suivent pas la direction des prismes", "correct": true}, {"id": "169_F", "text": "ont une teneur organique accrue par rapport aux zones d'\u00e9mail adjacentes", "correct": false}, {"id": "169_G", "text": "sont distribu\u00e9s au hasard", "correct": false}, {"id": "169_H", "text": "apparaissent par la p\u00e9n\u00e9tration d'extensions des odontoblastes parmi les am\u00e9loblastes sus-jacents, avant le d\u00e9but du d\u00e9p\u00f4t d'\u00e9mail", "correct": true}, {"id": "169_I", "text": "suivent la direction des prismes", "correct": true}, {"id": "169_J", "text": "proviennent de la dentine", "correct": false}]}, {"id": 170, "question": "Les touffes d'\u00e9mail:", "options": [{"id": "170_A", "text": "sont facilement identifiable dans les coupes d\u00e9min\u00e9ralis\u00e9es", "correct": false}, {"id": "170_B", "text": "ont une teneur \u00e9lev\u00e9e en mati\u00e8res organiques", "correct": true}, {"id": "170_C", "text": "se produisent dans les zones o\u00f9 la min\u00e9ralisation est compl\u00e8te", "correct": true}, {"id": "170_D", "text": "sont orient\u00e9s longitudinalement", "correct": true}, {"id": "170_E", "text": "sont orient\u00e9s dans un plan transversal", "correct": false}, {"id": "170_F", "text": "sont tr\u00e8s difficiles \u00e0 identifier dans les coupes au sol", "correct": true}, {"id": "170_G", "text": "sont identifi\u00e9s dans les coupes", "correct": false}, {"id": "170_H", "text": "se forment suite \u00e0 d'importantes transformations dans l'orientation des diff\u00e9rents groupes de prismes, au-dessus de la jonction am\u00e9lodentinaire", "correct": false}, {"id": "170_I", "text": "se produisent dans des zones o\u00f9 la min\u00e9ralisation n'est pas compl\u00e8te", "correct": true}, {"id": "170_J", "text": "otn une faible teneur en mati\u00e8res organiques", "correct": false}]}, {"id": 171, "question": "Les touffes d'\u00e9mail:", "options": [{"id": "171_A", "text": "ont une forme ramifi\u00e9e", "correct": true}, {"id": "171_B", "text": "repr\u00e9sentent un ph\u00e9nom\u00e8ne optique induit par l'orientation des prismes", "correct": false}, {"id": "171_C", "text": "s'\u00e9tendent jusqu'au tiers interne de l'\u00e9mail moyen", "correct": false}, {"id": "171_D", "text": "sont facilement identifiables dans les sections coup\u00e9es, en raison de leur forme caract\u00e9ristique", "correct": false}, {"id": "171_E", "text": "sont facilement identifiables dans les sections d\u00e9min\u00e9ralis\u00e9es", "correct": true}, {"id": "171_F", "text": "s'\u00e9tendent \u00e0 la surface de l'\u00e9mail", "correct": false}, {"id": "171_G", "text": "ont une faible teneur en mati\u00e8res organiques", "correct": true}, {"id": "171_H", "text": "sont plus \u00e9lev\u00e9s par rapport aux fuseaux", "correct": false}, {"id": "171_I", "text": "apparaissent par la p\u00e9n\u00e9tration d'extensions des odontoblastes parmi les am\u00e9loblastes sus-jacents, avant le d\u00e9but du d\u00e9p\u00f4t d'\u00e9mail", "correct": false}, {"id": "171_J", "text": "ont une teneur \u00e9lev\u00e9e en mati\u00e8res organiques", "correct": true}]}, {"id": 172, "question": "Les bandes de Hunter-Schreger:", "options": [{"id": "172_A", "text": "sont situ\u00e9s dans l'\u00e9mail interne", "correct": true}, {"id": "172_B", "text": "ont un aspect arciforme lin\u00e9aire", "correct": true}, {"id": "172_C", "text": "ont l'apparence de bandes claires et sombres altern\u00e9es", "correct": false}, {"id": "172_D", "text": "sont form\u00e9s par rapport \u00e0 l'orientation des prismes", "correct": false}, {"id": "172_E", "text": "sont situ\u00e9s dans l'\u00e9mail externe", "correct": false}, {"id": "172_F", "text": "ont une direction parall\u00e8le aux stries de Retzius", "correct": true}, {"id": "172_G", "text": "repr\u00e9sentent l'expression d'un ph\u00e9nom\u00e8ne optique, en microscopie optique", "correct": false}, {"id": "172_H", "text": "ont une direction perpendiculaire aux stries de Retzius", "correct": true}, {"id": "172_I", "text": "repr\u00e9sentent les d\u00e9fauts de min\u00e9ralisation", "correct": true}, {"id": "172_J", "text": "sont situ\u00e9es dans le tiers interne de l'\u00e9mail moyen", "correct": false}]}, {"id": 173, "question": "Les stries transversales:", "options": [{"id": "173_A", "text": "donnent un aspect \"d'\u00e9chelle\", les stries repr\u00e9sentant les marches", "correct": false}, {"id": "173_B", "text": "forment p\u00e9rikymata au niveau de l'\u00e9mail externe", "correct": true}, {"id": "173_C", "text": "sont plus r\u00e9pandus dans les zones moins min\u00e9ralis\u00e9es", "correct": false}, {"id": "173_D", "text": "sont situ\u00e9s \u00e0 une distance de 4 \u00b5m l'un de l'autre", "correct": true}, {"id": "173_E", "text": "sont situ\u00e9s \u00e0 une distance de 20 \u00b5m l'un de l'autre", "correct": true}, {"id": "173_F", "text": "ont un contour arciforme", "correct": true}, {"id": "173_G", "text": "indiquent le d\u00e9p\u00f4t quotidien de matrice organique", "correct": false}, {"id": "173_H", "text": "sont orient\u00e9s parall\u00e8lement \u00e0 la longueur des prismes", "correct": false}, {"id": "173_I", "text": "indiquent le d\u00e9p\u00f4t hebdomadaire de matrice organique", "correct": false}, {"id": "173_J", "text": "sont orient\u00e9s perpendiculairement \u00e0 la longueur des prismes d'\u00e9mail", "correct": true}]}, {"id": 174, "question": "Les stries de Retzius:", "options": [{"id": "174_A", "text": "sont orient\u00e9s perpendiculairement \u00e0 la longueur des prismes d'\u00e9mail", "correct": true}, {"id": "174_B", "text": "donnent un aspect \"d'\u00e9chelle\", les stries repr\u00e9sentant les marches", "correct": false}, {"id": "174_C", "text": "indiquent le d\u00e9p\u00f4t quotidien de matrice organique", "correct": false}, {"id": "174_D", "text": "d\u00e9crivent un motif arqu\u00e9", "correct": true}, {"id": "174_E", "text": "sont situ\u00e9s \u00e0 une distance de 4 \u00b5m l'un de l'autre", "correct": false}, {"id": "174_F", "text": "indiquent le d\u00e9p\u00f4t quotidien de matrice inorganique", "correct": true}, {"id": "174_G", "text": "indiquent les fronts de croissance hebdomadaires de l'\u00e9mail", "correct": false}, {"id": "174_H", "text": "sont caract\u00e9ristiques de l'\u00e9mail des dents permanentes", "correct": true}, {"id": "174_I", "text": "provoquent l'apparition des p\u00e9rikymata \u00e0 la surface de l'\u00e9mail", "correct": true}, {"id": "174_J", "text": "apparaissent, en coupe longitudinale, sous forme de lignes sombres et parall\u00e8les, dispos\u00e9es \u00e0 certains intervalles", "correct": false}]}, {"id": 175, "question": "Les stries de Retzius:", "options": [{"id": "175_A", "text": "sont situ\u00e9s \u00e0 une distance de 20 \u00b5m l'un de l'autre", "correct": false}, {"id": "175_B", "text": "induisent la formation de film", "correct": false}, {"id": "175_C", "text": "sont plus accentu\u00e9es dans les hypomin\u00e9ralisations induites par des conditions pathologiques ou la nutrition", "correct": true}, {"id": "175_D", "text": "sont moins \u00e9vidents sur les dents de lait et rares sur les dents non \u00e9ruptives", "correct": false}, {"id": "175_E", "text": "repr\u00e9sentent l'expression d'un ph\u00e9nom\u00e8ne optique, en microscopie optique", "correct": true}, {"id": "175_F", "text": "sont situ\u00e9s exclusivement dans l'\u00e9mail interne", "correct": false}, {"id": "175_G", "text": "ont l'apparence de bandes claires et sombres altern\u00e9es", "correct": true}, {"id": "175_H", "text": "sont orient\u00e9s de la jonction am\u00e9lodentinaire vers la surface de l'\u00e9mail", "correct": true}, {"id": "175_I", "text": "refl\u00e8tent les \u00e9tapes successives de la formation de l'\u00e9mail", "correct": true}, {"id": "175_J", "text": "sont sp\u00e9cifiques \u00e0 l'\u00e9mail moyen", "correct": false}]}, {"id": 176, "question": "La ligne n\u00e9onatale, au niveau de l'\u00e9mail:", "options": [{"id": "176_A", "text": "est visible sur les sections au sol", "correct": true}, {"id": "176_B", "text": "peut \u00eatre double", "correct": true}, {"id": "176_C", "text": "repr\u00e9sente une zone d'hypomin\u00e9ralisation", "correct": false}, {"id": "176_D", "text": "refl\u00e8te les changements physiologiques post-partum, en particulier ceux dus au changement de nutrition", "correct": false}, {"id": "176_E", "text": "a un aspect \"d'\u00e9chelle\"", "correct": true}, {"id": "176_F", "text": "est visible dans les zones enti\u00e8rement min\u00e9ralis\u00e9es de l'\u00e9mail", "correct": true}, {"id": "176_G", "text": "est une strie de Retzius extr\u00eamement accentu\u00e9e", "correct": false}, {"id": "176_H", "text": "indique le d\u00e9p\u00f4t quotidien de matrice organique", "correct": false}, {"id": "176_I", "text": "refl\u00e8te les changements physiologiques post-partum, en particulier ceux dus au ralentissement temporaire du d\u00e9veloppement des dents", "correct": false}, {"id": "176_J", "text": "peut \u00eatre triple", "correct": true}]}, {"id": 177, "question": "Les prismes d'\u00e9mail:", "options": [{"id": "177_A", "text": "sont form\u00e9es d'odontoblates", "correct": false}, {"id": "177_B", "text": "peuvent \u00e9galement \u00eatre pr\u00e9sents dans la dentine", "correct": false}, {"id": "177_C", "text": "sont absents dans les zones d'\u00e9mail interne et d'\u00e9mail externe", "correct": true}, {"id": "177_D", "text": "sont des structures prismatiques ou hexagonales, rondes, ovales", "correct": true}, {"id": "177_E", "text": "peuvent \u00e9galement \u00eatre pr\u00e9sents dans le ciment", "correct": true}, {"id": "177_F", "text": "repr\u00e9sentent l'unit\u00e9 morphofonctionnelle de l'\u00e9mail", "correct": false}, {"id": "177_G", "text": "sont situ\u00e9s exclusivement dans l'\u00e9mail interne", "correct": false}, {"id": "177_H", "text": "sont difficiles \u00e0 \u00e9tudier en microscopie optique", "correct": false}, {"id": "177_I", "text": "sont au nombre d'environ 5 \u00e0 12 millions / dent", "correct": true}, {"id": "177_J", "text": "ont un contenu organique accru", "correct": true}]}, {"id": 178, "question": "La prisme d'\u00e9mail:", "options": [{"id": "178_A", "text": "en raison de la g\u00e9om\u00e9trie irr\u00e9guli\u00e8re, on l'appelle aussi \"pyramide\"", "correct": true}, {"id": "178_B", "text": "en raison de sa g\u00e9om\u00e9trie irr\u00e9guli\u00e8re, on l'appelle aussi \"b\u00e2ton\"", "correct": true}, {"id": "178_C", "text": "est synth\u00e9tis\u00e9e par au moins 10 am\u00e9loblastes", "correct": false}, {"id": "178_D", "text": "a \u00e0 peu pr\u00e8s la forme d'un cylindre", "correct": true}, {"id": "178_E", "text": "par section, donne un aspect \"d'\u00e9cailles de poisson\" ou \"fer \u00e0 cheval\"", "correct": false}, {"id": "178_F", "text": "est constitu\u00e9e de collag\u00e8ne de type II", "correct": true}, {"id": "178_G", "text": "a un tr\u00e8s faible degr\u00e9 de min\u00e9ralisation", "correct": false}, {"id": "178_H", "text": "est synth\u00e9tis\u00e9e par un am\u00e9loblaste", "correct": true}, {"id": "178_I", "text": "contient des cristaux d'hydroxyapatite avec une disposition l\u00e9g\u00e8rement \u00e9vas\u00e9e, \u00e0 un angle qui augmente \u00e0 mesure que les cristaux sont dispos\u00e9s vers la p\u00e9riph\u00e9rie du prisme", "correct": false}, {"id": "178_J", "text": "est compos\u00e9e de collag\u00e8ne de type I", "correct": false}]}, {"id": 179, "question": "Les cristaux d'hydroxyapatite dans la structure des prismes:", "options": [{"id": "179_A", "text": "sont pr\u00e9sents en grand nombre dans les zones peu min\u00e9ralis\u00e9es", "correct": false}, {"id": "179_B", "text": "ont des formes r\u00e9guli\u00e8res et circulaires", "correct": true}, {"id": "179_C", "text": "d\u00e9crivent un motif \u00e9labor\u00e9 de ruban, d'aiguille, ou d'hexagone", "correct": true}, {"id": "179_D", "text": "font 30 nm d'\u00e9paisseur, 65 nm de large, quelques um de long", "correct": false}, {"id": "179_E", "text": "sont environ dix fois plus gros que les cristaux des autres tissus min\u00e9ralis\u00e9s", "correct": false}, {"id": "179_F", "text": "ont des formes diverses", "correct": true}, {"id": "179_G", "text": "sont identiques aux cristaux d'hydroxyapatite dans la structure des tubules dentinaires", "correct": true}, {"id": "179_H", "text": "sont environ dix fois plus petits que les cristaux des autres tissus min\u00e9ralis\u00e9s", "correct": false}, {"id": "179_I", "text": "ont diff\u00e9rentes tailles", "correct": true}, {"id": "179_J", "text": "sont de la m\u00eame taille", "correct": false}]}, {"id": 180, "question": "Les prot\u00e9ines d'\u00e9mail:", "options": [{"id": "180_A", "text": "repr\u00e9sentent 70% de l'\u00e9mail total", "correct": false}, {"id": "180_B", "text": "repr\u00e9sentent 30% de l'\u00e9mail total", "correct": false}, {"id": "180_C", "text": "comprennent: amelins, amelogenins, enamelins, tuftelins", "correct": true}, {"id": "180_D", "text": "ne repr\u00e9sentent que 2 \u00e0 4% de l'\u00e9mail total", "correct": false}, {"id": "180_E", "text": "sont des prot\u00e9ines de nature acide", "correct": true}, {"id": "180_F", "text": "sont des prot\u00e9ines non collag\u00e8nes glycosyl\u00e9es, sulfat\u00e9es et phosphoryl\u00e9es", "correct": true}, {"id": "180_G", "text": "sont similaires au collag\u00e8ne", "correct": false}, {"id": "180_H", "text": "sont r\u00e9partis dans tout le volume de l'\u00e9mail sous forme de faisceaux \u00e9pais, dispos\u00e9s entre et parmi les cristaux d'hydroxyapatite", "correct": true}, {"id": "180_I", "text": "se r\u00e9partissent dans tout le volume de l'\u00e9mail sous la forme d'un fin r\u00e9seau de dentelles, dispos\u00e9es entre et parmi les cristaux d'hydroxyapatite", "correct": false}, {"id": "180_J", "text": "repr\u00e9sentent le composant inorganique de l'\u00e9mail", "correct": true}]}];
        let allQuestions = [], currentQuestions = [], currentPage = 0;
        const questionsPerPage = 20;
        let totalScore = 0, maxPossibleScore = 0;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function initQuiz() {
            allQuestions = JSON.parse(JSON.stringify(quizData));
            shuffleArray(allQuestions);
            allQuestions.forEach(q => shuffleArray(q.options));
            currentPage = 0; totalScore = 0; maxPossibleScore = 0;
            allQuestions.forEach(q => { q.options.forEach(o => { if (o.correct) maxPossibleScore++; }) });
            document.getElementById('btn-recommencer').style.display = 'none';
            document.getElementById('results').style.display = 'none';
            document.getElementById('nav-buttons').style.display = 'flex';
            renderPage();
        }

        function updateProgress() {
            const totalPages = Math.ceil(allQuestions.length / questionsPerPage);
            const percent = ((currentPage) / totalPages) * 100;
            document.getElementById('progress-fill').style.width = percent + '%';
            document.getElementById('status-text').innerHTML = `Page ${currentPage + 1} sur ${totalPages} <strong>(${allQuestions.length} Questions)</strong>`;
        }

        function renderPage() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';
            const startIndex = currentPage * questionsPerPage;
            const endIndex = Math.min(startIndex + questionsPerPage, allQuestions.length);
            currentQuestions = allQuestions.slice(startIndex, endIndex);

            currentQuestions.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = 'q-' + q.id;
                
                const title = document.createElement('h3');
                title.className = 'question-title';
                // Affiche uniquement le numéro interne + la question sans re-afficher le numero "102." qui perturbait la lecture
                title.textContent = `Q${startIndex + index + 1} - ${q.question}`;
                card.appendChild(title);
                
                const optionsGrid = document.createElement('div');
                optionsGrid.className = 'options-grid';
                
                q.options.forEach(opt => {
                    const label = document.createElement('label');
                    label.className = 'option-label';
                    label.id = 'label-' + opt.id;
                    
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.name = 'question-' + q.id;
                    checkbox.value = opt.id;
                    
                    const text = document.createTextNode(opt.text);
                    label.appendChild(checkbox);
                    label.appendChild(text);
                    optionsGrid.appendChild(label);
                });
                card.appendChild(optionsGrid);
                container.appendChild(card);
            });

            updateProgress();
            const btnSuivant = document.getElementById('btn-suivant');
            btnSuivant.disabled = true;
            btnSuivant.textContent = "Page Suivante (validez d'abord) 🔒";
            btnSuivant.classList.remove('ready');
            document.getElementById('btn-valider').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function validerReponses() {
            let pageScore = 0, pageMaxScore = 0;
            currentQuestions.forEach(q => {
                q.options.forEach(opt => {
                    if (opt.correct) pageMaxScore++;
                    const checkbox = document.querySelector(`input[value="${opt.id}"]`);
                    const label = document.getElementById(`label-${opt.id}`);
                    checkbox.disabled = true;
                    label.classList.add('disabled');
                    if (checkbox.checked) {
                        if (opt.correct) { label.classList.add('is-correct'); pageScore++; totalScore++; } 
                        else { label.classList.add('is-incorrect'); }
                    } else {
                        if (opt.correct) { label.classList.add('missed-correct'); }
                    }
                });
            });
            
            const resultsDiv = document.getElementById('results');
            const scoreText = document.getElementById('score-text');
            const globalScoreText = document.getElementById('global-score-text');
            const percentage = pageMaxScore > 0 ? Math.round((pageScore / pageMaxScore) * 100) : 0;
            
            scoreText.textContent = `Score de la page : ${pageScore} / ${pageMaxScore} (${percentage}%)`;
            globalScoreText.textContent = `Score cumulé : ${totalScore} bonnes réponses.`;
            resultsDiv.style.display = 'block';
            document.getElementById('btn-valider').style.display = 'none';
            
            const btnSuivant = document.getElementById('btn-suivant');
            if ((currentPage + 1) * questionsPerPage < allQuestions.length) {
                btnSuivant.disabled = false;
                btnSuivant.textContent = "Page Suivante ➡️";
                btnSuivant.classList.add('ready');
            } else {
                document.getElementById('nav-buttons').style.display = 'none';
                document.getElementById('progress-fill').style.width = '100%';
                const finalPercentage = maxPossibleScore > 0 ? Math.round((totalScore/maxPossibleScore)*100) : 0;
                globalScoreText.innerHTML = `<strong>🎉 FINI !</strong><br>Score Final : ${totalScore} / ${maxPossibleScore} (${finalPercentage}%)`;
                document.getElementById('btn-recommencer').style.display = 'block';
            }
            resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function pageSuivante() { currentPage++; renderPage(); }
        window.onload = initQuiz;
    </script>
