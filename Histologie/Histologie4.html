": "repr\u00e9sente la zone de dentine entre les tubules dentinaires", "correct": true}, {"id": "189_J", "text": "se d\u00e9pose de l'ext\u00e9rieur vers l'int\u00e9rieur", "correct": false}]}, {"id": 190, "question": "La dentine intertubulaire:", "options": [{"id": "190_A", "text": "est moins min\u00e9ralis\u00e9e que la dentine intratubulaire", "correct": true}, {"id": "190_B", "text": "contient des mati\u00e8res organiques", "correct": false}, {"id": "190_C", "text": "repr\u00e9sente la zone dentinaire entre les tubules dentinaires", "correct": true}, {"id": "190_D", "text": "ne contient pas de mati\u00e8re organique", "correct": false}, {"id": "190_E", "text": "est le composant principal de la dentine", "correct": false}, {"id": "190_F", "text": "est plus min\u00e9ralis\u00e9e que la dentine intratubulaire", "correct": true}, {"id": "190_G", "text": "contient un mat\u00e9riau inorganique (cristaux d'hydroxyapatite) dispos\u00e9 avec l'axe longitudinal parall\u00e8le aux fibrilles de collag\u00e8ne", "correct": true}, {"id": "190_H", "text": "contient exclusivement des mati\u00e8res organiques", "correct": false}, {"id": "190_I", "text": "repr\u00e9sente la zone dentinaire \u00e0 l'int\u00e9rieur des tubules dentinaires", "correct": false}, {"id": "190_J", "text": "contient exclusivement des mat\u00e9riaux inorganiques (cristaux d'hydroxyapatite)", "correct": true}]}, {"id": 191, "question": "La jonction am\u00e9lodentinaire:", "options": [{"id": "191_A", "text": "se produit dans la dentinogen\u00e8se au site de l'\u00e9pith\u00e9lium r\u00e9duit de l'organe de l'\u00e9mail", "correct": true}, {"id": "191_B", "text": "se situe entre l'\u00e9mail et la dentine au niveau de la couronne dentaire", "correct": true}, {"id": "191_C", "text": "appara\u00eet dans la dentinogen\u00e8se au niveau de la membrane basale qui s\u00e9pare initialement les odontoblastes et les am\u00e9loblastes", "correct": true}, {"id": "191_D", "text": "est une zone compl\u00e8tement min\u00e9ralis\u00e9e", "correct": false}, {"id": "191_E", "text": "se produit dans la dentinogen\u00e8se au site de la membrane basale qui s\u00e9pare initialement l'\u00e9pith\u00e9lium externe et l'\u00e9pith\u00e9lium r\u00e9ticulaire de l'organe de l'\u00e9mail", "correct": false}, {"id": "191_F", "text": "en microscopie optique, sur de dent sec, pr\u00e9sente un aspect festonn\u00e9 et dentel\u00e9", "correct": true}, {"id": "191_G", "text": "en microscopie optique, sur coupes de dent sec, pr\u00e9sente parfois un aspect chevauchant", "correct": false}, {"id": "191_H", "text": "se produit dans la dentinogen\u00e8se au site de la membrane basale qui s\u00e9pare initialement l'\u00e9pith\u00e9lium externe et l'\u00e9pith\u00e9lium interm\u00e9diaire de l'organe de l'\u00e9mail", "correct": false}, {"id": "191_I", "text": "en microscopie optique, sur coupes de dent sec, pr\u00e9sente une \"\u00e9caille de poisson\"", "correct": true}, {"id": "191_J", "text": "en microscopie optique, sur coupes de dent sec, a un aspect rectiligne", "correct": false}]}, {"id": 192, "question": "La jonction dentino-c\u00e9mentaire:", "options": [{"id": "192_A", "text": "repr\u00e9sente la limite de d\u00e9marcation fine entre la dentine et le c\u00e9ment", "correct": true}, {"id": "192_B", "text": "en microscopie optique, sur coupes de dent sec, pr\u00e9sente un aspect en \"\u00e9caille de poisson\"", "correct": true}, {"id": "192_C", "text": "est consid\u00e9r\u00e9 comme un type particulier de c\u00e9ment, encore incompl\u00e8tement d\u00e9fini", "correct": false}, {"id": "192_D", "text": "est consid\u00e9r\u00e9 comme un type particulier de tissu ayant un r\u00f4le de renforcer le c\u00e9ment dentinaire, encore incompl\u00e8tement d\u00e9fini", "correct": false}, {"id": "192_E", "text": "est situ\u00e9 \u00e0 l'ext\u00e9rieur de la couche granulaire de Tomes", "correct": true}, {"id": "192_F", "text": "est consid\u00e9r\u00e9 comme un type particulier d'\u00e9mail, encore incompl\u00e8tement d\u00e9fini, situ\u00e9 au niveau de la racine", "correct": true}, {"id": "192_G", "text": "est consid\u00e9r\u00e9 comme un type particulier de dentine, encore incompl\u00e8tement d\u00e9fini", "correct": false}, {"id": "192_H", "text": "repr\u00e9sente une couche mince et sans structure", "correct": false}, {"id": "192_I", "text": "est situ\u00e9 \u00e0 l'int\u00e9rieur de la couche granulaire de Tomes", "correct": true}, {"id": "192_J", "text": "repr\u00e9sente la limite de d\u00e9marcation approximative entre la dentine et l'\u00e9mail", "correct": false}]}, {"id": 193, "question": "La dentine en manteau:", "options": [{"id": "193_A", "text": "pr\u00e9sente un degr\u00e9 de min\u00e9ralisation extr\u00eamement faible", "correct": true}, {"id": "193_B", "text": "contient une substance fondamentale provenant de la pulpe dentaire", "correct": false}, {"id": "193_C", "text": "est la zone de dentine tardivement form\u00e9e au niveau de la couronne", "correct": false}, {"id": "193_D", "text": "est situ\u00e9e \u00e0 la p\u00e9riph\u00e9rie de la dentine coronaire (dentine coronaire externe)", "correct": true}, {"id": "193_E", "text": "est situ\u00e9e \u00e0 la p\u00e9riph\u00e9rie de la dentine radiculaire (dentine radiculaire externe)", "correct": false}, {"id": "193_F", "text": "est situ\u00e9e imm\u00e9diatement en dessous de la jonction am\u00e9lodentinaire", "correct": true}, {"id": "193_G", "text": "est situ\u00e9e au-dessus de la jonction am\u00e9lodentinaire", "correct": false}, {"id": "193_H", "text": "a un degr\u00e9 extr\u00eamement \u00e9lev\u00e9 de min\u00e9ralisation, plus de 90%", "correct": true}, {"id": "193_I", "text": "est la premi\u00e8re zone de dentine form\u00e9e pr\u00e9cocement au niveau de la couronne", "correct": false}, {"id": "193_J", "text": "est situ\u00e9 \u00e0 l'int\u00e9rieur de la dentine coronaire (dentine coronaire interne)", "correct": false}]}, {"id": 194, "question": "La dentine circumpulpaire:", "options": [{"id": "194_A", "text": "est situ\u00e9e \u00e0 la p\u00e9riph\u00e9rie de la dentine coronaire (dentine coronaire externe)", "correct": true}, {"id": "194_B", "text": "repr\u00e9sente la zone de dentine la plus importante", "correct": false}, {"id": "194_C", "text": "est situ\u00e9e imm\u00e9diatement en dessous de la jonction am\u00e9lodentinaire", "correct": false}, {"id": "194_D", "text": "est situ\u00e9e \u00e0 la p\u00e9riph\u00e9rie de la dentine radiculaire (dentine radiculaire externe)", "correct": false}, {"id": "194_E", "text": "d\u00e9limite la chambre pulpaire", "correct": true}, {"id": "194_F", "text": "montre un degr\u00e9 accru de min\u00e9ralisation, par rapport \u00e0 la dentine du manteau", "correct": true}, {"id": "194_G", "text": "pr\u00e9sente un tr\u00e8s faible degr\u00e9 de min\u00e9ralisation", "correct": true}, {"id": "194_H", "text": "pr\u00e9sente des fibres de collag\u00e8ne de plus petit diam\u00e8tre et avec une orientation moins rigoureuse, par rapport \u00e0 la dentine du manteau", "correct": false}, {"id": "194_I", "text": "constitue le noyau de la dent", "correct": true}, {"id": "194_J", "text": "est la premi\u00e8re zone de dentine form\u00e9e pr\u00e9cocement au niveau de la couronne", "correct": false}]}, {"id": 195, "question": "La predentine:", "options": [{"id": "195_A", "text": "est un mat\u00e9riau similaire au cartilage \u00e9lastique", "correct": false}, {"id": "195_B", "text": "repr\u00e9sente la deuxi\u00e8me couche de matrice dentinaire d\u00e9pos\u00e9e dans le processus de dentinog\u00e9n\u00e8se", "correct": false}, {"id": "195_C", "text": "repr\u00e9sente la premi\u00e8re couche de matrice dentinaire synth\u00e9tis\u00e9e dans le processus de dentinog\u00e9n\u00e8se", "correct": true}, {"id": "195_D", "text": "a un tr\u00e8s haut degr\u00e9 de min\u00e9ralisation", "correct": false}, {"id": "195_E", "text": "est un mat\u00e9riau similaire au cartilage hyalin", "correct": true}, {"id": "195_F", "text": "n'est pas min\u00e9ralis\u00e9e", "correct": true}, {"id": "195_G", "text": "se d\u00e9pose, lors de la dentinogen\u00e8se, au-dessus des odontoblastes", "correct": false}, {"id": "195_H", "text": "est un mat\u00e9riau similaire \u00e0 l'ost\u00e9o\u00efde", "correct": false}, {"id": "195_I", "text": "est un mat\u00e9riau similaire au tissu conjonctif l\u00e2che", "correct": true}, {"id": "195_J", "text": "a une \u00e9paisseur variable", "correct": true}]}, {"id": 196, "question": "La dentine interglobulaire:", "options": [{"id": "196_A", "text": "est compose de chalcosph\u00e9rites", "correct": true}, {"id": "196_B", "text": "est pr\u00e9sente \u00e0 la fois dans la dentine du manteau et dans la dentine circumpulpaire", "correct": false}, {"id": "196_C", "text": "est pr\u00e9sente exclusivement dans la dentine circumpulpaire", "correct": false}, {"id": "196_D", "text": "est plus fr\u00e9quemment localis\u00e9e dans la dentine circumpulpaire en zone coronaire", "correct": true}, {"id": "196_E", "text": "est un d\u00e9faut de min\u00e9ralisation induit par une carence en vitamine D", "correct": false}, {"id": "196_F", "text": "est situ\u00e9e dans les zones exceptionnelles entre les chalcosph\u00e9rites qui n'ont pas fusionn\u00e9 lors du processus de formation de la dentine globulaire", "correct": false}, {"id": "196_G", "text": "repr\u00e9sente des zones de matrice organique hypermin\u00e9ralis\u00e9e", "correct": true}, {"id": "196_H", "text": "est une zone hypermin\u00e9ralis\u00e9e induite par une carence en vitamine D", "correct": false}, {"id": "196_I", "text": "repr\u00e9sente des zones de matrice organique hypomin\u00e9ralis\u00e9e ou compl\u00e8tement non min\u00e9ralis\u00e9e", "correct": false}, {"id": "196_J", "text": "est pr\u00e9sente exclusivement dans la dentine du manteau", "correct": true}]}, {"id": 197, "question": "La couche granulaire de Tomes:", "options": [{"id": "197_A", "text": "ressemble \u00e0 des \"zones granulaires\"", "correct": false}, {"id": "197_B", "text": "repr\u00e9sente une zone d'\u00e9mail \u00e0 faible degr\u00e9 de min\u00e9ralisation", "correct": true}, {"id": "197_C", "text": "repr\u00e9sente une zone de dentine avec un degr\u00e9 accru de min\u00e9ralisation", "correct": true}, {"id": "197_D", "text": "est situ\u00e9e sur la surface interne de la dentine, dans la zone radiculaire", "correct": false}, {"id": "197_E", "text": "est l'\u00e9quivalent de la dentine interglobulaire, au niveau de la racine", "correct": false}, {"id": "197_F", "text": "est situ\u00e9e sur la surface externe de la dentine, dans la zone radiculaire", "correct": true}, {"id": "197_G", "text": "est situ\u00e9e sur la surface externe de la dentine, dans la zone coronaire", "correct": false}, {"id": "197_H", "text": "est situ\u00e9e sur la surface externe de la dentine, adjacent et parall\u00e8le \u00e0 la jonction dentino-c\u00e9mentaire", "correct": true}, {"id": "197_I", "text": "est l'\u00e9quivalent de la dentine globulaire, au niveau de la racine", "correct": true}, {"id": "197_J", "text": "est de plus en plus bien d\u00e9velopp\u00e9 vers l'apex", "correct": false}]}, {"id": 198, "question": "La dentine primaire est caract\u00e9ris\u00e9e par:", "options": [{"id": "198_A", "text": "la pr\u00e9sence de prismes", "correct": false}, {"id": "198_B", "text": "la pr\u00e9sence de voies mortes", "correct": false}, {"id": "198_C", "text": "la pr\u00e9sence de dentine intratubulaire/p\u00e9ritubulaire", "correct": false}, {"id": "198_D", "text": "la pr\u00e9sence de dentine interprismatique", "correct": true}, {"id": "198_E", "text": "la pr\u00e9sence de bandes d'Hunter Schreger", "correct": false}, {"id": "198_F", "text": "la pr\u00e9sence de dentine intraprismatique/p\u00e9riprismatique", "correct": true}, {"id": "198_G", "text": "la pr\u00e9sence de couche granuleuse de Tomes", "correct": true}, {"id": "198_H", "text": "la pr\u00e9sence de lignes de croissance", "correct": false}, {"id": "198_I", "text": "la pr\u00e9sence de dentine intertubulaire", "correct": false}, {"id": "198_J", "text": "la pr\u00e9sence de tubules dentinaires", "correct": true}]}, {"id": 199, "question": "Les lignes de croissance pr\u00e9sentes au niveau de la dentine:", "options": [{"id": "199_A", "text": "sont des structures globulaires, qui marquent le rythme du d\u00e9p\u00f4t de la dentine", "correct": false}, {"id": "199_B", "text": "incluent des lignes de croissance quotidiennes", "correct": true}, {"id": "199_C", "text": "incluent la ligne n\u00e9onatale", "correct": false}, {"id": "199_D", "text": "incluent les lignes de contour d'Owen", "correct": true}, {"id": "199_E", "text": "sont responsables de l'aspect particulier des \"\u00e9cailles de poisson\"", "correct": true}, {"id": "199_F", "text": "incluent des stries transversales", "correct": false}, {"id": "199_G", "text": "incluent les lignes de Retzius", "correct": true}, {"id": "199_H", "text": "sont des structures lin\u00e9aires, qui marquent le rythme du d\u00e9p\u00f4t de la dentine", "correct": false}, {"id": "199_I", "text": "incluent les lignes de von Ebner", "correct": true}, {"id": "199_J", "text": "incluent des lignes d'une \u00e9paisseur constante de 4 microm\u00e8tres", "correct": false}]}, {"id": 200, "question": "Les lignes de contour d'Owen au niveau de la dentine:", "options": [{"id": "200_A", "text": "indiquent des d\u00e9ficiences prononc\u00e9es dans le sch\u00e9ma de min\u00e9ralisation de la dentine", "correct": true}, {"id": "200_B", "text": "sont les analogues des lignes von Ebner en \u00e9mail", "correct": true}, {"id": "200_C", "text": "indiquent le d\u00e9p\u00f4t de dentine \u00e0 un intervalle de 5 jours", "correct": true}, {"id": "200_D", "text": "suivent le contour externe de la dentine", "correct": false}, {"id": "200_E", "text": "sont les analogues des lignes de Retzius en \u00e9mail", "correct": false}, {"id": "200_F", "text": "sont intens\u00e9ment min\u00e9ralis\u00e9s", "correct": false}, {"id": "200_G", "text": "sont intens\u00e9ment color\u00e9s", "correct": true}, {"id": "200_H", "text": "sont les analogues des stries transversales de l'\u00e9mail", "correct": false}, {"id": "200_I", "text": "sont des structures globulaires, qui marquent le rythme du d\u00e9p\u00f4t de la dentine", "correct": true}, {"id": "200_J", "text": "indiquent des p\u00e9riodes altern\u00e9es de min\u00e9ralisation/maturation", "correct": false}]}, {"id": 201, "question": "La pulpe dentaire:", "options": [{"id": "201_A", "text": "est constitu\u00e9e d'un tissu conjonctif l\u00e2che", "correct": false}, {"id": "201_B", "text": "pr\u00e9sente une portion coronaire situ\u00e9e dans la chambre pulpaire (pulpe coronaire)", "correct": true}, {"id": "201_C", "text": "occupe l'espace pulpaire", "correct": false}, {"id": "201_D", "text": "pr\u00e9sente une partie racinaire situ\u00e9e dans la chambre pulpaire (racine pulpaire)", "correct": true}, {"id": "201_E", "text": "est une vari\u00e9t\u00e9 de tissus durs et min\u00e9ralis\u00e9s", "correct": true}, {"id": "201_F", "text": "montre une partie radiculaire situ\u00e9e dans le canal radiculaire (pulpe radiculaire)", "correct": true}, {"id": "201_G", "text": "est l'\u00e9l\u00e9ment central de la dent", "correct": false}, {"id": "201_H", "text": "est situ\u00e9 imm\u00e9diatement sous l'\u00e9mail", "correct": false}, {"id": "201_I", "text": "pr\u00e9sente une partie coronaire situ\u00e9e dans le canal radiculaire (pulpe coronaire)", "correct": true}, {"id": "201_J", "text": "est d'origine \u00e9pith\u00e9liale", "correct": false}]}, {"id": 202, "question": "Les territoires cellulaires d\u00e9crits dans l'architecture de la pulpe dentaire:", "options": [{"id": "202_A", "text": "contiennent le coeur de la pulpe", "correct": true}, {"id": "202_B", "text": "incluent une zone odontoblastique", "correct": false}, {"id": "202_C", "text": "contiennent des fuseaux", "correct": true}, {"id": "202_D", "text": "contiennent faux denticules", "correct": false}, {"id": "202_E", "text": "contiennent vrais denticules", "correct": false}, {"id": "202_F", "text": "incluent une zone acellulaire de Weil (couche sousodontoblastique)", "correct": false}, {"id": "202_G", "text": "contiennent une zone riche cellulaire", "correct": false}, {"id": "202_H", "text": "contiennent des cellules dispos\u00e9es d'une mani\u00e8re particuli\u00e8re qui induisent un aspect histologique sp\u00e9cifique en microscopie optique", "correct": true}, {"id": "202_I", "text": "contiennent la couche granuleuse des Tomes", "correct": true}, {"id": "202_J", "text": "contiennent des prismes", "correct": true}]}, {"id": 203, "question": "La zone odontoblastique de la pulpe dentaire est caract\u00e9ris\u00e9e par:", "options": [{"id": "203_A", "text": "odontoblastes de forme et de taille variables selon le degr\u00e9 de diff\u00e9renciation", "correct": false}, {"id": "203_B", "text": "odontoblastes plac\u00e9s en couche continue, \u00e0 la p\u00e9riph\u00e9rie de la pulpe dentaire", "correct": true}, {"id": "203_C", "text": "odontoblastes plac\u00e9s en couche discontinue, \u00e0 la p\u00e9riph\u00e9rie de la pulpe dentaire", "correct": false}, {"id": "203_D", "text": "odontoblastes de forme et de taille variables selon la localisation coronaire ou radiculaire", "correct": false}, {"id": "203_E", "text": "odontoblastes aplatis, avec un aspect de racine pav\u00e9e, vers le foramen apical", "correct": true}, {"id": "203_F", "text": "contient des cellules de type odontoblastique", "correct": false}, {"id": "203_G", "text": "odontoblastes dispos\u00e9s en \"palissade\", en plusieurs rang\u00e9es (3-5 cellules) - coronaire", "correct": true}, {"id": "203_H", "text": "contient des cellules ectomesenchymateuses indiff\u00e9renci\u00e9es", "correct": true}, {"id": "203_I", "text": "contient des cellules Hohl", "correct": false}, {"id": "203_J", "text": "contient de nombreux fibroblastes", "correct": true}]}, {"id": 204, "question": "La zone acellulaire de Weil de la pulpe dentaire:", "options": [{"id": "204_A", "text": "est plus \u00e9vidente dans la pulpe coronaire", "correct": true}, {"id": "204_B", "text": "contient de nombreux fibroblastes", "correct": false}, {"id": "204_C", "text": "est repr\u00e9sent\u00e9e par un espace cellulaire << libre >> (cellularit\u00e9 extr\u00eamement r\u00e9duite)", "correct": true}, {"id": "204_D", "text": "est situ\u00e9e sous-jacent \u00e0 la zone odontoblastique", "correct": true}, {"id": "204_E", "text": "n'est pas vascularis\u00e9", "correct": true}, {"id": "204_F", "text": "est situ\u00e9e au coeur de la pulpe", "correct": false}, {"id": "204_G", "text": "pr\u00e9sente une cellularit\u00e9 importante, qui augmente avec l'\u00e2ge", "correct": false}, {"id": "204_H", "text": "est situ\u00e9e au-dessus de la zone odontoblastique", "correct": true}, {"id": "204_I", "text": "contient des fibres de collag\u00e8ne", "correct": false}, {"id": "204_J", "text": "contient des fibres nerveuses et des vaisseaux sanguins", "correct": false}]}, {"id": 205, "question": "La zone riche cellulaire de la pulpe dentaire:", "options": [{"id": "205_A", "text": "contient de nombreux odontoblastes, \u00e9tant \u00e0 l'origine de la dentine", "correct": true}, {"id": "205_B", "text": "montre plusieurs types de cellules: cellules de Hohl, cellules ectomesenchymateuses indiff\u00e9renci\u00e9es, fibroblastes, fibrocytes, lymphocytes", "correct": true}, {"id": "205_C", "text": "est situ\u00e9 sous-jacent \u00e0 la zone acellulaire de Weil, vers l'int\u00e9rieur de la pulpe dentaire", "correct": true}, {"id": "205_D", "text": "montre une cellularit\u00e9 plus marqu\u00e9e au niveau coronaire qu'au niveau racinaire", "correct": false}, {"id": "205_E", "text": "est repr\u00e9sent\u00e9e par un espace cellulaire << libre >> (cellularit\u00e9 extr\u00eamement r\u00e9duite)", "correct": false}, {"id": "205_F", "text": "montre une cellularit\u00e9 qui augmente avec l'\u00e2ge", "correct": true}, {"id": "205_G", "text": "montre une cellularit\u00e9 qui diminue avec l'\u00e2ge", "correct": false}, {"id": "205_H", "text": "montre exclusivement des cellules de Hohl", "correct": false}, {"id": "205_I", "text": "est situ\u00e9e au-dessus de la zone acellulaire de Weil, vers l'ext\u00e9rieur de la pulpe dentaire", "correct": true}, {"id": "205_J", "text": "contient une population cellulaire dense, des \u00e9l\u00e9ments vasculaires et nerveux", "correct": false}]}, {"id": 206, "question": "La zone riche cellulaire de la pulpe dentaire:", "options": [{"id": "206_A", "text": "contient des odontoblastes rares", "correct": false}, {"id": "206_B", "text": "contient les d\u00e9bris cellulaires de Mallasez", "correct": false}, {"id": "206_C", "text": "contient des cellules de Hohl", "correct": false}, {"id": "206_D", "text": "ne contient pas d'\u00e9l\u00e9ments nerveux", "correct": true}, {"id": "206_E", "text": "contient des fibrocytes", "correct": true}, {"id": "206_F", "text": "ne contient pas de vaisseaux sanguins", "correct": false}, {"id": "206_G", "text": "contient des fibroblastes", "correct": false}, {"id": "206_H", "text": "est un tissu conjonctif dense", "correct": true}, {"id": "206_I", "text": "contient des lymphocytes", "correct": true}, {"id": "206_J", "text": "contient des cellules ectomesenchymateuses indiff\u00e9renci\u00e9es", "correct": true}]}, {"id": 207, "question": "Le noyau de la pulpe:", "options": [{"id": "207_A", "text": "contient les troncs nerveux de la pulpe dentaire", "correct": false}, {"id": "207_B", "text": "contient de gros vaisseaux sanguins", "correct": true}, {"id": "207_C", "text": "montre une densit\u00e9 cellulaire beaucoup plus faible par rapport \u00e0 la zone riche cellulaire", "correct": true}, {"id": "207_D", "text": "constitue la zone la plus interne de la pulpe", "correct": false}, {"id": "207_E", "text": "montre une densit\u00e9 cellulaire beaucoup plus faible par rapport \u00e0 la zone acellulaire de Weil", "correct": true}, {"id": "207_F", "text": "se caract\u00e9rise par l'absence de terminaisons nerveuses", "correct": false}, {"id": "207_G", "text": "montre une densit\u00e9 cellulaire beaucoup plus \u00e9lev\u00e9e par rapport \u00e0 la zone riche cellulaire", "correct": true}, {"id": "207_H", "text": "est un territoire avasculaire", "correct": false}, {"id": "207_I", "text": "contient plusieurs types de cellules", "correct": true}, {"id": "207_J", "text": "constitue la zone la plus externe de la pulpe", "correct": false}]}, {"id": 208, "question": "Le noyau de la pulpe contient les types de cellules suivants:", "options": [{"id": "208_A", "text": "les d\u00e9bris cellulaires de Mallasez", "correct": true}, {"id": "208_B", "text": "cellules ectomesenchymateuses indiff\u00e9renci\u00e9es", "correct": false}, {"id": "208_C", "text": "cellules \u00e9pith\u00e9liales rares, dispers\u00e9es et discoh\u00e9sives", "correct": true}, {"id": "208_D", "text": "cellules g\u00e9antes multinucl\u00e9\u00e9es", "correct": true}, {"id": "208_E", "text": "fibrocytes", "correct": true}, {"id": "208_F", "text": "odontoblastes rares", "correct": false}, {"id": "208_G", "text": "fibroblastes", "correct": true}, {"id": "208_H", "text": "c\u00e9mentocytes rares", "correct": false}, {"id": "208_I", "text": "macrophages", "correct": false}, {"id": "208_J", "text": "lymphocytes", "correct": false}]}, {"id": 209, "question": "Le complexe dentinopulpaire:", "options": [{"id": "209_A", "text": "est d'origine \u00e9pith\u00e9liale", "correct": false}, {"id": "209_B", "text": "contient des am\u00e9loblastes", "correct": true}, {"id": "209_C", "text": "se caract\u00e9rise par des \u00e9l\u00e9ments fonctionnels sp\u00e9cifiques", "correct": false}, {"id": "209_D", "text": "d\u00e9rive du sac dentaire", "correct": false}, {"id": "209_E", "text": "est une structure complexe, constitu\u00e9e de dentine et de pulpe", "correct": true}, {"id": "209_F", "text": "d\u00e9rive de l'organe de l'\u00e9mail", "correct": false}, {"id": "209_G", "text": "assure des corr\u00e9lations \u00e9troites entre la pulpe dentaire et la dentine", "correct": false}, {"id": "209_H", "text": "contient des odontoblastes", "correct": true}, {"id": "209_I", "text": "produit de l'\u00e9mail", "correct": true}, {"id": "209_J", "text": "produit de la dentine", "correct": true}]}, {"id": 210, "question": "Les odontoblastes:", "options": [{"id": "210_A", "text": "sont responsables de la formation de la dentine", "correct": true}, {"id": "210_B", "text": "deviennent matures par l'apparition d'extension cytoplasmique au niveau du p\u00f4le basal (extension odontoblastique)", "correct": false}, {"id": "210_C", "text": "deviennent matures par l'apparition d'extension cytoplasmique au niveau du p\u00f4le apical (\u00e9longation odontoblastique)", "correct": true}, {"id": "210_D", "text": "sont responsables de la formation de l'\u00e9mail", "correct": true}, {"id": "210_E", "text": "produisent les \u00e9l\u00e9ments du parodonte profond", "correct": false}, {"id": "210_F", "text": "sont d'origine \u00e9pith\u00e9liale", "correct": true}, {"id": "210_G", "text": "apparaissent par la diff\u00e9renciation des cellules ectomesenchymateuses de la papille dentaire", "correct": false}, {"id": "210_H", "text": "se diff\u00e9rencient par l'action inductrice de l'\u00e9pith\u00e9lium interne de l'organe de l'\u00e9mail", "correct": false}, {"id": "210_I", "text": "montrent une extension appel\u00e9e extension am\u00e9loblastique", "correct": false}, {"id": "210_J", "text": "font partie du complexe dentinopulpaire", "correct": true}]}, {"id": 211, "question": "Les odontoblastes, en microscopie \u00e9lectronique, sont caract\u00e9ris\u00e9s par:", "options": [{"id": "211_A", "text": "complexe de Golgi", "correct": true}, {"id": "211_B", "text": "nombreuses inclusions lipidiques pr\u00e9sentes supranucl\u00e9aires", "correct": false}, {"id": "211_C", "text": "\u00e9l\u00e9ments du cytosquelette: k\u00e9ratine", "correct": false}, {"id": "211_D", "text": "nombreuses mitochondries", "correct": true}, {"id": "211_E", "text": "nombreuses inclusions de glycoprot\u00e9ines pr\u00e9sentes infranucl\u00e9aires", "correct": false}, {"id": "211_F", "text": "RER peu d\u00e9velopp\u00e9", "correct": true}, {"id": "211_G", "text": "v\u00e9sicules allong\u00e9es, \u00e9lectrons denses, d\u00e9limit\u00e9es par des membranes, semblables en apparence aux lysosomes", "correct": true}, {"id": "211_H", "text": "quelques mitochondries", "correct": false}, {"id": "211_I", "text": "RER extr\u00eamement bien d\u00e9velopp\u00e9", "correct": false}, {"id": "211_J", "text": "\u00e9l\u00e9ments du cytosquelette: filaments et microtubules", "correct": true}]}, {"id": 212, "question": "L'extension odontoblastique:", "options": [{"id": "212_A", "text": "est situ\u00e9e au niveau du p\u00f4le apical, s\u00e9cr\u00e9toire", "correct": false}, {"id": "212_B", "text": "reste inclus dans la dentine, \u00e0 l'int\u00e9rieur du prisme, qui se construit autour d'elle", "correct": true}, {"id": "212_C", "text": "pr\u00e9sente 4 zones morphologiques", "correct": false}, {"id": "212_D", "text": "reste inclus dans la dentine, \u00e0 l'int\u00e9rieur du tubule dentinaire, qui se construit autour d'elle", "correct": true}, {"id": "212_E", "text": "est form\u00e9e exclusivement de la membrane cellulaire de l'odontoblaste", "correct": false}, {"id": "212_F", "text": "pr\u00e9sente deux zones morphologiques", "correct": true}, {"id": "212_G", "text": "ne reste pas inclus dans la dentine", "correct": false}, {"id": "212_H", "text": "est situ\u00e9e au niveau du p\u00f4le s\u00e9cr\u00e9toire basal", "correct": false}, {"id": "212_I", "text": "repr\u00e9sente une expansion cytoplasmique", "correct": true}, {"id": "212_J", "text": "pr\u00e9sente un cadre terminal au niveau de la zone de transition du corps cellulaire", "correct": false}]}, {"id": 213, "question": "L'odontoblaste au repos/s\u00e9nescent:", "options": [{"id": "213_A", "text": "pr\u00e9sente des granules de s\u00e9cr\u00e9tion", "correct": false}, {"id": "213_B", "text": "montre des organites cellulaires quantitativement r\u00e9duits", "correct": false}, {"id": "213_C", "text": "montre un cytoplasme r\u00e9duit", "correct": true}, {"id": "213_D", "text": "montre des organites cellulaires bien repr\u00e9sent\u00e9s", "correct": true}, {"id": "213_E", "text": "montre le cytoplasme tr\u00e8s bien repr\u00e9sent\u00e9", "correct": true}, {"id": "213_F", "text": "est une cellule moins haute (45 \u00b5m) que l'odontoblaste s\u00e9cr\u00e9toire", "correct": false}, {"id": "213_G", "text": "ne pr\u00e9sente pas de granules s\u00e9cr\u00e9toires", "correct": false}, {"id": "213_H", "text": "est responsable de la production de dentine tertiaire", "correct": true}, {"id": "213_I", "text": "est une cellule plus haute (90 \u00b5m) que l'odontoblaste s\u00e9cr\u00e9toire", "correct": true}, {"id": "213_J", "text": "montre de grandes vacuoles, remplies de lysosomes", "correct": false}]}, {"id": 214, "question": "Les cellules de type odontoblastique:", "options": [{"id": "214_A", "text": "sont pr\u00e9sents exclusivement pendant la p\u00e9riode de d\u00e9veloppement des dents", "correct": true}, {"id": "214_B", "text": "sont impliqu\u00e9es dans la formation de la dentine primaire", "correct": true}, {"id": "214_C", "text": "sont caract\u00e9ristiques de la pulpe dentaire", "correct": false}, {"id": "214_D", "text": "sont pr\u00e9sents, \u00e0 l'\u00e9tat latent, au niveau de la jonction am\u00e9lodentinaire", "correct": true}, {"id": "214_E", "text": "sont impliqu\u00e9es dans la formation de la dentine interglobulaire", "correct": true}, {"id": "214_F", "text": "produisent une dentine r\u00e9paratrice", "correct": false}, {"id": "214_G", "text": "sont situ\u00e9s dans la zone sous-odontoblastique riche en cellules", "correct": true}, {"id": "214_H", "text": "conf\u00e8re \u00e0 l'odontoblaste une dur\u00e9e de vie \u00e9gale \u00e0 celle de la dent viable", "correct": false}, {"id": "214_I", "text": "sont impliqu\u00e9es dans les processus de r\u00e9paration de la dentine", "correct": false}, {"id": "214_J", "text": "sont impliqu\u00e9es dans la formation de la dentine en manteau", "correct": false}]}, {"id": 215, "question": "Les calcifications pulpaires:", "options": [{"id": "215_A", "text": "sont le r\u00e9sultat de processus de min\u00e9ralisation atypiques", "correct": true}, {"id": "215_B", "text": "incluent des calcifications diffuses", "correct": false}, {"id": "215_C", "text": "sont pr\u00e9sents exclusivement dans les dents non \u00e9ruptives", "correct": true}, {"id": "215_D", "text": "peuvent s'\u00e9tendre dans la structure de c\u00e9ment", "correct": false}, {"id": "215_E", "text": "apparaissent fr\u00e9quemment au niveau de la pulpe ou au bord de la dentine", "correct": true}, {"id": "215_F", "text": "sont le r\u00e9sultat de processus typiques de min\u00e9ralisation", "correct": false}, {"id": "215_G", "text": "surviennent fr\u00e9quemment sur des dents saines, avec ou sans \u00e9ruption", "correct": true}, {"id": "215_H", "text": "sont toujours associ\u00e9e \u00e0 la pr\u00e9sence de dentine tertiaire", "correct": true}, {"id": "215_I", "text": "peuvent s'\u00e9tendre dans la structure de la dentine du manteau", "correct": false}, {"id": "215_J", "text": "comprennent des denticules ou des pulpolites (les pierres de pulpe)", "correct": false}]}, {"id": 216, "question": "Les denticules/pulpolites:", "options": [{"id": "216_A", "text": "peuvent \u00eatre uniques", "correct": false}, {"id": "216_B", "text": "ont l'aspect de masses calcifi\u00e9es", "correct": true}, {"id": "216_C", "text": "sont situ\u00e9s exclusivement \u00e0 l'int\u00e9rieur du canal radiculaire", "correct": true}, {"id": "216_D", "text": "sont des calcifications dans lesquelles le rapport Ca/P est plus \u00e9lev\u00e9 que dans la dentine", "correct": false}, {"id": "216_E", "text": "sont de deux types: vrai et faux", "correct": false}, {"id": "216_F", "text": "sont situ\u00e9s exclusivement au sommet", "correct": true}, {"id": "216_G", "text": "sont des calcifications dans lesquelles le rapport Ca/P est similaire \u00e0 celui de la dentine", "correct": false}, {"id": "216_H", "text": "sont de deux types: primaire et secondaire", "correct": false}, {"id": "216_I", "text": "sont souvent situ\u00e9s \u00e0 l'int\u00e9rieur du canal radiculaire", "correct": true}, {"id": "216_J", "text": "sont souvent situ\u00e9s \u00e0 l'apex", "correct": true}]}, {"id": 217, "question": "Les denticules faux:", "options": [{"id": "217_A", "text": "sont entour\u00e9s en surface de cellules \"ressemblant \u00e0 des ost\u00e9oblastes\"", "correct": true}, {"id": "217_B", "text": "peuvent avoir des cellules aplaties attach\u00e9es \u00e0 leur surface", "correct": false}, {"id": "217_C", "text": "sont situ\u00e9s exclusivement dans la pulpe p\u00e9riph\u00e9rique, adjacente \u00e0 la dentine", "correct": false}, {"id": "217_D", "text": "sont souvent situ\u00e9s dans la pulpe centrale", "correct": false}, {"id": "217_E", "text": "sont produits par le d\u00e9p\u00f4t de Ca2+ autour des fibres de collag\u00e8ne densifi\u00e9es", "correct": true}, {"id": "217_F", "text": "se situes exclusivement au niveau de l'apex", "correct": false}, {"id": "217_G", "text": "sont constitu\u00e9s de couches lamellaires concentriques de matrice dentinaire min\u00e9ralis\u00e9e", "correct": false}, {"id": "217_H", "text": "ne contiennent pas de tubules dentinaires", "correct": true}, {"id": "217_I", "text": "sont pr\u00e9sents simultan\u00e9ment sur toutes les dents", "correct": false}, {"id": "217_J", "text": "contiennent des tubules dentinaires", "correct": true}]}, {"id": 218, "question": "Les denticules faux:", "options": [{"id": "218_A", "text": "sont toujours int\u00e9gr\u00e9s dans la dentine tertiaire", "correct": true}, {"id": "218_B", "text": "sont structurellement diff\u00e9rents des vrais denticules", "correct": false}, {"id": "218_C", "text": "se forment autour des caillots sanguins", "correct": true}, {"id": "218_D", "text": "sont constitu\u00e9es de couches concentriques lamellaires ou parfois radiaires de matrice dentinaire min\u00e9ralis\u00e9e", "correct": false}, {"id": "218_E", "text": "sont form\u00e9s par des couches concentriques superpos\u00e9es avec un aspect particulier en \"\u00e9cailles de poisson\"", "correct": false}, {"id": "218_F", "text": "sont pr\u00e9sents dans la pulpe des dents non sorties", "correct": true}, {"id": "218_G", "text": "sont toujours situ\u00e9s sur plusieurs dents simultan\u00e9ment", "correct": true}, {"id": "218_H", "text": "sont le r\u00e9sultat d'un processus de calcification dystrophique", "correct": false}, {"id": "218_I", "text": "ont une structure interne de tubules dentinaires", "correct": true}, {"id": "218_J", "text": "se forment autour d'amas de cellules en d\u00e9composition/compl\u00e8tement d\u00e9compos\u00e9es", "correct": false}]}, {"id": 219, "question": "La pulpe dentaire:", "options": [{"id": "219_A", "text": "a une fonction formatrice", "correct": false}, {"id": "219_B", "text": "a une fonction de r\u00e9g\u00e9n\u00e9ration du ciment", "correct": true}, {"id": "219_C", "text": "a une structure constante tout au long de la vie de la dent", "correct": true}, {"id": "219_D", "text": "a un r\u00f4le dans l'ost\u00e9ogen\u00e8se des processus alv\u00e9olaires", "correct": true}, {"id": "219_E", "text": "a une fonction h\u00e9matoformatrice", "correct": true}, {"id": "219_F", "text": "intervient directement dans la formation du ligament parodontal", "correct": false}, {"id": "219_G", "text": "a une fonction de protection", "correct": false}, {"id": "219_H", "text": "a une fonction nutritionnelle", "correct": true}, {"id": "219_I", "text": "a une fonction r\u00e9paratrice", "correct": false}, {"id": "219_J", "text": "a une fonction inductive", "correct": false}]}, {"id": 220, "question": "Les processus alv\u00e9olaires:", "options": [{"id": "220_A", "text": "repr\u00e9sentent les territoires de la m\u00e2choire (maxillaire) qui forment les alv\u00e9oles dentaires", "correct": true}, {"id": "220_B", "text": "m\u00fbrissent structurellement bien avant la mise en place de la dent en occlusion fonctionnelle", "correct": true}, {"id": "220_C", "text": "m\u00fbrissent structurellement simultan\u00e9ment avec l'\u00e9tablissement de la dent en occlusion fonctionnelle", "correct": true}, {"id": "220_D", "text": "involuent et disparaissent avec l'apparition des dents", "correct": false}, {"id": "220_E", "text": "se forment parall\u00e8lement \u00e0 l'allongement des racines", "correct": false}, {"id": "220_F", "text": "repr\u00e9sentent les saillies osseuses situ\u00e9es entre les alv\u00e9oles dentaires au niveau de la m\u00e2choire (maxillaire)", "correct": false}, {"id": "220_G", "text": "involuent et disparaissent apr\u00e8s la disparition des dents", "correct": false}, {"id": "220_H", "text": "repr\u00e9sentent les territoires de la mandibule qui forment les alv\u00e9oles dentaires", "correct": true}, {"id": "220_I", "text": "repr\u00e9sentent les saillies osseuses situ\u00e9es entre les alv\u00e9oles dentaires au niveau de la mandibule", "correct": false}, {"id": "220_J", "text": "se forment avant l'\u00e9longation des racines", "correct": true}]}, {"id": 221, "question": "Les processus alv\u00e9olaires sont caract\u00e9ris\u00e9s par:", "options": [{"id": "221_A", "text": "composant organique qui comprend des prot\u00e9ines contractiles - actine et myosine", "correct": true}, {"id": "221_B", "text": "composant organique qui comprend des prot\u00e9ines fibreuses - collag\u00e8ne de type V", "correct": false}, {"id": "221_C", "text": "composant organique qui comprend des prot\u00e9ines structurelles - la k\u00e9ratine", "correct": false}, {"id": "221_D", "text": "composant organique qui comprend des prot\u00e9ines fibreuses - collag\u00e8ne de type I", "correct": true}, {"id": "221_E", "text": "composant organique qui comprend des glycoprot\u00e9ines d'adh\u00e9sion", "correct": true}, {"id": "221_F", "text": "composant organique qui comprend des prot\u00e9oglycanes", "correct": true}, {"id": "221_G", "text": "composant organique qui comprend des prot\u00e9ines fibreuses - collag\u00e8ne de type IX", "correct": false}, {"id": "221_H", "text": "origine \u00e9pith\u00e9liale", "correct": false}, {"id": "221_I", "text": "composant organique qui comprend des prot\u00e9ines fibreuses - collag\u00e8ne de type II", "correct": false}, {"id": "221_J", "text": "composant organique qui comprend des glycosaminoglycanes", "correct": true}]}, {"id": 222, "question": "Les processus alv\u00e9olaires pr\u00e9sentent les cellules suivantes dans la structure:", "options": [{"id": "222_A", "text": "l'am\u00e9loblaste", "correct": false}, {"id": "222_B", "text": "l'ost\u00e9ocyte", "correct": true}, {"id": "222_C", "text": "l'odontoblaste", "correct": false}, {"id": "222_D", "text": "la cellule bordante", "correct": false}, {"id": "222_E", "text": "l'ost\u00e9oclaste", "correct": true}, {"id": "222_F", "text": "le chondroblaste", "correct": false}, {"id": "222_G", "text": "la cellule ost\u00e9oprog\u00e9nique", "correct": true}, {"id": "222_H", "text": "le chondrocyte", "correct": true}, {"id": "222_I", "text": "l'ost\u00e9oblaste", "correct": true}, {"id": "222_J", "text": "le c\u00e9mentocyte", "correct": false}]}, {"id": 223, "question": "L'os alv\u00e9olaire proprement dit (lamina cribla, lamina dura) des processus alv\u00e9olaires:", "options": [{"id": "223_A", "text": "est la zone la plus externe du processus alv\u00e9olaire", "correct": true}, {"id": "223_B", "text": "est structurellement constitu\u00e9 d'os spongieux", "correct": false}, {"id": "223_C", "text": "est la zone osseuse d'attache des fibres ligamentaires", "correct": true}, {"id": "223_D", "text": "est pr\u00e9sent exclusivement au niveau mandibulaire", "correct": false}, {"id": "223_E", "text": "est la zone la plus interne du processus alv\u00e9olaire", "correct": true}, {"id": "223_F", "text": "pr\u00e9sente une surface lisse, sans perforations", "correct": false}, {"id": "223_G", "text": "est structurellement constitu\u00e9 d'os compact", "correct": false}, {"id": "223_H", "text": "est ce qu'on appelle l'os fasciculaire", "correct": true}, {"id": "223_I", "text": "est pr\u00e9sent exclusivement au niveau maxillaire", "correct": false}, {"id": "223_J", "text": "pr\u00e9sente de multiples perforations (foramen)", "correct": true}]}, {"id": 224, "question": "Structurellement, l'os fasciculaire des processus alv\u00e9olaires est caract\u00e9ris\u00e9 par:", "options": [{"id": "224_A", "text": "haut degr\u00e9 de min\u00e9ralisation", "correct": true}, {"id": "224_B", "text": "fibres de Sharpey beaucoup plus grosses que celles noy\u00e9es dans le c\u00e9ment", "correct": false}, {"id": "224_C", "text": "fibres de Sharpey p\u00e9n\u00e9trant l'os dans un plan perpendiculaire", "correct": false}, {"id": "224_D", "text": "syst\u00e8mes haversiens/ost\u00e9ones", "correct": true}, {"id": "224_E", "text": "faisceaux de fibres \u00e9lastiques grossi\u00e8res entrelac\u00e9es", "correct": true}, {"id": "224_F", "text": "nombreux ost\u00e9oclastes", "correct": false}, {"id": "224_G", "text": "absence de fibres de Sharpey", "correct": false}, {"id": "224_H", "text": "faisceaux de fibres osseuses grossi\u00e8res entrelac\u00e9es", "correct": true}, {"id": "224_I", "text": "matrice osseuse", "correct": false}, {"id": "224_J", "text": "fibres de Sharpey p\u00e9n\u00e9trant l'os dans un plan oblique", "correct": true}]}, {"id": 225, "question": "Dans la structure des processus alv\u00e9olaires, l'os spongieux:", "options": [{"id": "225_A", "text": "est constitu\u00e9 de trab\u00e9cules osseuses s\u00e9par\u00e9es par des espaces ar\u00e9olaires", "correct": false}, {"id": "225_B", "text": "repr\u00e9sente un composant du parodonte profond, situ\u00e9 entre l'os fasciculaire et le c\u00e9ment", "correct": true}, {"id": "225_C", "text": "comprend des fibres Sharpey", "correct": true}, {"id": "225_D", "text": "ont des syst\u00e8mes de Havers en dehors des trab\u00e9cules osseuses", "correct": false}, {"id": "225_E", "text": "est situ\u00e9 entre l'os fasciculaire et la plaque corticale", "correct": false}, {"id": "225_F", "text": "a des syst\u00e8mes de Havers au milieu des trab\u00e9cules osseuses", "correct": true}, {"id": "225_G", "text": "ne pr\u00e9sentent pas de syst\u00e8mes de Havers au milieu des trab\u00e9cules osseuses", "correct": true}, {"id": "225_H", "text": "est situ\u00e9 au centre (noyau) des processus alv\u00e9olaires", "correct": false}, {"id": "225_I", "text": "est un composant de l'os de soutien", "correct": true}, {"id": "225_J", "text": "comprend les restes de Mallasez", "correct": false}]}, {"id": 226, "question": "Dans la structure des processus alv\u00e9olaires, la plaque corticale:", "options": [{"id": "226_A", "text": "est un os fibrillaire fin et compact", "correct": true}, {"id": "226_B", "text": "est situ\u00e9 au centre (noyau) des processus alv\u00e9olaires", "correct": false}, {"id": "226_C", "text": "forme la plaque externe (orale) et la plaque interne (linguale) des processus alv\u00e9olaires", "correct": false}, {"id": "226_D", "text": "s'\u00e9tend de la cr\u00eate alv\u00e9olaire \u00e0 la base des alv\u00e9oles", "correct": true}, {"id": "226_E", "text": "est situ\u00e9 entre l'os fasciculaire et le ligament parodontal", "correct": true}, {"id": "226_F", "text": "comprend des fibres Sharpey", "correct": false}, {"id": "226_G", "text": "est un composant de l'os de soutien", "correct": true}, {"id": "226_H", "text": "est constitu\u00e9 de trab\u00e9cules osseuses s\u00e9par\u00e9es par des espaces ar\u00e9olaires", "correct": false}, {"id": "226_I", "text": "est constitu\u00e9 de plaques osseuses dispos\u00e9es concentriquement autour des canaux de Havers", "correct": true}, {"id": "226_J", "text": "est aussi appel\u00e9 os fasciculaire immature", "correct": false}]}, {"id": 227, "question": "Le processus alv\u00e9olaire interdentaire:", "options": [{"id": "227_A", "text": "est situ\u00e9 entre l'os fasciculaire et la plaque corticale", "correct": false}, {"id": "227_B", "text": "est situ\u00e9 entre deux alv\u00e9oles adjacentes", "correct": true}, {"id": "227_C", "text": "montre un noyau form\u00e9 par les plaques corticales correspondant aux deux alv\u00e9oles adjacentes", "correct": true}, {"id": "227_D", "text": "pr\u00e9sente, d'un c\u00f4t\u00e9 et de l'autre, l'os fasciculaire correspondant aux deux alv\u00e9oles adjacentes", "correct": false}, {"id": "227_E", "text": "est constitu\u00e9 exclusivement d'os compact", "correct": true}, {"id": "227_F", "text": "est compos\u00e9 exclusivement de fibres Sharpey", "correct": true}, {"id": "227_G", "text": "est situ\u00e9 entre l'os fasciculaire et le ligament parodontal", "correct": false}, {"id": "227_H", "text": "est constitu\u00e9 exclusivement d'os spongieux", "correct": true}, {"id": "227_I", "text": "contient des zones d'os spongieux, situ\u00e9es apicalement", "correct": false}, {"id": "227_J", "text": "contient des zones d'os spongieux, situ\u00e9es de part et d'autre des plaques corticales", "correct": false}]}, {"id": 228, "question": "\u00c9pith\u00e9lium jonctionnel:", "options": [{"id": "228_A", "text": "est un \u00e9pith\u00e9lium k\u00e9ratinis\u00e9 mince pavimenteux (squameux) stratifi\u00e9", "correct": true}, {"id": "228_B", "text": "est un \u00e9pith\u00e9lium mince et stratifi\u00e9", "correct": false}, {"id": "228_C", "text": "recouvre le sillon gingival, formant sa paroi molle", "correct": false}, {"id": "228_D", "text": "n'est pas attach\u00e9 \u00e0 l'\u00e9mail", "correct": true}, {"id": "228_E", "text": "est attach\u00e9 \u00e0 la dentine", "correct": false}, {"id": "228_F", "text": "a une forme triangulaire, ou en \u00e9ventail", "correct": false}, {"id": "228_G", "text": "pr\u00e9sente une particularit\u00e9 structurelle unique \u00e9tant limit\u00e9e par deux membranes basales rectilignes", "correct": true}, {"id": "228_H", "text": "pr\u00e9sente une membrane basale externe, qui le s\u00e9pare du tissu conjonctif sous-jacent", "correct": false}, {"id": "228_I", "text": "pr\u00e9sente une membrane basale interne, attach\u00e9e \u00e0 la dent", "correct": true}, {"id": "228_J", "text": "pr\u00e9sente exclusivement une membrane basale externe", "correct": true}]}, {"id": 229, "question": "Le ligament parodontal:", "options": [{"id": "229_A", "text": "est compos\u00e9 de fibres de collag\u00e8ne de type I", "correct": false}, {"id": "229_B", "text": "contient exclusivement des fibres d'oxytalan", "correct": true}, {"id": "229_C", "text": "est constitu\u00e9 de fibres de collag\u00e8ne de type III", "correct": true}, {"id": "229_D", "text": "est une vari\u00e9t\u00e9 de tissu conjonctif dur et min\u00e9ralis\u00e9", "correct": false}, {"id": "229_E", "text": "contient des fibres d'oxytalan", "correct": true}, {"id": "229_F", "text": "contient des fibrilles de diam\u00e8tre relativement petit (55 nm)", "correct": true}, {"id": "229_G", "text": "contient exclusivement des fibres d'\u00e9launine", "correct": false}, {"id": "229_H", "text": "contient exclusivement des fibres de collag\u00e8ne de type I", "correct": false}, {"id": "229_I", "text": "contient des fibres d'\u00e9launine", "correct": true}, {"id": "229_J", "text": "est une vari\u00e9t\u00e9 de tissu \u00e9pith\u00e9lial", "correct": false}]}, {"id": 230, "question": "Les fibres Sharpey:", "options": [{"id": "230_A", "text": "assurent la fixation du ligament parodontal exclusivement dans l'os", "correct": true}, {"id": "230_B", "text": "peuvent \u00eatre \"bouchonn\u00e9s\"/spiral\u00e9s (dans le c\u00e9ment primaire acellulaire)", "correct": false}, {"id": "230_C", "text": "peuvent \u00eatre droites (dans le c\u00e9ment cellulaire secondaire et l'os)", "correct": false}, {"id": "230_D", "text": "p\u00e9n\u00e9trent jusqu'au niveau de la pulpe dentaire", "correct": true}, {"id": "230_E", "text": "assurent la fixation du ligament parodontal \u00e0 l'os et au c\u00e9ment", "correct": false}, {"id": "230_F", "text": "assurent la fixation du ligament parodontal exclusivement dans le c\u00e9ment", "correct": true}, {"id": "230_G", "text": "repr\u00e9sentent les extr\u00e9mit\u00e9s terminales du ligament parodontal", "correct": false}, {"id": "230_H", "text": "sont organis\u00e9es en faisceaux bien d\u00e9finis et distincts, visibles en microscopie optique", "correct": true}, {"id": "230_I", "text": "p\u00e9n\u00e8trent jusqu'au niveau de l'\u00e9mail", "correct": false}, {"id": "230_J", "text": "sont organis\u00e9es en r\u00e9seau", "correct": true}]}, {"id": 231, "question": "Les fibres d'oxytalan du ligament parodontal:", "options": [{"id": "231_A", "text": "sont form\u00e9es de faisceaux de microfibrilles, plac\u00e9s parall\u00e8lement", "correct": false}, {"id": "231_B", "text": "p\u00e9n\u00e9trent la dentine", "correct": true}, {"id": "231_C", "text": "sont des fibres \u00e9lastiques matures", "correct": false}, {"id": "231_D", "text": "sont les fibres les plus nombreuses du ligament parodontal", "correct": false}, {"id": "231_E", "text": "sont des fibres \u00e9lastiques immatures", "correct": true}, {"id": "231_F", "text": "sont aussi appel\u00e9es fibres additionnelles", "correct": true}, {"id": "231_G", "text": "sont mis en \u00e9vidence par la coloration HE habituelle", "correct": false}, {"id": "231_H", "text": "sont pr\u00e9f\u00e9rentiellement situ\u00e9es autour des parois vasculaires", "correct": false}, {"id": "231_I", "text": "sont mis en \u00e9vidence par des colorations sp\u00e9ciales", "correct": true}, {"id": "231_J", "text": "sont des fibres de collag\u00e8ne immatures", "correct": false}]}, {"id": 232, "question": "Les fibres d'\u00e9launine du ligament parodontal:", "options": [{"id": "232_A", "text": "sont les fibres les plus nombreuses du ligament parodontal", "correct": true}, {"id": "232_B", "text": "sont dispos\u00e9es \u00e0 c\u00f4t\u00e9 des fibres d'oxytalan", "correct": true}, {"id": "232_C", "text": "sont plac\u00e9es dans le r\u00e9seau", "correct": false}, {"id": "232_D", "text": "p\u00e9n\u00e8trent la dentine", "correct": true}, {"id": "232_E", "text": "sont des fibres de collag\u00e8ne immatures", "correct": false}, {"id": "232_F", "text": "soutiennent les faisceaux de fibres de collag\u00e8ne", "correct": true}, {"id": "232_G", "text": "sont des fibres \u00e9lastiques matures", "correct": false}, {"id": "232_H", "text": "sont mis en \u00e9vidence par la coloration HE habituelle", "correct": false}, {"id": "232_I", "text": "sont form\u00e9es de faisceaux de microfibrilles noy\u00e9es dans une petite quantit\u00e9 d'\u00e9lastine", "correct": true}, {"id": "232_J", "text": "forment un vaste \"filet\" du c\u00e9ment \u00e0 l'os", "correct": false}]}, {"id": 233, "question": "Le c\u00e9ment:", "options": [{"id": "233_A", "text": "est moins min\u00e9ralis\u00e9 que l'\u00e9mail", "correct": false}, {"id": "233_B", "text": "est une vari\u00e9t\u00e9 de tissu conjonctif dur et min\u00e9ralis\u00e9", "correct": true}, {"id": "233_C", "text": "se situe exclusivement au niveau coronaire", "correct": true}, {"id": "233_D", "text": "est dispos\u00e9 en couches concentriques autour de la dentine", "correct": true}, {"id": "233_E", "text": "contient structurellement des canaux de Havers et des canaux de Volkman", "correct": false}, {"id": "233_F", "text": "est dispos\u00e9 en couches concentriques autour de l'\u00e9mail", "correct": false}, {"id": "233_G", "text": "se situe exclusivement au niveau de la racine", "correct": true}, {"id": "233_H", "text": "est moins min\u00e9ralis\u00e9e que la dentine", "correct": true}, {"id": "233_I", "text": "est plus fortement min\u00e9ralis\u00e9 que l'\u00e9mail", "correct": false}, {"id": "233_J", "text": "est vascularis\u00e9 et innerv\u00e9", "correct": false}]}, {"id": 234, "question": "Le c\u00e9ment peut pr\u00e9senter les vari\u00e9t\u00e9s morphologiques suivantes:", "options": [{"id": "234_A", "text": "c\u00e9ment secondaire r\u00e9actif", "correct": true}, {"id": "234_B", "text": "c\u00e9ment primaire cellulaire afibrillaire intrins\u00e8que", "correct": false}, {"id": "234_C", "text": "c\u00e9ment primaire acellulaire fibrillaire extrins\u00e8que", "correct": true}, {"id": "234_D", "text": "c\u00e9ment fibrillaire cellulaire mixte secondaire", "correct": true}, {"id": "234_E", "text": "c\u00e9ment primaire acellulaire fibrillaire intrins\u00e8que", "correct": false}, {"id": "234_F", "text": "c\u00e9ment teraire cellulaire fibrillaire mixte", "correct": true}, {"id": "234_G", "text": "c\u00e9ment secondaire cellulaire fibrillaire intrins\u00e8que", "correct": false}, {"id": "234_H", "text": "c\u00e9ment cellaire fibrillaire", "correct": false}, {"id": "234_I", "text": "c\u00e9ment afibrillaire acellulaire", "correct": true}, {"id": "234_J", "text": "c\u00e9ment cellaire afibrillaire extrins\u00e8que primaire", "correct": false}]}, {"id": 235, "question": "\u00c9pith\u00e9lium sulculaire:", "options": [{"id": "235_A", "text": "est attach\u00e9 \u00e0 la dentine", "correct": true}, {"id": "235_B", "text": "est attach\u00e9 \u00e0 l'\u00e9mail", "correct": false}, {"id": "235_C", "text": "a une membrane basale rectiligne", "correct": true}, {"id": "235_D", "text": "est orient\u00e9 face \u00e0 la dent", "correct": true}, {"id": "235_E", "text": "est form\u00e9 \u00e0 partir de l'\u00e9pith\u00e9lium r\u00e9duit de l'organe de l'\u00e9mail", "correct": true}, {"id": "235_F", "text": "s'agit d'un \u00e9pith\u00e9lium stratifi\u00e9 mince non k\u00e9ratinis\u00e9 (squameux)", "correct": false}, {"id": "235_G", "text": "s'\u00e9tend du bord marginal gingival \u00e0 l'\u00e9pith\u00e9lium jonctionnel", "correct": true}, {"id": "235_H", "text": "tapisse le sillon gingival", "correct": false}, {"id": "235_I", "text": "a deux membranes basales", "correct": false}, {"id": "235_J", "text": "est un \u00e9pith\u00e9lium stratifi\u00e9 pavimenteux (squameux) k\u00e9ratinis\u00e9", "correct": false}]}, {"id": 236, "question": "\u00c9pith\u00e9lium sulculaire:", "options": [{"id": "236_A", "text": "n'est pas attach\u00e9 \u00e0 l'\u00e9mail", "correct": false}, {"id": "236_B", "text": "est intens\u00e9ment vascularis\u00e9", "correct": true}, {"id": "236_C", "text": "forme la paroi molle du sillon gingival", "correct": true}, {"id": "236_D", "text": "est un \u00e9pith\u00e9lium pseudostratifi\u00e9", "correct": true}, {"id": "236_E", "text": "pr\u00e9sente une membrane basale externe, attach\u00e9e \u00e0 l'\u00e9mail par des h\u00e9midesmosomes", "correct": false}, {"id": "236_F", "text": "n'est pas k\u00e9ratinis\u00e9, en raison d'une inflammation permanente du tissu conjonctif sous-jacent", "correct": true}, {"id": "236_G", "text": "est form\u00e9 \u00e0 partir de l'anse cervicale", "correct": false}, {"id": "236_H", "text": "pr\u00e9sente une membrane basale lin\u00e9aire, sans cr\u00eates \u00e9pith\u00e9liales", "correct": true}, {"id": "236_I", "text": "est attach\u00e9 au c\u00e9ment", "correct": false}, {"id": "236_J", "text": "est situ\u00e9 dans la continuit\u00e9 de l'\u00e9pith\u00e9lium jonctionnel", "correct": false}]}, {"id": 237, "question": "\u00c9pith\u00e9lium jonctionnel:", "options": [{"id": "237_A", "text": "forme un collier autour de la r\u00e9gion cervicale de la dent", "correct": true}, {"id": "237_B", "text": "est repr\u00e9sent\u00e9 par un \u00e9pith\u00e9lium pavimenteux stratifi\u00e9 dens\u00e9ment k\u00e9ratinis\u00e9", "correct": false}, {"id": "237_C", "text": "est en contact avec la surface min\u00e9ralis\u00e9e de la dent", "correct": true}, {"id": "237_D", "text": "est form\u00e9 \u00e0 partir de l'\u00e9pith\u00e9lium r\u00e9duit de l'organe de l'\u00e9mail", "correct": false}, {"id": "237_E", "text": "s'\u00e9tend du bord marginal gingival \u00e0 l'\u00e9pith\u00e9lium jonctionnel", "correct": true}, {"id": "237_F", "text": "recouvre le sillon gingival, formant sa paroi molle", "correct": false}, {"id": "237_G", "text": "est orient\u00e9 face \u00e0 la dent, mais sans \u00eatre attach\u00e9 \u00e0 l'\u00e9mail", "correct": false}, {"id": "237_H", "text": "s'\u00e9tend coronairement jusqu'\u00e0 la base du sillon gingival", "correct": true}, {"id": "237_I", "text": "est tr\u00e8s intens\u00e9ment vascularis\u00e9", "correct": true}, {"id": "237_J", "text": "est une forme unique/particuli\u00e8re d'\u00e9pith\u00e9lium", "correct": false}]}, {"id": 238, "question": "Le ligament parodontal:", "options": [{"id": "238_A", "text": "est un composant du parodonte profond", "correct": true}, {"id": "238_B", "text": "est un tissu conjonctif \u00e9lastique", "correct": true}, {"id": "238_C", "text": "a, comme population cellulaire majeure, les fibroblastes ligamentaires", "correct": false}, {"id": "238_D", "text": "est un tissu conjonctif l\u00e2che", "correct": false}, {"id": "238_E", "text": "a, comme population cellulaire majeure, les lymphocytes", "correct": true}, {"id": "238_F", "text": "assure l'ancrage de la dent dans l'alv\u00e9ole dentaire", "correct": false}, {"id": "238_G", "text": "est un composant du parodonte superficiel", "correct": true}, {"id": "238_H", "text": "est constitu\u00e9 de cellules et de matrice extracellulaire", "correct": false}, {"id": "238_I", "text": "est un tissu conjonctif dense ordonn\u00e9", "correct": true}, {"id": "238_J", "text": "est avasculaire", "correct": false}]}, {"id": 239, "question": "Le ligament parodontal:", "options": [{"id": "239_A", "text": "a une origine ectomesenchymateuse", "correct": true}, {"id": "239_B", "text": "repr\u00e9sente le tissu de soutien des dents, avec l'os alv\u00e9olaire, le c\u00e9ment et la gencive", "correct": true}, {"id": "239_C", "text": "a une origine endodermique", "correct": false}, {"id": "239_D", "text": "forme le parodonte profond avec l'os alv\u00e9olaire et la gencive", "correct": false}, {"id": "239_E", "text": "se forme lors du d\u00e9veloppement des racines", "correct": true}, {"id": "239_F", "text": "a la forme d'un sablier", "correct": false}, {"id": "239_G", "text": "repr\u00e9sente un type sp\u00e9cial de tissu conjonctif dur", "correct": false}, {"id": "239_H", "text": "forme le parodonte de support avec l'os alv\u00e9olaire et le c\u00e9ment", "correct": true}, {"id": "239_I", "text": "a une \u00e9paisseur d'environ 1 mm", "correct": false}, {"id": "239_J", "text": "a la forme d'une fine gaine", "correct": true}]}];
        let allQuestions = [], currentQuestions = [], currentPage = 0;
        const questionsPerPage = 20;
        let totalScore = 0, maxPossibleScore = 0;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function initQuiz() {
            allQuestions = JSON.parse(JSON.stringify(quizData));
            shuffleArray(allQuestions);
            allQuestions.forEach(q => shuffleArray(q.options));
            currentPage = 0; totalScore = 0; maxPossibleScore = 0;
            allQuestions.forEach(q => { q.options.forEach(o => { if (o.correct) maxPossibleScore++; }) });
            document.getElementById('btn-recommencer').style.display = 'none';
            document.getElementById('results').style.display = 'none';
            document.getElementById('nav-buttons').style.display = 'flex';
            renderPage();
        }

        function updateProgress() {
            const totalPages = Math.ceil(allQuestions.length / questionsPerPage);
            const percent = ((currentPage) / totalPages) * 100;
            document.getElementById('progress-fill').style.width = percent + '%';
            document.getElementById('status-text').innerHTML = `Page ${currentPage + 1} sur ${totalPages} <strong>(${allQuestions.length} Questions)</strong>`;
        }

        function renderPage() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';
            const startIndex = currentPage * questionsPerPage;
            const endIndex = Math.min(startIndex + questionsPerPage, allQuestions.length);
            currentQuestions = allQuestions.slice(startIndex, endIndex);

            currentQuestions.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = 'q-' + q.id;
                
                const title = document.createElement('h3');
                title.className = 'question-title';
                // Affiche uniquement le numéro interne + la question sans re-afficher le numero "102." qui perturbait la lecture
                title.textContent = `Q${startIndex + index + 1} - ${q.question}`;
                card.appendChild(title);
                
                const optionsGrid = document.createElement('div');
                optionsGrid.className = 'options-grid';
                
                q.options.forEach(opt => {
                    const label = document.createElement('label');
                    label.className = 'option-label';
                    label.id = 'label-' + opt.id;
                    
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.name = 'question-' + q.id;
                    checkbox.value = opt.id;
                    
                    const text = document.createTextNode(opt.text);
                    label.appendChild(checkbox);
                    label.appendChild(text);
                    optionsGrid.appendChild(label);
                });
                card.appendChild(optionsGrid);
                container.appendChild(card);
            });

            updateProgress();
            const btnSuivant = document.getElementById('btn-suivant');
            btnSuivant.disabled = true;
            btnSuivant.textContent = "Page Suivante (validez d'abord) 🔒";
            btnSuivant.classList.remove('ready');
            document.getElementById('btn-valider').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function validerReponses() {
            let pageScore = 0, pageMaxScore = 0;
            currentQuestions.forEach(q => {
                q.options.forEach(opt => {
                    if (opt.correct) pageMaxScore++;
                    const checkbox = document.querySelector(`input[value="${opt.id}"]`);
                    const label = document.getElementById(`label-${opt.id}`);
                    checkbox.disabled = true;
                    label.classList.add('disabled');
                    if (checkbox.checked) {
                        if (opt.correct) { label.classList.add('is-correct'); pageScore++; totalScore++; } 
                        else { label.classList.add('is-incorrect'); }
                    } else {
                        if (opt.correct) { label.classList.add('missed-correct'); }
                    }
                });
            });
            
            const resultsDiv = document.getElementById('results');
            const scoreText = document.getElementById('score-text');
            const globalScoreText = document.getElementById('global-score-text');
            const percentage = pageMaxScore > 0 ? Math.round((pageScore / pageMaxScore) * 100) : 0;
            
            scoreText.textContent = `Score de la page : ${pageScore} / ${pageMaxScore} (${percentage}%)`;
            globalScoreText.textContent = `Score cumulé : ${totalScore} bonnes réponses.`;
            resultsDiv.style.display = 'block';
            document.getElementById('btn-valider').style.display = 'none';
            
            const btnSuivant = document.getElementById('btn-suivant');
            if ((currentPage + 1) * questionsPerPage < allQuestions.length) {
                btnSuivant.disabled = false;
                btnSuivant.textContent = "Page Suivante ➡️";
                btnSuivant.classList.add('ready');
            } else {
                document.getElementById('nav-buttons').style.display = 'none';
                document.getElementById('progress-fill').style.width = '100%';
                const finalPercentage = maxPossibleScore > 0 ? Math.round((totalScore/maxPossibleScore)*100) : 0;
                globalScoreText.innerHTML = `<strong>🎉 FINI !</strong><br>Score Final : ${totalScore} / ${maxPossibleScore} (${finalPercentage}%)`;
                document.getElementById('btn-recommencer').style.display = 'block';
            }
            resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function pageSuivante() { currentPage++; renderPage(); }
        window.onload = initQuiz;
    </script>
