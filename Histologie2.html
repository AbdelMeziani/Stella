    <style>
        :root {

    <script>
        const quizData = [{"id": 61, "question": "Les tubules du n\u00e9phron:", "options": [{"id": "61_A", "text": "sont nomm\u00e9s en fonction de leur relation avec le bassinet du rein", "correct": false}, {"id": "61_B", "text": "comprennent le tubule droit distal, commun\u00e9ment appel\u00e9 la branche ascendante \u00e9paisse de l'anse de Henle", "correct": true}, {"id": "61_C", "text": "comprennent le tubule droit proximal, commun\u00e9ment appel\u00e9 le segment descendant \u00e9pais de l'anse de Henle", "correct": false}, {"id": "61_D", "text": "comprennent le tubule droit distal, commun\u00e9ment appel\u00e9 segment ascendant mince de l'anse de Henle", "correct": false}, {"id": "61_E", "text": "comprennent des tubes collecteurs", "correct": false}, {"id": "61_F", "text": "comprennent les segments minces ascendants et descendants de l'anse de Henle", "correct": true}, {"id": "61_G", "text": "comprennent le tubule contourn\u00e9 proximal, avec des cellules pavimenteuses", "correct": true}, {"id": "61_H", "text": "sont nomm\u00e9s en fonction de la trajectoire, de l'emplacement et de l'\u00e9paisseur de la paroi", "correct": false}, {"id": "61_I", "text": "comprennent le tubule droit proximal, commun\u00e9ment appel\u00e9 segment descendant fin", "correct": true}, {"id": "61_J", "text": "comprennent un tubule contourn\u00e9 proximal, avec des cellules cubiques", "correct": true}]}, {"id": 62, "question": "Dans le syst\u00e8me urinaire (excr\u00e9teur):", "options": [{"id": "62_A", "text": "seuls deux reins et deux uret\u00e8res sont inclus", "correct": false}, {"id": "62_B", "text": "les reins jouent un r\u00f4le dans la synth\u00e8se et la s\u00e9cr\u00e9tion de l'hormone glycoprot\u00e9ique \u00e9rythropo\u00ef\u00e9tine (EPO)", "correct": false}, {"id": "62_C", "text": "les reins jouent un r\u00f4le important dans l'hom\u00e9ostasie de l'organisme", "correct": false}, {"id": "62_D", "text": "les reins ont un r\u00f4le dans la synth\u00e8se des oestrog\u00e8nes", "correct": true}, {"id": "62_E", "text": "les reins ont un r\u00f4le dans la synth\u00e8se et la s\u00e9cr\u00e9tion de r\u00e9nine", "correct": false}, {"id": "62_F", "text": "deux reins, deux uret\u00e8res, la vessie et l'ur\u00e8tre sont inclus", "correct": false}, {"id": "62_G", "text": "les reins ont un r\u00f4le dans l'\u00e9limination des produits du catabolisme", "correct": true}, {"id": "62_H", "text": "les reins ont un r\u00f4le dans la synth\u00e8se des cat\u00e9cholamines", "correct": false}, {"id": "62_I", "text": "les reins ont un r\u00f4le dans la synth\u00e8se de la testost\u00e9rone", "correct": false}, {"id": "62_J", "text": "les reins ont un r\u00f4le dans la synth\u00e8se de la calcitonine", "correct": true}]}, {"id": 63, "question": "L'appareil juxtaglom\u00e9rulaire r\u00e9nal:", "options": [{"id": "63_A", "text": "est constitu\u00e9 exclusivement de cellules m\u00e9sangiales glom\u00e9rulaires", "correct": false}, {"id": "63_B", "text": "est constitu\u00e9e par la macula densa", "correct": false}, {"id": "63_C", "text": "comprend des cellules juxtaglom\u00e9rulaires", "correct": true}, {"id": "63_D", "text": "comprend des cellules m\u00e9sangiales extraglom\u00e9rulaires", "correct": false}, {"id": "63_E", "text": "est constitu\u00e9 exclusivement de cellules juxtaglom\u00e9rulaires", "correct": false}, {"id": "63_F", "text": "n'intervient pas dans la r\u00e9gulation de la tension art\u00e9rielle", "correct": false}, {"id": "63_G", "text": "comprend la macula densa", "correct": true}, {"id": "63_H", "text": "r\u00e9gule la tension art\u00e9rielle, en activant le syst\u00e8me r\u00e9nine-angiotensine-aldost\u00e9rone", "correct": false}, {"id": "63_I", "text": "est situ\u00e9 dans la partie terminale du tubule contourn\u00e9 proximal du n\u00e9phron", "correct": false}, {"id": "63_J", "text": "est situ\u00e9 dans la partie terminale du tubule distal droit du n\u00e9phron", "correct": true}]}, {"id": 64, "question": "Les podocytes:", "options": [{"id": "64_A", "text": "montrent une s\u00e9rie d'expansions cytoplasmiques qui sont dispos\u00e9es autour des capillaires glom\u00e9rulaires", "correct": true}, {"id": "64_B", "text": "pr\u00e9sentent un espace allong\u00e9 entre les extensions des podocytes, appel\u00e9 bordure en brosse", "correct": true}, {"id": "64_C", "text": "composent la feuillet visc\u00e9rale de la capsule de Bowman", "correct": false}, {"id": "64_D", "text": "sont aussi appel\u00e9es cellules \u00e9pith\u00e9liales stromales", "correct": false}, {"id": "64_E", "text": "montrent des ramifications secondaires d'expansions cytoplasmiques, appel\u00e9es p\u00e9dicelles", "correct": false}, {"id": "64_F", "text": "composent le feuillet pari\u00e9tal de la capsule de Bowman", "correct": false}, {"id": "64_G", "text": "sont aussi appel\u00e9es cellules \u00e9pith\u00e9liales visc\u00e9rales", "correct": false}, {"id": "64_H", "text": "montrent une s\u00e9rie d'expansions cytoplasmiques dispos\u00e9es autour des tubes collecteurs", "correct": true}, {"id": "64_I", "text": "pr\u00e9sentent un espace allong\u00e9 entre les extensions des podocytes, appel\u00e9 fente filtrante", "correct": false}, {"id": "64_J", "text": "montrent une s\u00e9rie d'expansions cytoplasmiques dispos\u00e9es autour des tubules contourn\u00e9s proximaux", "correct": false}]}, {"id": 65, "question": "Le tubule contourn\u00e9 distal r\u00e9nal:", "options": [{"id": "65_A", "text": "est bord\u00e9 par un \u00e9pith\u00e9lium qui pr\u00e9sente une bordure en brosse bien d\u00e9velopp\u00e9e", "correct": false}, {"id": "65_B", "text": "est situ\u00e9 dans la papille r\u00e9nale", "correct": false}, {"id": "65_C", "text": "fait le lien entre le n\u00e9phron et les tubules collecteurs corticaux", "correct": false}, {"id": "65_D", "text": "est responsable de la r\u00e9absorption de Na+ (sodium)", "correct": true}, {"id": "65_E", "text": "est tapiss\u00e9 d'un \u00e9pith\u00e9lium avec des cellules squameuses", "correct": false}, {"id": "65_F", "text": "est responsable de la s\u00e9cr\u00e9tion de Na+ (sodium)", "correct": true}, {"id": "65_G", "text": "fait le lien entre le n\u00e9phron et le calice", "correct": true}, {"id": "65_H", "text": "est bord\u00e9 par un \u00e9pith\u00e9lium qui ne pr\u00e9sente pas de bordure en brosse bien d\u00e9velopp\u00e9e", "correct": false}, {"id": "65_I", "text": "tapiss\u00e9 par un \u00e9pith\u00e9lium cubique plus haut par rapport au tubule droit distal", "correct": true}, {"id": "65_J", "text": "est situ\u00e9 dans les zones du labyrinthe cortical", "correct": false}]}, {"id": 66, "question": "Les tubes collecteurs:", "options": [{"id": "66_A", "text": "sont tapiss\u00e9s d'un \u00e9pith\u00e9lium qui comprend des cellules cubiques passant \u00e0 des cellules cylindriques", "correct": true}, {"id": "66_B", "text": "ne pr\u00e9sentent pas, dans l'\u00e9pith\u00e9lium, de limites cellulaires visibles", "correct": false}, {"id": "66_C", "text": "sont recouvertes d'un \u00e9pith\u00e9lium comprenant des cellules cylindriques, au niveau cortical", "correct": true}, {"id": "66_D", "text": "sont bord\u00e9es par un \u00e9pith\u00e9lium qui comprend des cellules p\u00e2les et des cellules sombres", "correct": false}, {"id": "66_E", "text": "pr\u00e9sentent, dans l'\u00e9pith\u00e9lium, des limites cellulaires visibles en microscopie optique", "correct": false}, {"id": "66_F", "text": "sont responsables de la concentration finale de l'urine", "correct": true}, {"id": "66_G", "text": "sont constitu\u00e9s exclusivement de cellules p\u00e2les", "correct": false}, {"id": "66_H", "text": "sont constitu\u00e9s exclusivement de cellules sombres", "correct": false}, {"id": "66_I", "text": "sont tapiss\u00e9s d'un \u00e9pith\u00e9lium qui comprend des cellules squameuses", "correct": false}, {"id": "66_J", "text": "sont responsables de la concentration finale de la lymphe", "correct": false}]}, {"id": 67, "question": "La m\u00e9dullaire renale:", "options": [{"id": "67_A", "text": "se caract\u00e9rise par la pr\u00e9sence d'un r\u00e9seau particulier de vaisseaux lymphatiques, appel\u00e9 vasa recta", "correct": true}, {"id": "67_B", "text": "comporte des stries verticales en forme de rayons m\u00e9dullaires", "correct": false}, {"id": "67_C", "text": "repr\u00e9sente la zone interne de couleur p\u00e2le du rein", "correct": true}, {"id": "67_D", "text": "se caract\u00e9rise par la pr\u00e9sence de corpuscules r\u00e9naux", "correct": true}, {"id": "67_E", "text": "se caract\u00e9rise par la pr\u00e9sence de tubes droits et de tubes collecteurs", "correct": false}, {"id": "67_F", "text": "repr\u00e9sente la zone externe rouge-brun du rein", "correct": false}, {"id": "67_G", "text": "est constitu\u00e9 par les pyramides r\u00e9nales, qui ont leur base vers le hile r\u00e9nal et leur sommet vers l'aire corticale", "correct": false}, {"id": "67_H", "text": "est constitu\u00e9 par les pyramides r\u00e9nales, qui ont leur base vers l'aire corticale et leur sommet vers le hile r\u00e9nal", "correct": false}, {"id": "67_I", "text": "se caract\u00e9rise par la pr\u00e9sence d'un r\u00e9seau particulier de capillaires, appel\u00e9 vasa recta", "correct": true}, {"id": "67_J", "text": "comporte des stries horizontales appel\u00e9es colonnes r\u00e9nales", "correct": true}]}, {"id": 68, "question": "L'\u00e9pith\u00e9lium transitionnel (uroth\u00e9lium):", "options": [{"id": "68_A", "text": "est un \u00e9pith\u00e9lium stratifi\u00e9 imperm\u00e9able \u00e0 l'eau et aux sels", "correct": true}, {"id": "68_B", "text": "tapisse la partie initiale de l'ur\u00e8tre", "correct": true}, {"id": "68_C", "text": "tapisse l'ur\u00e8tre membraneux", "correct": false}, {"id": "68_D", "text": "forme une interface entre l'espace urinaire et le tissu conjonctif sous-jacent", "correct": false}, {"id": "68_E", "text": "tapisse le canal d\u00e9f\u00e9rent", "correct": false}, {"id": "68_F", "text": "forme une interface entre l'espace urinaire et le milieu ext\u00e9rieur", "correct": true}, {"id": "68_G", "text": "tapisse la vessie", "correct": true}, {"id": "68_H", "text": "tapisse les uret\u00e8res", "correct": false}, {"id": "68_I", "text": "est un \u00e9pith\u00e9lium stratifi\u00e9 perm\u00e9able \u00e0 l'eau et aux sels", "correct": false}, {"id": "68_J", "text": "tapisse le p\u00e9nis/l'ur\u00e8tre spongieux", "correct": true}]}, {"id": 69, "question": "La vessie urinaire:", "options": [{"id": "69_A", "text": "pr\u00e9sente une zone triangulaire, appel\u00e9e trigone, d\u00e9riv\u00e9e des canaux m\u00e9son\u00e9phriques embryonnaires", "correct": false}, {"id": "69_B", "text": "provient du cloaque, pour la majeure partie de la paroi de la vessie", "correct": false}, {"id": "69_C", "text": "pr\u00e9sente une taille et une forme constantes ind\u00e9pendamment du degr\u00e9 de remplissage", "correct": true}, {"id": "69_D", "text": "constitue un r\u00e9servoir dilatable pour l'urine", "correct": true}, {"id": "69_E", "text": "constitue un r\u00e9servoir inextensible pour l'urine", "correct": false}, {"id": "69_F", "text": "pr\u00e9sente une zone triangulaire, appel\u00e9e trigone, d\u00e9riv\u00e9e du cloaque", "correct": false}, {"id": "69_G", "text": "a trois ouvertures, deux ur\u00e9trales et une ur\u00e9t\u00e9rale", "correct": true}, {"id": "69_H", "text": "a trois ouvertures, deux ur\u00e9t\u00e9rales et une ur\u00e9trale", "correct": true}, {"id": "69_I", "text": "a des tailles et des formes variables selon le degr\u00e9 de remplissage", "correct": true}, {"id": "69_J", "text": "provient des canaux m\u00e9son\u00e9phriques embryonnaires, pour la majeure partie de la paroi", "correct": false}]}, {"id": 70, "question": "Le tissu musculaire lisse de la paroi de la vessie:", "options": [{"id": "70_A", "text": "pr\u00e9sente des faisceaux musculaires et de collag\u00e8ne dispos\u00e9s en forme de couvertures", "correct": true}, {"id": "70_B", "text": "montre des faisceaux musculaires et de collag\u00e8ne qui s'entrelacent de mani\u00e8re al\u00e9atoire", "correct": true}, {"id": "70_C", "text": "est plus ordonn\u00e9 par rapport \u00e0 celui des segments tubulaires des voies urinaires", "correct": false}, {"id": "70_D", "text": "forme une structure musculaire avec un arrangement en anneau qui entoure l'ouverture des uret\u00e8res", "correct": false}, {"id": "70_E", "text": "forme le sphincter ur\u00e9tral externe volontaire", "correct": false}, {"id": "70_F", "text": "forme la couverture musculaire", "correct": false}, {"id": "70_G", "text": "forme une structure musculaire avec une disposition en anneau qui entoure l'ouverture de l'ur\u00e8tre", "correct": false}, {"id": "70_H", "text": "forme l'adventice", "correct": true}, {"id": "70_I", "text": "est situ\u00e9 sous la lamina propria collag\u00e8neuse dense", "correct": true}, {"id": "70_J", "text": "est moins ordonn\u00e9 par rapport \u00e0 celui des segments tubulaires des voies urinaires", "correct": false}]}, {"id": 71, "question": "Les ovaires:", "options": [{"id": "71_A", "text": "s\u00e9cr\u00e8tent des hormones folliculo-stimulantes et lut\u00e9inisantes", "correct": true}, {"id": "71_B", "text": "produisent des gam\u00e8tes appel\u00e9s germinocytes", "correct": true}, {"id": "71_C", "text": "continuent leur fonction \u00e0 la m\u00e9nopause", "correct": true}, {"id": "71_D", "text": "ont deux fonctions interd\u00e9pendantes: la gam\u00e9togen\u00e8se et la st\u00e9ro\u00efdogen\u00e8se (ovogen\u00e8se)", "correct": false}, {"id": "71_E", "text": "sont attach\u00e9s \u00e0 la face post\u00e9rieure du ligament large par le m\u00e9soovaire", "correct": false}, {"id": "71_F", "text": "sont attach\u00e9s \u00e0 l'ut\u00e9rus par le ligament large", "correct": false}, {"id": "71_G", "text": "s\u00e9cr\u00e8tent des hormones st\u00e9ro\u00efdes: \u00e6strog\u00e8nes et progest\u00e9rone", "correct": false}, {"id": "71_H", "text": "produisent des gam\u00e8tes en d\u00e9veloppement, appel\u00e9s ovocytes, et des gam\u00e8tes matures", "correct": false}, {"id": "71_I", "text": "cessent leur fonction \u00e0 la m\u00e9nopause", "correct": false}, {"id": "71_J", "text": "sont attach\u00e9s \u00e0 la face post\u00e9rieure du ligament large par les trompes de Fallope", "correct": true}]}, {"id": 72, "question": "Les ovaires pr\u00e9sentent les caract\u00e9ristiques histologiques suivantes:", "options": [{"id": "72_A", "text": "ils pr\u00e9sentent dans la partie centrale le cortex contenant de nombreuses cellules hilaires ovariennes", "correct": false}, {"id": "72_B", "text": "ils montrent l'\u00e9pith\u00e9lium germinal qui d\u00e9limite le cortical du m\u00e9dullaire", "correct": false}, {"id": "72_C", "text": "ils montrent la p\u00e9riph\u00e9rie corticale contenant les follicules ovariens", "correct": true}, {"id": "72_D", "text": "ils sont d\u00e9limit\u00e9s en surface par la tunique albugin\u00e9e", "correct": true}, {"id": "72_E", "text": "ils pr\u00e9sentent \u00e0 la p\u00e9riph\u00e9rie la m\u00e9dullaire contenant les follicules ovariens", "correct": false}, {"id": "72_F", "text": "ils pr\u00e9sentent la tunique albugin\u00e9e entre l'\u00e9pith\u00e9lium germinal et le cortex sous-jacent", "correct": false}, {"id": "72_G", "text": "ils sont compos\u00e9s d'\u00e9l\u00e9ments corticaux et m\u00e9dullaires", "correct": true}, {"id": "72_H", "text": "ils montrent dans la partie centrale la m\u00e9dullaire form\u00e9e par tissu conjonctif l\u00e2che", "correct": false}, {"id": "72_I", "text": "ils montrent en surface l'\u00e9pith\u00e9lium germinal qui se prolonge par le m\u00e9soth\u00e9lium", "correct": false}, {"id": "72_J", "text": "ils pr\u00e9sentent sur la surface granuleuse qui remplace le m\u00e9soth\u00e9lium", "correct": true}]}, {"id": 73, "question": "Histologiquement, on distingue les types suivants de follicules ovariens en d\u00e9veloppement:", "options": [{"id": "73_A", "text": "follicules lut\u00e9aux", "correct": true}, {"id": "73_B", "text": "follicules atr\u00e9siques", "correct": false}, {"id": "73_C", "text": "follicules secondaires (antraux)", "correct": false}, {"id": "73_D", "text": "follicules primaires unilamellaires", "correct": true}, {"id": "73_E", "text": "follicules matures (de Graaf)", "correct": false}, {"id": "73_F", "text": "follicules lymphatiques", "correct": false}, {"id": "73_G", "text": "follicules primaires multilamellaires", "correct": true}, {"id": "73_H", "text": "follicules germinatifs", "correct": false}, {"id": "73_I", "text": "follicules primordiaux", "correct": true}, {"id": "73_J", "text": "follicules s\u00e9cr\u00e9toires", "correct": true}]}, {"id": 74, "question": "Les follicules primordiaux sont caract\u00e9ris\u00e9s par:", "options": [{"id": "74_A", "text": "le cytoplasme de l'ovocyte (ooplasme) contient de nombreux corps balbiens", "correct": false}, {"id": "74_B", "text": "la surface externe des cellules folliculaires n'a pas de membrane basale", "correct": false}, {"id": "74_C", "text": "dans l'ovaire mature, ils sont situ\u00e9s imm\u00e9diatement sous l'albugin\u00e9e", "correct": false}, {"id": "74_D", "text": "le cytoplasme de l'ovocyte (ooplasme) contient un corps de Balbiani", "correct": true}, {"id": "74_E", "text": "ils apparaissent initialement dans l'ovaire au cours du premier mois de d\u00e9veloppement f\u0153tal", "correct": false}, {"id": "74_F", "text": "dans l'ovaire mature, ils sont situ\u00e9s dans la m\u00e9dullaire", "correct": false}, {"id": "74_G", "text": "ils apparaissent initialement dans l'ovaire au cours du troisi\u00e8me mois de d\u00e9veloppement f\u0153tal", "correct": true}, {"id": "74_H", "text": "l'ovocyte est entour\u00e9 d'une seule couche de cellules de la granulosa", "correct": false}, {"id": "74_I", "text": "l'ovocyte et les cellules folliculaires sont \u00e9troitement appos\u00e9s", "correct": true}, {"id": "74_J", "text": "l'ovocyte est entour\u00e9 d'une seule couche de cellules folliculaires squameuses", "correct": true}]}, {"id": 75, "question": "Les follicules primaires unilamellaires sont caract\u00e9ris\u00e9s par:", "options": [{"id": "75_A", "text": "la zone pellucide se forme \u00e0 l'ext\u00e9rieur de la membrane basale des cellules folliculaires", "correct": false}, {"id": "75_B", "text": "l'ovocyte commence la synth\u00e8se d'une couche lipidique extracellulaire sp\u00e9cifique appel\u00e9e la zone pellucide", "correct": false}, {"id": "75_C", "text": "les cellules folliculaires aplaties entourant l'ovocyte prolif\u00e8rent et deviennent cubiques", "correct": true}, {"id": "75_D", "text": "la zone pellucide est constitu\u00e9e de trois classes de glycoprot\u00e9ines acides sulfat\u00e9es (ZP-1, 2, 3)", "correct": false}, {"id": "75_E", "text": "la zone pellucide se forme entre l'ovocyte et les cellules folliculaires adjacentes", "correct": true}, {"id": "75_F", "text": "l'ovocyte commence la synth\u00e8se d'une enveloppe prot\u00e9ique extracellulaire sp\u00e9cifique appel\u00e9e la zone pellucide", "correct": false}, {"id": "75_G", "text": "repr\u00e9sentent le premier stade de d\u00e9veloppement du follicule \u00e9volutif", "correct": false}, {"id": "75_H", "text": "les cellules folliculaires aplaties entourant l'ovocyte prolif\u00e8rent et deviennent cylindriques", "correct": true}, {"id": "75_I", "text": "la zone pellucide est constitu\u00e9e de 6 classes de glycoprot\u00e9ines acides sulfat\u00e9es", "correct": true}, {"id": "75_J", "text": "repr\u00e9sentent la deuxi\u00e8me \u00e9tape du d\u00e9veloppement du follicule \u00e9volutif", "correct": false}]}, {"id": 76, "question": "Les follicules primaires multilamellaires sont caract\u00e9ris\u00e9s par:", "options": [{"id": "76_A", "text": "par division m\u00e9iotique, les cellules folliculaires forment un \u00e9pith\u00e9lium stratifi\u00e9", "correct": true}, {"id": "76_B", "text": "la couche basale des cellules de la granulosa ne pr\u00e9sente pas de jonctions serr\u00e9es", "correct": false}, {"id": "76_C", "text": "les cellules folliculaires commencent \u00e0 s'identifier comme des cellules th\u00e9cales", "correct": false}, {"id": "76_D", "text": "la gaine interne contient des cellules s\u00e9cr\u00e9toires cubiques produisant des hormones st\u00e9ro\u00efdes", "correct": true}, {"id": "76_E", "text": "par prolif\u00e9ration mitotique rapide, les cellules folliculaires forment un \u00e9pith\u00e9lium stratifi\u00e9 appel\u00e9 granulosa", "correct": false}, {"id": "76_F", "text": "les cellules folliculaires commencent \u00e0 \u00eatre identifi\u00e9es comme des cellules de la granulosa", "correct": true}, {"id": "76_G", "text": "les cellules du tissu conjonctif \u00e0 proximit\u00e9 imm\u00e9diate du follicule forment les couches th\u00e9cales folliculaires", "correct": true}, {"id": "76_H", "text": "les cellules du tissu conjonctif \u00e0 proximit\u00e9 imm\u00e9diate du follicule forment la membrane basale folliculaire", "correct": false}, {"id": "76_I", "text": "la couche basale des cellules de la granulosa pr\u00e9sente des jonctions serr\u00e9es \u00e9labor\u00e9es", "correct": true}, {"id": "76_J", "text": "la gaine interne contient des cellules s\u00e9cr\u00e9toires cubiques produisant des hormones glycoprot\u00e9iques", "correct": false}]}, {"id": 77, "question": "La gaine interne du follicule ovarien est caract\u00e9ris\u00e9e par:", "options": [{"id": "77_A", "text": "ses cellules pr\u00e9sentent des caract\u00e9ristiques ultrastructurales des cellules productrices de st\u00e9ro\u00efdes", "correct": false}, {"id": "77_B", "text": "ses cellules poss\u00e8dent de nombreux r\u00e9cepteurs pour l'hormone lactog\u00e8ne placentaire", "correct": false}, {"id": "77_C", "text": "ses cellules synth\u00e9tisent les androg\u00e8nes, pr\u00e9curseurs des estrog\u00e8nes", "correct": true}, {"id": "77_D", "text": "repr\u00e9sente la couche externe peu vascularis\u00e9e, avec des cellules s\u00e9cr\u00e9toires cylindriques", "correct": true}, {"id": "77_E", "text": "contient \u00e9galement des fibroblastes, des faisceaux de collag\u00e8ne et un riche r\u00e9seau de petits vaisseaux", "correct": false}, {"id": "77_F", "text": "contient \u00e9galement des mastocytes, des fibres \u00e9lastiques et un r\u00e9seau de fibres musculaires lisses", "correct": true}, {"id": "77_G", "text": "repr\u00e9sente la couche interne hautement vascularis\u00e9e, avec des cellules s\u00e9cr\u00e9toires cubiques", "correct": false}, {"id": "77_H", "text": "ses cellules synth\u00e9tisent l'hormone folliculo-stimulante, pr\u00e9curseur des \u0153strog\u00e8nes", "correct": false}, {"id": "77_I", "text": "ses cellules poss\u00e8dent de nombreux r\u00e9cepteurs de l'hormone lut\u00e9inisante (LH)", "correct": true}, {"id": "77_J", "text": "ses cellules pr\u00e9sentent des caract\u00e9ristiques ultrastructurales des cellules productrices de glycoprot\u00e9ines", "correct": false}]}, {"id": 78, "question": "Le follicule ovarien secondaire (antral) est caract\u00e9ris\u00e9 par:", "options": [{"id": "78_A", "text": "l'apparition de cavit\u00e9s avec du liquide folliculaire entre l'ovocyte et la premi\u00e8re couche de cellules", "correct": false}, {"id": "78_B", "text": "la croissance des follicules et des ovocytes est contr\u00f4l\u00e9e par l'hormone folliculo-stimulante (FSH)", "correct": true}, {"id": "78_C", "text": "l'\u00e9limination de l'ovocyte secondaire \u00e0 l'ovulation", "correct": false}, {"id": "78_D", "text": "la croissance des follicules et des ovocytes est contr\u00f4l\u00e9e par l'hormone lut\u00e9inisante (LH)", "correct": true}, {"id": "78_E", "text": "l'apparition de cavit\u00e9s avec du liquide folliculaire entre les cellules de la granulosa", "correct": true}, {"id": "78_F", "text": "mouvement progressif, au fur et \u00e0 mesure qu'il grandit, vers la surface", "correct": false}, {"id": "78_G", "text": "la fusion de cavit\u00e9s avec du liquide pour former une seule cavit\u00e9 en forme de croissant appel\u00e9e antre", "correct": false}, {"id": "78_H", "text": "son d\u00e9placement progressif, au fur et \u00e0 mesure de sa taille, vers la profondeur du stroma cortical", "correct": false}, {"id": "78_I", "text": "l'existence d'un antre contenant du liquide", "correct": true}, {"id": "78_J", "text": "la fusion de cavit\u00e9s avec du liquide pour former une seule cavit\u00e9 circulaire, appel\u00e9e corona radiata", "correct": false}]}, {"id": 79, "question": "Cumulus oophorus et corona radiata se caract\u00e9risent par:", "options": [{"id": "79_A", "text": "contiennent la fine couche de cellules de la granulosa associ\u00e9e \u00e0 l'ovocyte", "correct": false}, {"id": "79_B", "text": "corona radiata se forme apr\u00e8s l'ovulation, \u00e0 partir des cellules th\u00e9cales internes", "correct": false}, {"id": "79_C", "text": "le cumulus oophorus est form\u00e9 par cellules de la granulosa situ\u00e9es \u00e0 la p\u00e9riph\u00e9rie du follicule secondaire", "correct": true}, {"id": "79_D", "text": "cumulus oophorus repr\u00e9sente un \u00e9pith\u00e9lium squameux stratifi\u00e9", "correct": true}, {"id": "79_E", "text": "les cellules de la corona radiata proviennent du cumulus et envoient des microvillosit\u00e9s p\u00e9n\u00e9trantes", "correct": false}, {"id": "79_F", "text": "le cumulus oophorus est constitu\u00e9 par cellules de la granulosa associ\u00e9es \u00e0 l'ovocyte", "correct": true}, {"id": "79_G", "text": "ils apparaissent dans la structure du follicule primaire", "correct": false}, {"id": "79_H", "text": "ils se forment au fur et \u00e0 mesure que le follicule secondaire grandit et m\u00fbrit", "correct": false}, {"id": "79_I", "text": "les cellules de la corona radiata pr\u00e9sentent des st\u00e9r\u00e9ocils", "correct": true}, {"id": "79_J", "text": "la corona radiata se forme lors de l'ovulation, \u00e0 partir des cellules situ\u00e9es \u00e0 proximit\u00e9 imm\u00e9diate de l'ovocyte", "correct": false}]}, {"id": 80, "question": "Le follicule mature (de Graaf) est caract\u00e9ris\u00e9 par:", "options": [{"id": "80_A", "text": "l'existence de la corona granulata \u00e0 la p\u00e9riph\u00e9rie du follicule", "correct": false}, {"id": "80_B", "text": "g\u00e9n\u00e9ralement, un seul follicule mature ovule pendant le cycle ovarien", "correct": false}, {"id": "80_C", "text": "g\u00e9n\u00e9ralement, plusieurs follicules matures ovulent pendant le cycle ovarien", "correct": true}, {"id": "80_D", "text": "l'existence d'un grand antre et d'une gaine interne pro\u00e9minente", "correct": false}, {"id": "80_E", "text": "l'ovocyte secondaire est lib\u00e9r\u00e9 au moment de l'ovulation, par la rupture du follicule mature", "correct": true}, {"id": "80_F", "text": "l'ovocyte devient un ovocyte secondaire, en reprenant la premi\u00e8re division mitotique", "correct": true}, {"id": "80_G", "text": "l'existence de corona radiata et de cumulus oophorus, autour de l'ovocyte", "correct": false}, {"id": "80_H", "text": "l'existence d'un petit antre et d'une gaine externe pro\u00e9minente", "correct": false}, {"id": "80_I", "text": "l'ovocyte primaire est lib\u00e9r\u00e9 au moment de l'ovulation, par rupture du corps jaune", "correct": true}, {"id": "80_J", "text": "l'ovocyte devient un ovocyte secondaire, en reprenant la premi\u00e8re division m\u00e9iotique", "correct": false}]}, {"id": 81, "question": "Le corps jaune/glande lut\u00e9ale/progestative/lut\u00e9ale a les caract\u00e9ristiques suivantes:", "options": [{"id": "81_A", "text": "les cellules de la granulosa et de la gaine interne subissent un processus de lut\u00e9inisation", "correct": true}, {"id": "81_B", "text": "il se forme avant l'ovulation, par lut\u00e9inisation du follicule secondaire", "correct": false}, {"id": "81_C", "text": "initialement, le corps h\u00e9morragique est form\u00e9, par saignement des capillaires de la gaine interne", "correct": true}, {"id": "81_D", "text": "il se forme apr\u00e8s l'ovulation, par la r\u00e9organisation du follicule mature effondr\u00e9", "correct": false}, {"id": "81_E", "text": "les cellules lut\u00e9iniques th\u00e9cales sont situ\u00e9es en p\u00e9riph\u00e9rie et s\u00e9cr\u00e8tent des androg\u00e8nes et de la progest\u00e9rone", "correct": true}, {"id": "81_F", "text": "d'abord le corps albicans est form\u00e9, puis le corps jaune", "correct": false}, {"id": "81_G", "text": "les cellules de lut\u00e9ine de la granulosa sont situ\u00e9es en p\u00e9riph\u00e9rie et s\u00e9cr\u00e8tent des androg\u00e8nes", "correct": false}, {"id": "81_H", "text": "les cellules de lut\u00e9ine de la granulosa sont situ\u00e9es au centre et s\u00e9cr\u00e8tent des \u0153strog\u00e8nes, de la progest\u00e9rone et de l'inhibine", "correct": true}, {"id": "81_I", "text": "les cellules lut\u00e9iniques th\u00e9cales sont situ\u00e9es au centre et s\u00e9cr\u00e8tent des \u0153strog\u00e8nes, de la progest\u00e9rone et de l'inhibine", "correct": false}, {"id": "81_J", "text": "les cellules folliculaires subissent un processus de lut\u00e9inisation", "correct": false}]}, {"id": 82, "question": "Le corps jaune a les caract\u00e9ristiques suivantes:", "options": [{"id": "82_A", "text": "la d\u00e9g\u00e9n\u00e9rescence du corps jaune se produit en l'absence de gonadotrophine chorionique humaine (hCG)", "correct": true}, {"id": "82_B", "text": "le corps jaune d\u00e9g\u00e9n\u00e8re ou subit une involution lente apr\u00e8s la grossesse ou la menstruation", "correct": false}, {"id": "82_C", "text": "le corps jaune a une activit\u00e9 de 14 jours, si la f\u00e9condation et l'implantation ne se produisent pas", "correct": false}, {"id": "82_D", "text": "le corps jaune a une activit\u00e9 de 14 jours, si la f\u00e9condation et l'implantation se produisent", "correct": false}, {"id": "82_E", "text": "le corps jaune se forme en l'absence de f\u00e9condation", "correct": false}, {"id": "82_F", "text": "le corps jaune se forme en l'absence d'ovulation", "correct": true}, {"id": "82_G", "text": "la d\u00e9g\u00e9n\u00e9rescence du corps jaune se produit ", "text": "disposition en rang\u00e9es parall\u00e8les aux bras du \"V\" lingual", "correct": true}, {"id": "120_G", "text": "distribution sur une vaste zone, \u00e9tant en nombre accru", "correct": true}, {"id": "120_H", "text": "aspect/forme du \"bec d'oiseau\" ou du c\u00f4ne", "correct": true}, {"id": "120_I", "text": "aspect de \"champignon\" ou c\u00f4ne", "correct": false}, {"id": "120_J", "text": "distribution sur une petite zone, \u00e9tant en petit nombre", "correct": false}]}];
        let allQuestions = [], currentQuestions = [], currentPage = 0;
        const questionsPerPage = 20;
        let totalScore = 0, maxPossibleScore = 0;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function initQuiz() {
            allQuestions = JSON.parse(JSON.stringify(quizData));
            shuffleArray(allQuestions);
            allQuestions.forEach(q => shuffleArray(q.options));
            currentPage = 0; totalScore = 0; maxPossibleScore = 0;
            allQuestions.forEach(q => { q.options.forEach(o => { if (o.correct) maxPossibleScore++; }) });
            document.getElementById('btn-recommencer').style.display = 'none';
            document.getElementById('results').style.display = 'none';
            document.getElementById('nav-buttons').style.display = 'flex';
            renderPage();
        }

        function updateProgress() {
            const totalPages = Math.ceil(allQuestions.length / questionsPerPage);
            const percent = ((currentPage) / totalPages) * 100;
            document.getElementById('progress-fill').style.width = percent + '%';
            document.getElementById('status-text').innerHTML = `Page ${currentPage + 1} sur ${totalPages} <strong>(${allQuestions.length} Questions)</strong>`;
        }

        function renderPage() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';
            const startIndex = currentPage * questionsPerPage;
            const endIndex = Math.min(startIndex + questionsPerPage, allQuestions.length);
            currentQuestions = allQuestions.slice(startIndex, endIndex);

            currentQuestions.forEach((q, index) => {
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = 'q-' + q.id;
                
                const title = document.createElement('h3');
                title.className = 'question-title';
                // Affiche uniquement le numéro interne + la question sans re-afficher le numero "102." qui perturbait la lecture
                title.textContent = `Q${startIndex + index + 1} - ${q.question}`;
                card.appendChild(title);
                
                const optionsGrid = document.createElement('div');
                optionsGrid.className = 'options-grid';
                
                q.options.forEach(opt => {
                    const label = document.createElement('label');
                    label.className = 'option-label';
                    label.id = 'label-' + opt.id;
                    
                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.name = 'question-' + q.id;
                    checkbox.value = opt.id;
                    
                    const text = document.createTextNode(opt.text);
                    label.appendChild(checkbox);
                    label.appendChild(text);
                    optionsGrid.appendChild(label);
                });
                card.appendChild(optionsGrid);
                container.appendChild(card);
            });

            updateProgress();
            const btnSuivant = document.getElementById('btn-suivant');
            btnSuivant.disabled = true;
            btnSuivant.textContent = "Page Suivante (validez d'abord) 🔒";
            btnSuivant.classList.remove('ready');
            document.getElementById('btn-valider').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function validerReponses() {
            let pageScore = 0, pageMaxScore = 0;
            currentQuestions.forEach(q => {
                q.options.forEach(opt => {
                    if (opt.correct) pageMaxScore++;
                    const checkbox = document.querySelector(`input[value="${opt.id}"]`);
                    const label = document.getElementById(`label-${opt.id}`);
                    checkbox.disabled = true;
                    label.classList.add('disabled');
                    if (checkbox.checked) {
                        if (opt.correct) { label.classList.add('is-correct'); pageScore++; totalScore++; } 
                        else { label.classList.add('is-incorrect'); }
                    } else {
                        if (opt.correct) { label.classList.add('missed-correct'); }
                    }
                });
            });
            
            const resultsDiv = document.getElementById('results');
            const scoreText = document.getElementById('score-text');
            const globalScoreText = document.getElementById('global-score-text');
            const percentage = pageMaxScore > 0 ? Math.round((pageScore / pageMaxScore) * 100) : 0;
            
            scoreText.textContent = `Score de la page : ${pageScore} / ${pageMaxScore} (${percentage}%)`;
            globalScoreText.textContent = `Score cumulé : ${totalScore} bonnes réponses.`;
            resultsDiv.style.display = 'block';
            document.getElementById('btn-valider').style.display = 'none';
            
            const btnSuivant = document.getElementById('btn-suivant');
            if ((currentPage + 1) * questionsPerPage < allQuestions.length) {
                btnSuivant.disabled = false;
                btnSuivant.textContent = "Page Suivante ➡️";
                btnSuivant.classList.add('ready');
            } else {
                document.getElementById('nav-buttons').style.display = 'none';
                document.getElementById('progress-fill').style.width = '100%';
                const finalPercentage = maxPossibleScore > 0 ? Math.round((totalScore/maxPossibleScore)*100) : 0;
                globalScoreText.innerHTML = `<strong>🎉 FINI !</strong><br>Score Final : ${totalScore} / ${maxPossibleScore} (${finalPercentage}%)`;
                document.getElementById('btn-recommencer').style.display = 'block';
            }
            resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function pageSuivante() { currentPage++; renderPage(); }
        window.onload = initQuiz;
    </script>
</body>
</html>
